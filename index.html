<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirText - Pro</title>
    <style>
        html, body { height: 100%; margin: 0; font-family: -apple-system, sans-serif; background: #f2f2f7; }
        .login-container, .home-container, .chat-container-view { display: none; height: 100vh; flex-direction: column; }
        
        /* ログイン */
        .login-box { margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 320px; }
        .login-box input { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; }

        /* ホーム画面（連絡先一覧） */
        .header { background: white; padding: 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        .contact-list { flex: 1; overflow-y: auto; background: white; }
        .contact-item { padding: 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; cursor: pointer; }
        .contact-item:active { background: #f2f2f7; }
        .avatar { width: 45px; height: 45px; background: #007aff; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        /* プラスボタン */
        .add-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #007aff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }

        /* チャット画面 */
        .chat-header { background: #f9f9f9; padding: 15px; border-bottom: 1px solid #ddd; display: flex; align-items: center; }
        .back-btn { margin-right: 15px; color: #007aff; cursor: pointer; font-size: 18px; }
        .message-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; background: white; }
        .msg { max-width: 70%; padding: 10px 15px; border-radius: 18px; margin-bottom: 8px; font-size: 16px; }
        .sent { background: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .received { background: #e5e5ea; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }
        .input-bar { padding: 10px 20px; display: flex; background: white; border-top: 1px solid #ddd; }
        .input-bar input { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .input-bar button { background: #007aff; color: white; border: none; width: 35px; height: 35px; border-radius: 50%; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-container" id="loginView">
    <div class="login-box">
        <h2>AirText</h2>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="pw" placeholder="パスワード">
        <button id="loginBtn">ログイン</button>
    </div>
</div>

<div class="home-container" id="homeView">
    <div class="header">
        <h2 style="margin:0">連絡先</h2>
        <span id="myEmail" style="font-size:12px; color:#666"></span>
    </div>
    <div class="contact-list" id="contactList"></div>
    <div class="add-btn" id="addContactBtn">+</div>
</div>

<div class="chat-container-view" id="chatView">
    <div class="chat-header">
        <div class="back-btn" id="backBtn">＜ 戻る</div>
        <div id="chatWith" style="font-weight:bold"></div>
    </div>
    <div class="message-area" id="msgArea"></div>
    <div class="input-bar">
        <input type="text" id="msgIn" placeholder="メッセージ">
        <button id="sendBtn">↑</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, where, onSnapshot, serverTimestamp, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAFxMMoJ6q0pQqRimkJaY6eDyBWgLqaNWc",
        authDomain: "airtext-mirboy.firebaseapp.com",
        projectId: "airtext-mirboy",
        storageBucket: "airtext-mirboy.firebasestorage.app",
        messagingSenderId: "1091018853143",
        appId: "1:1091018853143:web:c1ed8f39e4886656800552"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let me = null;
    let target = null;
    let chatUnsubscribe = null;

    // ビュー切り替え
    function showView(id) {
        document.querySelectorAll('body > div').forEach(div => div.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    // ログイン
    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, email.value, pw.value).catch(() => alert("ログイン失敗"));
    };

    onAuthStateChanged(auth, user => {
        if (user) {
            me = user;
            document.getElementById('myEmail').innerText = me.email;
            showView('homeView');
            loadContacts();
        } else {
            showView('loginView');
        }
    });

    // 連絡先追加
    document.getElementById('addContactBtn').onclick = async () => {
        const mail = prompt("追加する相手のメールアドレスを入力:");
        if (mail && mail !== me.email) {
            await setDoc(doc(db, "users", me.uid, "contacts", mail), { email: mail });
            alert("追加しました");
        }
    };

    // 連絡先読み込み
    function loadContacts() {
        onSnapshot(collection(db, "users", me.uid, "contacts"), snap => {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            snap.forEach(d => {
                const mail = d.data().email;
                const div = document.createElement('div');
                div.className = "contact-item";
                div.innerHTML = `<div class="avatar">${mail[0].toUpperCase()}</div><div>${mail}</div>`;
                div.onclick = () => openChat(mail);
                list.appendChild(div);
            });
        });
    }

    // チャット開始
    function openChat(email) {
        target = email;
        document.getElementById('chatWith').innerText = target;
        showView('chatView');
        const roomId = [me.email, target].sort().join("_");
        
        if (chatUnsubscribe) chatUnsubscribe();
        const q = query(collection(db, "rooms", roomId, "messages"), orderBy("createdAt", "asc"));
        chatUnsubscribe = onSnapshot(q, snap => {
            const area = document.getElementById('msgArea');
            area.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                const m = document.createElement('div');
                m.className = `msg ${data.sender === me.email ? 'sent' : 'received'}`;
                m.innerText = data.text;
                area.appendChild(m);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    // 送信
    async function send() {
        const text = msgIn.value.trim();
        if (!text || !target) return;
        const roomId = [me.email, target].sort().join("_");
        await addDoc(collection(db, "rooms", roomId, "messages"), {
            text: text, sender: me.email, createdAt: serverTimestamp()
        });
        msgIn.value = "";
    }
    document.getElementById('sendBtn').onclick = send;
    document.getElementById('msgIn').onkeypress = e => e.key === 'Enter' && send();
    document.getElementById('backBtn').onclick = () => showView('homeView');
</script>
</body>
</html>
