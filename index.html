<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirText</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #fff;
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .chat-container {
            flex: 1;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .message {
            max-width: 70%;
            padding: 10px 16px;
            border-radius: 20px;
            margin-bottom: 8px;
            line-height: 1.4;
            word-break: break-word;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 自分のメッセージ（右側・青） */
        .sent { background-color: #007aff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        /* 相手のメッセージ（左側・グレー） */
        .received { background-color: #e5e5ea; color: black; align-self: flex-start; border-bottom-left-radius: 4px; }

        .input-area {
            background: #fff;
            padding: 10px 20px;
            display: flex;
            border-top: 1px solid #e5e5ea;
            box-sizing: border-box;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        .input-area input {
            flex: 1;
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 16px;
        }
        .input-area button {
            background: #007aff;
            color: white;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            margin-left: 8px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="AirText">
        <button id="sendButton">↑</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // あなたのFirebaseの鍵を設定
    const firebaseConfig = {
        apiKey: "AIzaSyAFxMMoJ6q0pQqRimkJaY6eDyBWgLqaNWc",
        authDomain: "airtext-mirboy.firebaseapp.com",
        projectId: "airtext-mirboy",
        storageBucket: "airtext-mirboy.firebasestorage.app",
        messagingSenderId: "1091018853143",
        appId: "1:1091018853143:web:c1ed8f39e4886656800552"
    };

    // Firebaseの初期化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 今回は簡易的に、開くたびにランダムなユーザーIDを割り振って「自分」と「相手」を識別します
    const userId = Math.random().toString(36).substring(2, 10);

    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');

    // 1. メッセージを送信する関数
    async function sendMessage() {
        const text = messageInput.value.trim();
        if (text === '') return;

        try {
            // Firestoreの「messages」という場所にデータを保存
            await addDoc(collection(db, "messages"), {
                text: text,
                senderId: userId,
                createdAt: serverTimestamp()
            });
            messageInput.value = ''; // 入力欄を空にする
        } catch (error) {
            console.error("送信エラー: ", error);
        }
    }

    // ボタンクリックやEnterキーで送信
    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // 2. データベースの更新をリアルタイムで監視して画面に表示
    const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
    onSnapshot(q, (snapshot) => {
        chatContainer.innerHTML = ''; // 画面を一度クリア
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            const messageElement = document.createElement('div');
            messageElement.classList.add('message');

            // 自分が送ったか、相手が送ったかでデザイン（クラス）を変える
            if (data.senderId === userId) {
                messageElement.classList.add('sent');
            } else {
                messageElement.classList.add('received');
            }

            messageElement.innerText = data.text;
            chatContainer.appendChild(messageElement);
        });

        // 常に一番下までスクロール
        chatContainer.scrollTop = chatContainer.scrollHeight;
    });
</script>

</body>
</html>
