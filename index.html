<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirText Max</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="AirText">

    <style>
        html, body { height: 100%; margin: 0; font-family: -apple-system, sans-serif; background: #f2f2f7; overflow: hidden; }
        .view { display: none; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; box-sizing: border-box; }
        
        /* ログイン画面 */
        #loginView { background: #000; color: white; justify-content: center; align-items: center; }
        .login-box { width: 320px; text-align: center; padding: 20px; margin: auto; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: none; background: #1c1c1e; color: white; font-size: 16px; -webkit-appearance: none; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #007aff; color: white; font-size: 16px; cursor: pointer; margin-bottom: 12px; font-weight: bold; }
        .google-btn { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; background: white; color: #333; font-size: 16px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        .switch-link { color: #007aff; cursor: pointer; text-decoration: underline; font-size: 14px; }

        /* ホーム画面 */
        #homeView { background: white; flex-direction: column; }
        .header { padding: 15px 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; height: 60px; box-sizing: border-box; }
        .contact-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: white; }
        .contact-item { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; cursor: pointer; position: relative; }
        .avatar { width: 50px; height: 50px; background: #007aff; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; object-fit: cover; overflow: hidden; }
        .badge { position: absolute; right: 25px; background: #ff3b30; color: white; padding: 4px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .add-btn { position: absolute; bottom: 30px; right: 30px; width: 65px; height: 65px; background: #007aff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 35px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 99; }
        .icon-btn { font-size: 24px; cursor: pointer; background: none; border: none; padding: 5px; }

        /* チャット画面 */
        #chatView { background: white; flex-direction: column; }
        .chat-header { padding: 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; height: 60px; box-sizing: border-box; }
        .message-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; background: #fff; }
        
        /* メッセージコンテナと吹き出し */
        .msg-container { max-width: 75%; margin-bottom: 12px; display: flex; flex-direction: column; position: relative; }
        .msg-container.sent { align-self: flex-end; align-items: flex-end; }
        .msg-container.received { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 12px 16px; border-radius: 20px; font-size: 16px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; user-select: none; -webkit-user-select: none; cursor: pointer; }
        .sent .msg { background: #007aff; color: white; border-bottom-right-radius: 4px; }
        .received .msg { background: #e5e5ea; color: black; border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 12px; display: block; margin-top: 5px; }
        .msg a { color: inherit; text-decoration: underline; font-weight: bold; }
        
        /* メモ情報（時間・既読） */
        .msg-meta { font-size: 11px; color: #8e8e93; margin-top: 2px; display: flex; gap: 5px; }
        
        /* リアクションバッジ（絵文字進化版） */
        .heart-badge { position: absolute; bottom: -8px; background: white; border: 1px solid #e5e5ea; border-radius: 10px; padding: 1px 5px; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); pointer-events: none; display: flex; gap: 2px; }
        .sent .heart-badge { right: 10px; }
        .received .heart-badge { left: 10px; }

        /* 長押しメニュー（リアクション選択・送信取消用） */
        #msgMenu { display: none; position: fixed; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 5px 25px rgba(0,0,0,0.15); padding: 8px; z-index: 9999; flex-direction: column; width: 220px; box-sizing: border-box; }
        .emoji-row { display: flex; justify-content: space-around; padding-bottom: 8px; border-bottom: 1px solid #eee; margin-bottom: 5px; }
        .emoji-opt { font-size: 24px; cursor: pointer; transition: transform 0.1s; padding: 4px; }
        .emoji-opt:active { transform: scale(1.3); }
        .menu-opt { padding: 10px; color: #ff3b30; font-weight: bold; text-align: center; cursor: pointer; font-size: 14px; }
        
        .input-bar { padding: 10px 15px; display: flex; background: white; border-top: 1px solid #ddd; align-items: center; height: 60px; box-sizing: border-box; gap: 8px; }
        .input-bar input[type="text"] { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; -webkit-appearance: none; }

        /* 設定画面 */
        #settingsView { background: white; padding: 30px; align-items: center; flex-direction: column; }
        .setting-box { width: 100%; max-width: 350px; text-align: center; margin-top: 50px; }
        .setting-box input[type="text"] { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>

<div class="view" id="loginView">
    <div class="login-box">
        <h1 id="authTitle" style="font-size: 40px; margin-bottom: 30px; font-family: sans-serif;">AirText</h1>
        <button class="google-btn" id="googleLoginBtn">🌐 Googleログイン</button>
        <div style="margin: 15px 0; color: #666;">または</div>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="pw" placeholder="パスワード">
        <button id="mainAuthBtn">ログイン</button>
        <div id="switchAuthMode" class="switch-link">新しくアカウントを作る(Sign Up)</div>
    </div>
</div>

<div class="view" id="homeView">
    <div class="header">
        <button class="icon-btn" id="toSettingsBtn">⚙️</button>
        <h2 style="margin:0; font-size:24px;">AirText</h2>
        <div style="display: flex; align-items: center; gap: 10px;">
            <button class="icon-btn" id="makeGroupBtn" style="font-size: 20px;">👥+</button>
            <div id="myEmail" style="font-size:12px; color:#888;"></div>
        </div>
    </div>
    <div class="contact-list" id="contactList"></div>
    <div class="add-btn" id="addBtn">+</div>
</div>

<div class="view" id="chatView">
    <div class="chat-header">
        <button class="icon-btn" id="backBtn">◀</button>
        <div id="chatTitle" style="font-weight:bold; font-size:18px; cursor:pointer; text-decoration: underline;"></div>
        <div></div>
    </div>
    <div class="message-area" id="msgArea"></div>
    <div class="input-bar">
        <button class="icon-btn" id="clipBtn" style="font-size: 20px; padding: 0 5px;">📎</button>
        <input type="file" id="imageFileInput" accept="image/*" style="display:none;">
        
        <input type="text" id="msgInput" placeholder="メッセージ">
        <button id="sendBtn" style="background:#007aff; color:white; border:none; width:40px; height:40px; border-radius:50%; margin-left:2px; font-size:20px; cursor:pointer;">↑</button>
    </div>
</div>

<div class="view" id="settingsView">
    <div class="chat-header" style="width:100%; position:absolute; top:0; left:0;">
        <button class="icon-btn" id="backFromSettings">◀ 戻る</button>
        <div style="font-weight:bold;">プロフィール設定</div>
        <div></div>
    </div>
    <div class="setting-box">
        <label for="avatarInput">
            <img class="avatar" id="myAvatarPreview" style="width:100px; height:100px; margin:0 auto; cursor:pointer; background:#ccc;" src="">
            <p style="font-size:12px; color:#007aff;">画像をタップして変更</p>
        </label>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;">
        <input type="text" id="nicknameInput" placeholder="ニックネームを入力">
        <button id="saveSettingsBtn" style="width:100%; padding:12px; background:#007aff; color:white; border:none; border-radius:10px; font-size:16px;">保存する</button>
    </div>
</div>

<div id="msgMenu">
    <div class="emoji-row">
        <span class="emoji-opt">❤️</span><span class="emoji-opt">👍</span><span class="emoji-opt">😂</span><span class="emoji-opt">😮</span><span class="emoji-opt">🙏</span>
    </div>
    <div class="menu-opt" id="revokeBtn">メッセージ送信取消</div>
</div>

<script>
    window.onerror = function(msg, url, line) {
        alert("プログラムエラー発生:\n" + msg + "\n行番号: " + line);
        return false;
    };

    var firebaseConfig = {
        apiKey: "AIzaSyAFxMMoJ6q0pQqRimkJaY6eDyBWgLqaNWc",
        authDomain: "airtext-mirboy.firebaseapp.com",
        projectId: "airtext-mirboy",
        storageBucket: "airtext-mirboy.firebasestorage.app",
        messagingSenderId: "1091018853143",
        appId: "1:1091018853143:web:c1ed8f39e4886656800552"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();
    var auth = firebase.auth();
    var storage = firebase.storage(); // ストレージ有効化

    var me = null, targetEmail = null, chatUnsub = null, statusUnsub = null;
    var myName = "", myAvatar = "";
    var isSignUpMode = false;
    var audioCtx = null;
    var partnerInRoom = false;
    var activeRoomId = null;
    var isGroupMode = false;
    var focusedMsgId = null;

    // URLを自動リンク化する関数
    function activateLinks(text) {
        var urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, function(url) {
            return '<a href="' + url + '" target="_blank">' + url + '</a>';
        });
    }

    function playNotificationSound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain); 
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
            osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } catch(e) {}
    }

    function formatTime(timestamp) {
        if (!timestamp) return "";
        var d = new Date(timestamp);
        var hr = String(d.getHours()).padStart(2, '0');
        var min = String(d.getMinutes()).padStart(2, '0');
        return hr + ":" + min;
    }

    function show(id) {
        var views = ['loginView', 'homeView', 'chatView', 'settingsView'];
        for (var i = 0; i < views.length; i++) {
            var v = document.getElementById(views[i]);
            if (v) { v.style.display = 'none'; }
        }
        var target = document.getElementById(id);
        if (target) { target.style.display = 'flex'; }
    }

    document.getElementById('googleLoginBtn').onclick = function() {
        var provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    };

    document.getElementById('switchAuthMode').onclick = function() {
        isSignUpMode = !isSignUpMode;
        if (isSignUpMode) {
            document.getElementById('authTitle').innerText = "AirText (Sign Up)";
            document.getElementById('mainAuthBtn').innerText = "新規アカウント登録";
            document.getElementById('switchAuthMode').innerText = "登録済みの方はこちら (Login)";
        } else {
            document.getElementById('authTitle').innerText = "AirText";
            document.getElementById('mainAuthBtn').innerText = "ログイン";
            document.getElementById('switchAuthMode').innerText = "新しくアカウントを作る(Sign Up)";
        }
    };

    document.getElementById('mainAuthBtn').onclick = function() {
        var emailStr = document.getElementById('email').value.trim();
        var pwStr = document.getElementById('pw').value.trim();
        if(!emailStr || !pwStr) return alert("入力してください");

        if (isSignUpMode) {
            auth.createUserWithEmailAndPassword(emailStr, pwStr)
                .then(function() { alert("アカウントを作成しました！ログインしてください。"); })
                .catch(function(e) { alert("登録失敗: " + e.message); });
        } else {
            auth.signInWithEmailAndPassword(emailStr, pwStr).catch(function() { alert("ログイン失敗"); });
        }
    };

    auth.onAuthStateChanged(function(user) {
        if (user) {
            me = user;
            document.getElementById('myEmail').innerText = me.email;
            
            db.collection("profiles").doc(me.email).onSnapshot(function(docSnap) {
                var data = docSnap.data();
                if (data) {
                    myName = data.name || "";
                    myAvatar = data.avatar || "";
                    document.getElementById('nicknameInput').value = myName;
                    if (myAvatar) document.getElementById('myAvatarPreview').src = myAvatar;
                }
                show('homeView');
                listenContacts();
            });
        } else {
            show('loginView');
        }
    });

    document.getElementById('toSettingsBtn').onclick = function() { show('settingsView'); };
    document.getElementById('backFromSettings').onclick = function() { show('homeView'); };

    document.getElementById('avatarInput').onchange = function(e) {
        var reader = new FileReader();
        reader.onload = function() { document.getElementById('myAvatarPreview').src = reader.result; };
        if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('saveSettingsBtn').onclick = function() {
        var name = document.getElementById('nicknameInput').value.trim();
        var avatar = document.getElementById('myAvatarPreview').src;
        db.collection("profiles").doc(me.email).set({ name: name, avatar: avatar.indexOf('data') === 0 ? avatar : myAvatar }, { merge: true }).then(function() {
            alert("プロフィールを保存しました");
            show('homeView');
        });
    };

    // 1対1の友達追加
    document.getElementById('addBtn').onclick = function() {
        var mail = prompt("追加する相手のメールアドレスを入力:");
        if (!mail || mail === me.email) return;
        var linkId = [me.email, mail].sort().join("_");
        db.collection("contact_links").doc(linkId).set({ users: [me.email, mail], type: "direct", time: Date.now() });
    };

    // グループ作成ボタン
    document.getElementById('makeGroupBtn').onclick = function() {
        var gName = prompt("作成するグループ名を入力してください:");
        if(!gName) return;
        var mails = prompt("参加させるメンバーのメールアドレスをカンマ(,)区切りで入力してください:\n(例: friend1@test.com, friend2@test.com)");
        var userList = [me.email];
        if(mails) {
            var splitMails = mails.split(",");
            for(var i=0; i<splitMails.length; i++) {
                var m = splitMails[i].trim();
                if(m && m !== me.email) userList.push(m);
            }
        }
        var gId = "group_" + Date.now();
        db.collection("contact_links").doc(gId).set({ users: userList, type: "group", groupName: gName, time: Date.now() });
    };

    var firstLoad = true;
    function listenContacts() {
        db.collection("contact_links").where("users", "array-contains", me.email).onSnapshot(function(snap) {
            var list = document.getElementById('contactList');
            list.innerHTML = "";

            snap.forEach(function(d) {
                var data = d.data();
                var isGroup = (data.type === "group");
                var roomId = d.id;
                var other = "";
                var displayTitle = "";

                if (isGroup) {
                    displayTitle = "[グループ] " + data.groupName;
                } else {
                    var users = data.users;
                    other = users[0] === me.email ? users[1] : users[0];
                    displayTitle = other;
                }
                
                var safeId = roomId.replace(/[^a-zA-Z0-9]/g, "");
                var item = document.createElement('div');
                item.className = "contact-item";
                item.innerHTML = '<div class="avatar" id="av-'+safeId+'">' + (isGroup ? "👥" : displayTitle[0].toUpperCase()) + '</div><div style="font-weight:bold;" id="name-'+safeId+'">' + displayTitle + '</div>';
                
                if (!isGroup) {
                    // 相手の登録プロフィール名
                    db.collection("profiles").doc(other).onSnapshot(function(pSnap) {
                        var pData = pSnap.data();
                        if (pData) {
                            var avEl = document.getElementById('av-'+safeId);
                            if (pData.avatar && avEl) { avEl.innerHTML = ""; var img = document.createElement('img'); img.src = pData.avatar; img.className="avatar"; img.style.margin="0"; avEl.appendChild(img); }
                        }
                    });
                    // 自分専用の相手の呼び方（ニックネーム）を読み込み
                    db.collection("my_nicknames").doc(me.email).collection("targets").doc(other).onSnapshot(function(nSnap) {
                        var nmEl = document.getElementById('name-'+safeId);
                        if(nmEl) {
                            if(nSnap.exists && nSnap.data().alias) {
                                nmEl.innerText = nSnap.data().alias;
                            } else {
                                nmEl.innerText = other;
                            }
                        }
                    });
                }

                db.collection("room_status").doc(roomId).onSnapshot(function(docSnap) {
                    var status = docSnap.data();
                    var b = item.querySelector('.badge');
                    if (status && status.unread && status.unread === me.email) {
                        if (!b) {
                            b = document.createElement('div'); b.className = "badge"; b.innerText = "新着"; item.appendChild(b);
                            if (!firstLoad) { playNotificationSound(); }
                        }
                    } else { if (b) b.remove(); }
                });

                item.onclick = function() { openChat(roomId, isGroup, other, data.groupName); };
                list.appendChild(item);
            });
            firstLoad = false;
        });
    }

    function openChat(roomId, isGroup, otherEmail, groupName) {
        activeRoomId = roomId;
        isGroupMode = isGroup;
        targetEmail = isGroup ? null : otherEmail;
        
        var titleEl = document.getElementById('chatTitle');
        if(isGroup) {
            titleEl.innerText = "[グループ] " + groupName;
        } else {
            titleEl.innerText = targetEmail;
            // 自分専用の相手の呼び方を反映
            db.collection("my_nicknames").doc(me.email).collection("targets").doc(targetEmail).onSnapshot(function(nSnap) {
                if(nSnap.exists && nSnap.data().alias) {
                    titleEl.innerText = nSnap.data().alias + " (" + targetEmail + ")";
                }
            });
        }
        
        show('chatView');
        
        // 呼び名変更機能（ヘッダーの名前タップ）
        titleEl.onclick = function() {
            if(isGroupMode) return;
            var currentAlias = titleEl.innerText.split(" (")[0];
            var newAlias = prompt("この相手のあなた専用の呼び名（お母さん、妹など）を入力してください:", currentAlias);
            if(newAlias !== null) {
                db.collection("my_nicknames").doc(me.email).collection("targets").doc(targetEmail).set({ alias: newAlias.trim() });
            }
        };

        // 既読フラグ管理
        db.collection("room_status").doc(activeRoomId).set({ unread: "", current_users: firebase.firestore.FieldValue.arrayUnion(me.email) }, { merge: true });

        if(!isGroupMode) {
            if(statusUnsub) statusUnsub();
            statusUnsub = db.collection("room_status").doc(activeRoomId).onSnapshot(function(docSnap) {
                var status = docSnap.data();
                if (status && status.current_users && status.current_users.includes(targetEmail)) {
                    partnerInRoom = true;
                } else {
                    partnerInRoom = false;
                }
            });
        } else {
            partnerInRoom = false;
        }

        if (chatUnsub) chatUnsub();
        chatUnsub = db.collection("rooms").doc(activeRoomId).collection("messages").orderBy("time", "asc").onSnapshot(function(snap) {
            var area = document.getElementById('msgArea');
            area.innerHTML = "";
            
            snap.forEach(function(d) {
                var data = d.data();
                var msgId = d.id;
                var isMe = (data.sender === me.email);
                
                var container = document.createElement('div');
                container.className = "msg-container " + (isMe ? 'sent' : 'received');
                
                var m = document.createElement('div');
                m.className = "msg";
                
                // 写真かテキストかの判定・URL自動リンク処理
                if(data.msgType === "image") {
                    m.innerHTML = (isGroupMode ? '<div style="font-size:10px;color:#888;margin-bottom:4px;">'+data.sender+'</div>':'') + '<img src="'+data.url+'">';
                } else {
                    m.innerHTML = (isGroupMode ? '<div style="font-size:10px;color:#888;margin-bottom:4px;">'+data.sender+'</div>':'') + activateLinks(data.text);
                }
                
                // スマホ長押し & PC右クリックメニューの合体
                var pressTimer;
                m.addEventListener('touchstart', function(e) {
                    pressTimer = setTimeout(function() {
                        popupMenu(e.touches[0].clientX, e.touches[0].clientY, msgId, isMe);
                    }, 600);
                });
                m.addEventListener('touchend', function() { clearTimeout(pressTimer); });
                m.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    popupMenu(e.clientX, e.clientY, msgId, isMe);
                });

                // メタ情報（時間・既読）
                var meta = document.createElement('div');
                meta.className = "msg-meta";
                var timeStr = formatTime(data.time);
                
                if (isMe) {
                    var readText = (partnerInRoom || data.isRead) ? "既読 " : "";
                    meta.innerText = (isGroupMode ? "" : readText) + timeStr;
                    if (partnerInRoom && !data.isRead) {
                        db.collection("rooms").doc(activeRoomId).collection("messages").doc(msgId).update({ isRead: true });
                    }
                } else {
                    meta.innerText = timeStr;
                    if (!data.isRead) {
                        db.collection("rooms").doc(activeRoomId).collection("messages").doc(msgId).update({ isRead: true });
                    }
                }

                // 絵文字リアクションバッジ（複数スタンプ対応）
                var heartBadge = document.createElement('div');
                heartBadge.className = "heart-badge";
                
                var reactString = "";
                if(data.reactions) {
                    for(var key in data.reactions) {
                        if(data.reactions[key] && data.reactions[key].length > 0) {
                            reactString += key;
                        }
                    }
                }
                if (reactString !== "") {
                    heartBadge.innerText = reactString;
                    heartBadge.style.display = "flex";
                } else {
                    heartBadge.style.display = "none";
                }

                container.appendChild(m);
                container.appendChild(heartBadge);
                container.appendChild(meta);
                area.appendChild(container);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    // 長押しメニューの表示
    function popupMenu(x, y, msgId, isMe) {
        focusedMsgId = msgId;
        var menu = document.getElementById('msgMenu');
        menu.style.display = 'flex';
        menu.style.left = Math.min(x, window.innerWidth - 230) + 'px';
        menu.style.top = Math.min(y, window.innerHeight - 150) + 'px';
        
        // 送信取消ボタンは自分のメッセージの時だけ表示
        document.getElementById('revokeBtn').style.display = isMe ? 'block' : 'none';
    }

    // メニュー外タップで閉じる
    document.addEventListener('click', function(e) {
        if(!e.target.closest('#msgMenu') && !e.target.closest('.msg')) {
            document.getElementById('msgMenu').style.display = 'none';
        }
    });

    // 絵文字リアクションをタップしたときの処理
    var emojiOpts = document.querySelectorAll('.emoji-opt');
    for(var i=0; i<emojiOpts.length; i++) {
        emojiOpts[i].onclick = function(e) {
            var chosenEmoji = e.target.innerText;
            var msgRef = db.collection("rooms").doc(activeRoomId).collection("messages").doc(focusedMsgId);
            
            db.runTransaction(function(transaction) {
                return transaction.get(msgRef).then(function(resDoc) {
                    var currentData = resDoc.data();
                    var rMap = currentData.reactions || {};
                    if(!rMap[chosenEmoji]) rMap[chosenEmoji] = [];
                    
                    if(rMap[chosenEmoji].includes(me.email)) {
                        // 既についてたら外す
                        rMap[chosenEmoji] = rMap[chosenEmoji].filter(function(u) { return u !== me.email; });
                    } else {
                        // ついてなければ追加
                        rMap[chosenEmoji].push(me.email);
                    }
                    transaction.update(msgRef, { reactions: rMap });
                });
            }).then(function() {
                document.getElementById('msgMenu').style.display = 'none';
            });
        };
    }

    // 送信取り消し（データ完全消去）
    document.getElementById('revokeBtn').onclick = function() {
        if(confirm("このメッセージの送信を取り消しますか？\n（お互いの画面から完全に消去されます）")) {
            db.collection("rooms").doc(activeRoomId).collection("messages").doc(focusedMsgId).delete().then(function() {
                document.getElementById('msgMenu').style.display = 'none';
            });
        }
    };

    function closeChat() {
        if (!activeRoomId) return;
        db.collection("room_status").doc(activeRoomId).set({
            current_users: firebase.firestore.FieldValue.arrayRemove(me.email)
        }, { merge: true });
        
        targetEmail = null;
        activeRoomId = null;
        show('homeView');
    }

    function send() {
        var input = document.getElementById('msgInput');
        var text = input.value.trim();
        if (!text || !activeRoomId) return;

        var msgData = {
            text: text,
            sender: me.email,
            time: Date.now(),
            msgType: "text",
            isRead: partnerInRoom,
            reactions: {}
        };
        input.value = "";

        db.collection("rooms").doc(activeRoomId).collection("messages").add(msgData).then(function() {
            if (!partnerInRoom && !isGroupMode) {
                db.collection("room_status").doc(activeRoomId).set({ unread: targetEmail }, { merge: true });
            } else if (isGroupMode) {
                // グループの場合は自分以外の全員に新着通知（簡易版）
                db.collection("room_status").doc(activeRoomId).set({ unread: "group_update" }, { merge: true });
            }
        });
    }

    // 写真送信ボタン処理
    document.getElementById('clipBtn').onclick = function() {
        document.getElementById('imageFileInput').click();
    };

    document.getElementById('imageFileInput').onchange = function(e) {
        var file = e.target.files[0];
        if(!file) return;

        var storageRef = storage.ref('airtext_photos/' + activeRoomId + '/' + Date.now() + '_' + file.name);
        
        // アップロード開始
        storageRef.put(file).then(function(snapshot) {
            return snapshot.ref.getDownloadURL();
        }).then(function(downloadURL) {
            // 画像メッセージとしてFirestoreに書き込み
            var msgData = {
                url: downloadURL,
                sender: me.email,
                time: Date.now(),
                msgType: "image",
                isRead: partnerInRoom,
                reactions: {}
            };
            db.collection("rooms").doc(activeRoomId).collection("messages").add(msgData);
        }).catch(function(err) {
            alert("画像の送信に失敗しました: " + err.message);
        });
    };

    document.getElementById('sendBtn').onclick = send;
    document.getElementById('msgInput').onkeypress = function(e) { if (e.key === 'Enter' || e.keyCode === 13) send(); };
    document.getElementById('backBtn').onclick = closeChat;
</script>
</body>
</html>
