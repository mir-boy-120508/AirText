<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirText Max</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        :root { --main-blue: #007aff; --bg-gray: #f2f2f7; --msg-received: #e5e5ea; }
        html, body { height: 100%; margin: 0; font-family: -apple-system, sans-serif; background: var(--bg-gray); overflow: hidden; }
        .view { display: none; height: 100vh; width: 100%; position: absolute; flex-direction: column; }
        
        /* 共通ヘッダー */
        .header { padding: 10px 15px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; background: #fff; height: 60px; z-index: 10; }
        .icon-btn { font-size: 22px; cursor: pointer; background: none; border: none; padding: 5px; }

        /* リスト表示 */
        .contact-list { flex: 1; overflow-y: auto; background: white; }
        .item { padding: 12px 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; cursor: pointer; }
        .avatar { width: 45px; height: 45px; background: #ccc; border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; object-fit: cover; }

        /* チャット吹き出し */
        .message-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background: #fff; }
        .msg-container { max-width: 80%; margin-bottom: 15px; position: relative; display: flex; flex-direction: column; }
        .msg-container.sent { align-self: flex-end; align-items: flex-end; }
        .msg-container.received { align-self: flex-start; align-items: flex-start; }
        .msg { padding: 10px 14px; border-radius: 18px; font-size: 16px; word-wrap: break-word; cursor: pointer; position: relative; transition: opacity 0.2s; }
        .sent .msg { background: var(--main-blue); color: white; }
        .received .msg { background: var(--msg-received); color: black; }
        .msg img { max-width: 200px; border-radius: 10px; display: block; margin: 5px 0; }
        .msg a { color: inherit; text-decoration: underline; }

        /* リアクション表示 */
        .reactions { display: flex; gap: 2px; position: absolute; bottom: -12px; background: white; border-radius: 10px; padding: 2px 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 12px; z-index: 5; }
        .sent .reactions { right: 10px; }
        .received .reactions { left: 10px; }

        /* リアクションピッカー & メニュー */
        #contextMenu { display: none; position: fixed; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); padding: 10px; z-index: 1000; flex-direction: column; gap: 10px; }
        .emoji-bar { display: flex; gap: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .emoji-item { font-size: 24px; cursor: pointer; transition: transform 0.1s; }
        .emoji-item:active { transform: scale(1.5); }
        .menu-item { padding: 10px; color: #ff3b30; font-weight: bold; text-align: center; cursor: pointer; }

        /* 入力バー */
        .input-bar { padding: 10px; display: flex; background: white; border-top: 1px solid #ddd; align-items: center; gap: 10px; }
        .input-bar input[type="text"] { flex: 1; padding: 10px 15px; border: 1px solid #ddd; border-radius: 20px; font-size: 16px; }
        
        /* ログイン */
        #loginView { background: #000; color: #fff; justify-content: center; align-items: center; text-align: center; }
        .btn-blue { background: var(--main-blue); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }

        .meta { font-size: 10px; color: #8e8e93; margin-top: 4px; }
    </style>
</head>
<body>

<div class="view" id="loginView" style="display: flex;">
    <div style="width: 80%;">
        <h1 style="font-size: 48px;">AirText Max</h1>
        <button class="btn-blue" id="loginBtn">Googleでログイン</button>
    </div>
</div>

<div class="view" id="homeView">
    <div class="header">
        <button class="icon-btn" onclick="auth.signOut()">🚪</button>
        <h2>AirText</h2>
        <button class="icon-btn" id="createGroupBtn">👥+</button>
    </div>
    <div class="contact-list" id="contactList"></div>
    <button id="addContactBtn" style="position:fixed; bottom:30px; right:30px; width:60px; height:60px; border-radius:50%; background:var(--main-blue); color:white; border:none; font-size:30px; box-shadow:0 4px 10px rgba(0,0,0,0.3);">+</button>
</div>

<div class="view" id="chatView">
    <div class="header">
        <button class="icon-btn" id="backBtn">◀</button>
        <div id="chatTitle" style="font-weight:bold; cursor:pointer;"></div>
        <div style="width:30px;"></div>
    </div>
    <div class="message-area" id="msgArea"></div>
    <div class="input-bar">
        <button class="icon-btn" id="photoBtn">🖼️</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none;">
        <input type="text" id="msgInput" placeholder="メッセージ">
        <button id="sendBtn" style="background:var(--main-blue); color:white; border:none; width:35px; height:35px; border-radius:50%; font-weight:bold;">↑</button>
    </div>
</div>

<div id="contextMenu">
    <div class="emoji-bar">
        <span class="emoji-item">❤️</span><span class="emoji-item">👍</span><span class="emoji-item">😂</span><span class="emoji-item">😮</span><span class="emoji-item">🙏</span>
    </div>
    <div class="menu-item" id="deleteMsgBtn">メッセージ送信消去</div>
</div>

<script>
    // --- Firebase設定 ---
    const firebaseConfig = {
        apiKey: "AIzaSyAFxMMoJ6q0pQqRimkJaY6eDyBWgLqaNWc",
        authDomain: "airtext-mirboy.firebaseapp.com",
        projectId: "airtext-mirboy",
        storageBucket: "airtext-mirboy.appspot.com",
        messagingSenderId: "1091018853143",
        appId: "1:1091018853143:web:c1ed8f39e4886656800552"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const storage = firebase.storage();

    let me = null;
    let currentRoomId = null;
    let isGroup = false;
    let selectedMsgId = null;

    // --- ユーティリティ ---
    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    // URLをリンクに変える関数
    function linkify(text) {
        const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
        return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
    }

    // --- 認証 ---
    document.getElementById('loginBtn').onclick = () => auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());
    
    auth.onAuthStateChanged(user => {
        if (user) {
            me = user;
            show('homeView');
            listenContacts();
        } else {
            show('loginView');
        }
    });

    // --- 連絡先・グループ管理 ---
    document.getElementById('addContactBtn').onclick = () => {
        const email = prompt("追加する相手のメールアドレス:");
        if (email && email !== me.email) {
            const id = [me.email, email].sort().join("_");
            db.collection("contacts").doc(id).set({ users: [me.email, email], type: "direct", time: Date.now() });
        }
    };

    document.getElementById('createGroupBtn').onclick = () => {
        const name = prompt("グループ名:");
        const emails = prompt("参加者のメールをコンマ区切りで入力 (例: a@a.com, b@b.com):");
        if (name && emails) {
            const members = emails.split(",").map(e => e.trim());
            members.push(me.email);
            db.collection("contacts").add({ name, users: members, type: "group", time: Date.now() });
        }
    };

    function listenContacts() {
        db.collection("contacts").where("users", "array-contains", me.email).onSnapshot(snap => {
            const list = document.getElementById('contactList');
            list.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                const isG = data.type === "group";
                const other = isG ? data.name : data.users.find(u => u !== me.email);
                
                const item = document.createElement('div');
                item.className = "item";
                item.innerHTML = `<div class="avatar">${isG ? "👥" : other[0].toUpperCase()}</div><div style="font-weight:bold;">${other}</div>`;
                
                // ニックネーム（呼び名）の反映
                if(!isG) {
                    db.collection("nicknames").doc(me.email).collection("targets").doc(other).onSnapshot(nSnap => {
                        if(nSnap.exists) item.querySelector('div:last-child').innerText = nSnap.data().name;
                    });
                }

                item.onclick = () => openChat(doc.id, other, isG);
                list.appendChild(item);
            });
        });
    }

    // --- チャット画面 ---
    function openChat(roomId, title, isG) {
        currentRoomId = roomId;
        isGroup = isG;
        document.getElementById('chatTitle').innerText = title;
        show('chatView');

        // 呼び名変更機能
        document.getElementById('chatTitle').onclick = () => {
            if(isGroup) return;
            const newName = prompt("相手の呼び名を設定（自分にだけ見えます）:", title);
            if(newName) db.collection("nicknames").doc(me.email).collection("targets").doc(title).set({name: newName});
        };

        db.collection("contacts").doc(currentRoomId).collection("messages").orderBy("time", "asc").onSnapshot(snap => {
            const area = document.getElementById('msgArea');
            area.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.sender === me.email;
                const container = document.createElement('div');
                container.className = `msg-container ${isMe ? 'sent' : 'received'}`;
                
                let content = d.type === "image" ? `<img src="${d.url}">` : linkify(d.text);
                
                const reactionsHtml = d.reactions ? `<div class="reactions">${Object.entries(d.reactions).map(([emoji, users]) => users.length > 0 ? emoji : "").join("")}</div>` : "";

                container.innerHTML = `
                    <div class="msg" data-id="${doc.id}">${content}</div>
                    ${reactionsHtml}
                    <div class="meta">${isMe ? (d.isRead ? '既読 ' : '送出 ') : ''}${new Date(d.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                `;

                // 長押し/右クリックメニュー
                const msgEl = container.querySelector('.msg');
                msgEl.oncontextmenu = (e) => { e.preventDefault(); showMenu(e, doc.id, isMe); };
                
                // スマホ用長押し
                let timer;
                msgEl.ontouchstart = (e) => timer = setTimeout(() => showMenu(e.touches[0], doc.id, isMe), 600);
                msgEl.ontouchend = () => clearTimeout(timer);

                area.appendChild(container);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    // --- メニュー操作（リアクション・消去） ---
    function showMenu(e, msgId, isMe) {
        selectedMsgId = msgId;
        const menu = document.getElementById('contextMenu');
        menu.style.display = 'flex';
        menu.style.top = `${Math.min(e.clientY, window.innerHeight - 150)}px`;
        menu.style.left = `${Math.min(e.clientX, window.innerWidth - 200)}px`;
        document.getElementById('deleteMsgBtn').style.display = isMe ? 'block' : 'none';
    }

    document.addEventListener('click', (e) => {
        if(!e.target.closest('#contextMenu')) document.getElementById('contextMenu').style.display = 'none';
    });

    document.querySelectorAll('.emoji-item').forEach(el => {
        el.onclick = () => {
            const emoji = el.innerText;
            const ref = db.collection("contacts").doc(currentRoomId).collection("messages").doc(selectedMsgId);
            db.runTransaction(async (transaction) => {
                const doc = await transaction.get(ref);
                let reactions = doc.data().reactions || {};
                if(!reactions[emoji]) reactions[emoji] = [];
                if(reactions[emoji].includes(me.email)) {
                    reactions[emoji] = reactions[emoji].filter(u => u !== me.email);
                } else {
                    reactions[emoji].push(me.email);
                }
                transaction.update(ref, { reactions });
            });
        };
    });

    document.getElementById('deleteMsgBtn').onclick = () => {
        if(confirm("メッセージの送信を取り消しますか？")) {
            db.collection("contacts").doc(currentRoomId).collection("messages").doc(selectedMsgId).delete();
        }
    };

    // --- メッセージ送信 ---
    async function send(type, content) {
        if(!content || !currentRoomId) return;
        const msgData = {
            sender: me.email,
            time: Date.now(),
            type: type,
            reactions: {},
            isRead: false
        };
        if(type === "text") msgData.text = content; else msgData.url = content;
        
        db.collection("contacts").doc(currentRoomId).collection("messages").add(msgData);
        document.getElementById('msgInput').value = "";
    }

    document.getElementById('sendBtn').onclick = () => send("text", document.getElementById('msgInput').value.trim());
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === "Enter") send("text", e.target.value.trim()); };
    document.getElementById('backBtn').onclick = () => show('homeView');

    // 写真送信
    document.getElementById('photoBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const ref = storage.ref(`chats/${currentRoomId}/${Date.now()}_${file.name}`);
        const snap = await ref.put(file);
        const url = await snap.ref.getDownloadURL();
        send("image", url);
    };

</script>
</body>
</html>
