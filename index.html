<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirText Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AirText">

    <style>
        :root {
            --primary-color: #007aff;
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-muted: #8e8e93;
            --bubble-sent: #007aff;
            --bubble-received: #e5e5ea;
        }

        html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); overflow: hidden; color: var(--text-main); }
        .view { display: none; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; box-sizing: border-box; flex-direction: column; }
        
        /* ログイン画面 */
        #loginView { background: #000; color: white; justify-content: center; align-items: center; display: flex; }
        .login-box { width: 90%; max-width: 360px; text-align: center; padding: 30px 20px; background: #1c1c1e; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: none; background: #2c2c2e; color: white; font-size: 16px; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary-color); color: white; font-size: 16px; cursor: pointer; margin-bottom: 12px; font-weight: bold; transition: opacity 0.2s; }
        .login-box button:active { opacity: 0.8; }
        .google-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: white; color: #333; font-size: 16px; cursor: pointer; margin-bottom: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .switch-link { color: var(--primary-color); cursor: pointer; text-decoration: none; font-size: 14px; margin-top: 10px; display: inline-block; }
        .switch-link:hover { text-decoration: underline; }

        /* 共通ヘッダー */
        .header, .chat-header { padding: 0 20px; border-bottom: 1px solid rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); height: 60px; box-sizing: border-box; flex-shrink: 0; }
        .header h2, .chat-header h2 { margin: 0; font-size: 20px; font-weight: 700; }

        /* ホーム画面 */
        .contact-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--card-bg); }
        .contact-item { padding: 15px 20px; border-bottom: 1px solid #f2f2f7; display: flex; align-items: center; cursor: pointer; position: relative; transition: background 0.2s; }
        .contact-item:active { background: #f2f2f7; }
        .avatar { width: 48px; height: 48px; background: var(--primary-color); border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; object-fit: cover; overflow: hidden; flex-shrink: 0; }
        .contact-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .contact-name { font-weight: 600; font-size: 16px; }
        .contact-lastmsg { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
        .badge { background: #ff3b30; color: white; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; position: absolute; right: 20px; }
        .add-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; box-shadow: 0 4px 12px rgba(0,122,255,0.3); cursor: pointer; z-index: 99; transition: transform 0.1s; }
        .add-btn:active { transform: scale(0.95); }
        .icon-btn { font-size: 22px; cursor: pointer; background: none; border: none; padding: 5px; display: flex; align-items: center; justify-content: center; }

        /* チャット画面 */
        .message-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; background: var(--bg-color); }
        .typing-indicator { font-size: 12px; color: var(--text-muted); padding: 5px 20px; background: var(--card-bg); border-top: 1px solid rgba(0,0,0,0.05); display: none; }
        
        .msg-container { max-width: 75%; margin-bottom: 12px; display: flex; flex-direction: column; position: relative; }
        .msg-container.sent { align-self: flex-end; align-items: flex-end; }
        .msg-container.received { align-self: flex-start; align-items: flex-start; }
        
        .sender-name { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; margin-left: 6px; }
        .msg { padding: 10px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap; user-select: none; -webkit-user-select: none; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .sent .msg { background: var(--bubble-sent); color: white; border-bottom-right-radius: 4px; }
        .received .msg { background: var(--bubble-received); color: black; border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; max-height: 250px; border-radius: 12px; display: block; margin-top: 5px; }
        .msg a { color: inherit; text-decoration: underline; font-weight: 500; }
        
        .msg-meta { font-size: 10px; color: var(--text-muted); margin-top: 3px; display: flex; gap: 4px; align-items: center; }
        
        /* リアクション */
        .heart-badge { position: absolute; bottom: -8px; background: white; border: 1px solid #e5e5ea; border-radius: 10px; padding: 1px 6px; font-size: 11px; box-shadow: 0 2px 5px rgba(0,0,0,0.08); pointer-events: none; display: none; gap: 2px; color: #000; }
        .sent .heart-badge { right: 10px; }
        .received .heart-badge { left: 10px; }

        /* コンテキストメニュー */
        #msgMenu { display: none; position: fixed; background: rgba(255,255,255,0.95); -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px); border-radius: 20px; box-shadow: 0 10px 35px rgba(0,0,0,0.15); padding: 8px; z-index: 9999; flex-direction: column; width: 220px; box-sizing: border-box; }
        .emoji-row { display: flex; justify-content: space-around; padding-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 5px; }
        .emoji-opt { font-size: 24px; cursor: pointer; transition: transform 0.1s; padding: 4px; }
        .emoji-opt:active { transform: scale(1.3); }
        .menu-opt { padding: 12px; color: #ff3b30; font-weight: 600; text-align: center; cursor: pointer; font-size: 15px; }
        
        /* 入力バー */
        .input-bar { padding: 10px 15px; display: flex; background: var(--card-bg); border-top: 1px solid rgba(0,0,0,0.1); align-items: center; min-height: 60px; box-sizing: border-box; gap: 10px; }
        .input-bar input[type="text"] { flex: 1; padding: 10px 18px; border: 1px solid #e5e5ea; border-radius: 20px; outline: none; font-size: 16px; background: #f2f2f7; box-sizing: border-box; }
        .input-bar input[type="text"]:focus { background: #fff; border-color: var(--primary-color); }

        /* 設定画面 */
        #settingsView { background: var(--card-bg); padding: 20px; align-items: center; }
        .setting-box { width: 100%; max-width: 350px; text-align: center; margin-top: 40px; display: flex; flex-direction: column; align-items: center; }
        .setting-box input[type="text"] { width: 100%; padding: 14px; margin: 20px 0; border: 1px solid #e5e5ea; border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #f2f2f7; outline: none; }
        .setting-box input[type="text"]:focus { background: #fff; border-color: var(--primary-color); }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, collection, setDoc, addDoc, getDoc, updateDoc, deleteDoc, onSnapshot, query, where, orderBy, runTransaction, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyAFxMMoJ6q0pQqRimkJaY6eDyBWgLqaNWc",
            authDomain: "airtext-mirboy.firebaseapp.com",
            projectId: "airtext-mirboy",
            storageBucket: "airtext-mirboy.firebasestorage.app",
            messagingSenderId: "1091018853143",
            appId: "1:1091018853143:web:c1ed8f39e4886656800552"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const storage = getStorage(app);

        // アプリケーション状態の管理
        let me = null;
        let targetEmail = null;
        let activeRoomId = null;
        let isGroupMode = false;
        let partnerInRoom = false;
        let focusedMsgId = null;
        let selectedAvatarFile = null;
        let typingTimeout = null;

        // リスナー解除用関数を保持
        let chatUnsub = null;
        let statusUnsub = null;
        let typingUnsub = null;
        let contactUnsub = null;
        let firstLoad = true;
        let audioCtx = null;

        // グローバルWindowオブジェクトへの展開（HTML内のインラインonclick互換用）
        window.show = show;

        // エラーハンドリング
        window.onerror = function(msg, url, line) {
            console.error("Error: " + msg + " at " + line);
            return false;
        };

        // ユーティリティ: リンク有効化
        function activateLinks(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`);
        }

        // ユーティリティ: 通知音
        function playNotificationSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.connect(gain); 
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        // ユーティリティ: タイムフォーマット
        function formatTime(timestamp) {
            if (!timestamp) return "";
            const d = new Date(timestamp);
            return String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0');
        }

        // 画面切り替え
        function show(id) {
            const views = ['loginView', 'homeView', 'chatView', 'settingsView'];
            views.forEach(vId => {
                const el = document.getElementById(vId);
                if (el) el.style.display = 'none';
            });
            const target = document.getElementById(id);
            if (target) target.style.display = 'flex';
            
            // チャット画面を開いたときはスクロール最下部へ
            if(id === 'chatView') scrollChatToBottom();
        }

        function scrollChatToBottom() {
            const area = document.getElementById('msgArea');
            setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
        }

        /* --- 認証ロジック --- */
        document.getElementById('googleLoginBtn').onclick = () => {
            const provider = new GoogleAuthProvider();
            signInWithRedirect(auth, provider);
        };

        let isSignUpMode = false;
        document.getElementById('switchAuthMode').onclick = () => {
            isSignUpMode = !isSignUpMode;
            document.getElementById('authTitle').innerText = isSignUpMode ? "AirText (Sign Up)" : "AirText";
            document.getElementById('mainAuthBtn').innerText = isSignUpMode ? "新規アカウント登録" : "ログイン";
            document.getElementById('switchAuthMode').innerText = isSignUpMode ? "登録済みの方はこちら (Login)" : "新しくアカウントを作る(Sign Up)";
        };

        document.getElementById('mainAuthBtn').onclick = () => {
            const emailStr = document.getElementById('email').value.trim();
            const pwStr = document.getElementById('pw').value.trim();
            if(!emailStr || !pwStr) return alert("入力してください");

            if (isSignUpMode) {
                createUserWithEmailAndPassword(auth, emailStr, pwStr)
                    .then(() => alert("アカウントを作成しました！"))
                    .catch(e => alert("登録失敗: " + e.message));
            } else {
                signInWithEmailAndPassword(auth, emailStr, pwStr).catch(() => alert("ログイン失敗"));
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                me = user;
                document.getElementById('myEmail').innerText = me.email;
                
                onSnapshot(doc(db, "profiles", me.email), (docSnap) => {
                    const data = docSnap.data();
                    if (data) {
                        document.getElementById('nicknameInput').value = data.name || "";
                        if (data.avatar) document.getElementById('myAvatarPreview').src = data.avatar;
                    }
                    show('homeView');
                    listenContacts();
                });
            } else {
                show('loginView');
                if(contactUnsub) contactUnsub();
            }
        });

        /* --- プロフィール設定 --- */
        document.getElementById('toSettingsBtn').onclick = () => show('settingsView');
        document.getElementById('backFromSettings').onclick = () => show('homeView');
        document.getElementById('avatarInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedAvatarFile = file;
                const reader = new FileReader();
                reader.onload = () => { document.getElementById('myAvatarPreview').src = reader.result; };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('saveSettingsBtn').onclick = async () => {
            const name = document.getElementById('nicknameInput').value.trim();
            let myAvatarUrl = document.getElementById('myAvatarPreview').src;

            try {
                if (selectedAvatarFile) {
                    const storageRef = ref(storage, 'avatars/' + me.email + '_' + Date.now() + '_' + selectedAvatarFile.name);
                    const snapshot = await uploadBytes(storageRef, selectedAvatarFile);
                    myAvatarUrl = await getDownloadURL(snapshot.ref);
                    selectedAvatarFile = null;
                }
                await setDoc(doc(db, "profiles", me.email), { name: name, avatar: myAvatarUrl }, { merge: true });
                alert("プロフィールを保存しました");
                show('homeView');
            } catch (err) {
                alert("保存に失敗しました: " + err.message);
            }
        };

        /* --- コンタクト・グループ作成 --- */
        document.getElementById('addBtn').onclick = async () => {
            const mail = prompt("追加する相手のメールアドレスを入力:");
            if (!mail || mail === me.email) return;
            const linkId = [me.email, mail].sort().join("_");
            await setDoc(doc(db, "contact_links", linkId), { users: [me.email, mail], type: "direct", time: Date.now() });
        };

        document.getElementById('makeGroupBtn').onclick = async () => {
            const gName = prompt("作成するグループ名を入力してください:");
            if(!gName) return;
            const mails = prompt("参加させるメンバーのメールアドレスをカンマ(,)区切りで入力してください:");
            const userList = [me.email];
            if(mails) {
                mails.split(",").forEach(m => {
                    const trimmed = m.trim();
                    if(trimmed && trimmed !== me.email) userList.push(trimmed);
                });
            }
            const gId = "group_" + Date.now();
            await setDoc(doc(db, "contact_links", gId), { users: userList, type: "group", groupName: gName, time: Date.now() });
        };

        /* --- チャットリスト同期 --- */
        function listenContacts() {
            const q = query(collection(db, "contact_links"), where("users", "array-contains", me.email));
            contactUnsub = onSnapshot(q, (snap) => {
                const list = document.getElementById('contactList');
                list.innerHTML = "";

                snap.forEach((d) => {
                    const data = d.data();
                    const isGroup = (data.type === "group");
                    const roomId = d.id;
                    let displayTitle = isGroup ? "[グループ] " + data.groupName : (data.users[0] === me.email ? data.users[1] : data.users[0]);
                    const other = isGroup ? "" : displayTitle;

                    const safeId = roomId.replace(/[^a-zA-Z0-9]/g, "");
                    const item = document.createElement('div');
                    item.className = "contact-item";
                    item.innerHTML = `
                        <div class="avatar" id="av-${safeId}">${isGroup ? "👥" : displayTitle[0].toUpperCase()}</div>
                        <div class="contact-info">
                            <div class="contact-name" id="name-${safeId}">${displayTitle}</div>
                            <div class="contact-lastmsg" id="msg-${safeId}">メッセージはありません</div>
                        </div>
                    `;

                    if (!isGroup) {
                        onSnapshot(doc(db, "profiles", other), (pSnap) => {
                            const pData = pSnap.data();
                            const avEl = document.getElementById('av-'+safeId);
                            if (pData && pData.avatar && avEl) {
                                avEl.innerHTML = `<img src="${pData.avatar}" class="avatar" style="margin:0;">`;
                            }
                        });
                        onSnapshot(doc(db, "my_nicknames", me.email, "targets", other), (nSnap) => {
                            const nmEl = document.getElementById('name-'+safeId);
                            if(nmEl && nSnap.exists() && nSnap.data().alias) {
                                nmEl.innerText = nSnap.data().alias;
                            }
                        });
                    }

                    // 最新メッセージと未読通知の監視
                    const msgQ = query(collection(db, "rooms", roomId, "messages"), orderBy("time", "desc"));
                    onSnapshot(msgQ, (mSnap) => {
                        if(!mSnap.empty) {
                            const lastMsg = mSnap.docs[0].data();
                            const msgEl = document.getElementById('msg-'+safeId);
                            if(msgEl) msgEl.innerText = lastMsg.msgType === "image" ? "📷 画像" : lastMsg.text;
                        }
                    });

                    onSnapshot(doc(db, "room_status", roomId), (docSnap) => {
                        const status = docSnap.data();
                        let b = item.querySelector('.badge');
                        if (status && status.unread && status.unread.includes(me.email)) {
                            if (!b) {
                                b = document.createElement('div'); b.className = "badge"; b.innerText = "新着"; 
                                item.appendChild(b);
                                if (!firstLoad) playNotificationSound();
                            }
                        } else if (b) { b.remove(); }
                    });

                    item.onclick = () => openChat(roomId, isGroup, other, data.groupName);
                    list.appendChild(item);
                });
                firstLoad = false;
            });
        }

        /* --- チャット画面展開＆リアルタイムメッセージロジック --- */
        async function openChat(roomId, isGroup, otherEmail, groupName) {
            activeRoomId = roomId;
            isGroupMode = isGroup;
            targetEmail = isGroup ? null : otherEmail;
            
            const titleEl = document.getElementById('chatTitle');
            titleEl.innerText = isGroup ? "[グループ] " + groupName : targetEmail;
            
            if(!isGroup) {
                onSnapshot(doc(db, "my_nicknames", me.email, "targets", targetEmail), (nSnap) => {
                    if(nSnap.exists() && nSnap.data().alias) titleEl.innerText = nSnap.data().alias;
                });
            }
            
            show('chatView');

            titleEl.onclick = async () => {
                if(isGroupMode) return;
                const newAlias = prompt("この相手の専用の呼び名を入力してください:", titleEl.innerText);
                if(newAlias !== null) {
                    await setDoc(doc(db, "my_nicknames", me.email, "targets", targetEmail), { alias: newAlias.trim() });
                }
            };
        
            // 部屋に入室時に未読から自分を外す
            await setDoc(doc(db, "room_status", activeRoomId), { 
                current_users: arrayUnion(me.email)
            }, { merge: true });

            await runTransaction(db, async (transaction) => {
                const statusRef = doc(db, "room_status", activeRoomId);
                const snap = await transaction.get(statusRef);
                if(snap.exists()) {
                    const unreadList = snap.data().unread || [];
                    transaction.update(statusRef, { unread: unreadList.filter(u => u !== me.email) });
                }
            });

            if(statusUnsub) statusUnsub();
            statusUnsub = onSnapshot(doc(db, "room_status", activeRoomId), (docSnap) => {
                const status = docSnap.data();
                if (!isGroupMode && status && status.current_users && status.current_users.includes(targetEmail)) {
                    partnerInRoom = true;
                } else {
                    partnerInRoom = false;
                }
            });

            // タイピング中インジケータ監視
            if(typingUnsub) typingUnsub();
            typingUnsub = onSnapshot(doc(db, "room_typing", activeRoomId), (docSnap) => {
                const tData = docSnap.data();
                const indicator = document.getElementById('typingIndicator');
                if(tData) {
                    const typers = Object.keys(tData).filter(k => tData[k] === true && k !== me.email);
                    if(typers.length > 0) {
                        indicator.innerText = isGroupMode ? `${typers.join(', ')} が入力中...` : "相手が入力中...";
                        indicator.style.display = "block";
                        return;
                    }
                }
                indicator.style.display = "none";
            });

            // メッセージストリーム
            if (chatUnsub) chatUnsub();
            const msgQ = query(collection(db, "rooms", activeRoomId, "messages"), orderBy("time", "asc"));
            chatUnsub = onSnapshot(msgQ, (snap) => {
                const area = document.getElementById('msgArea');
                area.innerHTML = "";
                
                snap.forEach((d) => {
                    const data = d.data();
                    const msgId = d.id;
                    const isMe = (data.sender === me.email);
                    
                    // 既読処理 (自分が読んだら読んだユーザーリストに追加)
                    if (!isMe && (!data.readBy || !data.readBy.includes(me.email))) {
                        updateDoc(doc(db, "rooms", activeRoomId, "messages", msgId), {
                            readBy: arrayUnion(me.email)
                        });
                    }

                    const container = document.createElement('div');
                    container.className = "msg-container " + (isMe ? 'sent' : 'received');
                
                    let nameHeader = "";
                    if(isGroupMode && !isMe) {
                        nameHeader = `<div class="sender-name">${data.sender.split('@')[0]}</div>`;
                    }

                    const m = document.createElement('div');
                    m.className = "msg";
                    if(data.msgType === "image") {
                        m.innerHTML = nameHeader + `<img src="${data.url}">`;
                    } else {
                        m.innerHTML = nameHeader + activateLinks(data.text);
                    }
                    
                    // 長押し & 右クリックメニューの共通化
                    const handleMenu = (e, clientX, clientY) => {
                        e.preventDefault();
                        popupMenu(clientX, clientY, msgId, isMe);
                    };

                    let touchTimer;
                    m.addEventListener('touchstart', (e) => {
                        touchTimer = setTimeout(() => handleMenu(e, e.touches[0].clientX, e.touches[0].clientY), 600);
                    });
                    m.addEventListener('touchend', () => clearTimeout(touchTimer));
                    m.addEventListener('contextmenu', (e) => handleMenu(e, e.clientX, e.clientY));

                    const meta = document.createElement('div');
                    meta.className = "msg-meta";
                    const timeStr = formatTime(data.time);
                    
                    // 既読数表示ロジック
                    let readLabel = "";
                    if (isMe && data.readBy) {
                        const readCount = data.readBy.filter(u => u !== me.email).length;
                        if(readCount > 0) {
                            readLabel = isGroupMode ? `既読 ${readCount} ` : "既読 ";
                        }
                    }
                    meta.innerText = readLabel + timeStr;

                    // リアクション表示
                    const heartBadge = document.createElement('div');
                    heartBadge.className = "heart-badge";
                    let reactString = "";
                    if(data.reactions) {
                        Object.keys(data.reactions).forEach(emoji => {
                            if(data.reactions[emoji]?.length > 0) reactString += emoji;
                        });
                    }
                    if (reactString !== "") {
                        heartBadge.innerText = reactString;
                        heartBadge.style.display = "flex";
                    }

                    container.appendChild(m);
                    container.appendChild(heartBadge);
                    container.appendChild(meta);
                    area.appendChild(container);
                });
                scrollChatToBottom();
            });
        }

        /* --- タイピング状態の更新ロジック --- */
        document.getElementById('msgInput').oninput = () => {
            if(!activeRoomId) return;
            setDoc(doc(db, "room_typing", activeRoomId), { [me.email]: true }, { merge: true });
            
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                setDoc(doc(db, "room_typing", activeRoomId), { [me.email]: false }, { merge: true });
            }, 2000);
        };

        /* --- コンテキストメニュー操作 --- */
        function popupMenu(x, y, msgId, isMe) {
            focusedMsgId = msgId;
            const menu = document.getElementById('msgMenu');
            menu.style.display = 'flex';
            menu.style.left = Math.min(x, window.innerWidth - 230) + 'px';
            menu.style.top = Math.min(y, window.innerHeight - 150) + 'px';
            document.getElementById('revokeBtn').style.display = isMe ? 'block' : 'none';
        }

        document.addEventListener('click', (e) => {
            if(!e.target.closest('#msgMenu') && !e.target.closest('.msg')) {
                document.getElementById('msgMenu').style.display = 'none';
            }
        });

        document.querySelectorAll('.emoji-opt').forEach(opt => {
            opt.onclick = async (e) => {
                const chosenEmoji = e.target.innerText;
                const msgRef = doc(db, "rooms", activeRoomId, "messages", focusedMsgId);
                
                await runTransaction(db, async (transaction) => {
                    const resDoc = await transaction.get(msgRef);
                    const currentData = resDoc.data();
                    const rMap = currentData.reactions || {};
                    if(!rMap[chosenEmoji]) rMap[chosenEmoji] = [];
                    
                    if(rMap[chosenEmoji].includes(me.email)) {
                        rMap[chosenEmoji] = rMap[chosenEmoji].filter(u => u !== me.email);
                    } else {
                        rMap[chosenEmoji].push(me.email);
                    }
                    transaction.update(msgRef, { reactions: rMap });
                });
                document.getElementById('msgMenu').style.display = 'none';
            };
        });

        document.getElementById('revokeBtn').onclick = async () => {
            if(confirm("このメッセージの送信を取り消しますか？")) {
                await deleteDoc(doc(db, "rooms", activeRoomId, "messages", focusedMsgId));
                document.getElementById('msgMenu').style.display = 'none';
            }
        };

        /* --- メッセージ送信処理 --- */
        async function closeChat() {
            if (!activeRoomId) return;
            // 退出時は入力中ステータスをオフにしてルームを抜ける
            await setDoc(doc(db, "room_typing", activeRoomId), { [me.email]: false }, { merge: true });
            await setDoc(doc(db, "room_status", activeRoomId), {
                current_users: arrayRemove(me.email)
            }, { merge: true });
            
            targetEmail = null;
            activeRoomId = null;
            show('homeView');
        }

        async function send() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text || !activeRoomId) return;

            // 送信時は即座にタイピング状態を消去
            setDoc(doc(db, "room_typing", activeRoomId), { [me.email]: false }, { merge: true });

            const msgData = {
                text: text,
                sender: me.email,
                time: Date.now(),
                msgType: "text",
                readBy: partnerInRoom ? [me.email, targetEmail] : [me.email],
                reactions: {}
            };
            input.value = "";

            await addDoc(collection(db, "rooms", activeRoomId, "messages"), msgData);
            
            // 相手側への新着バッジ通知ロジック
            if (!partnerInRoom) {
                const statusRef = doc(db, "room_status", activeRoomId);
                const snap = await getDoc(statusRef);
                let currentUsers = snap.exists() ? snap.data().current_users || [] : [];
                
                // 部屋に今いないユーザー全員を未読にする
                let allUsers = isGroupMode ? [] : [targetEmail];
                if (isGroupMode) {
                    const linkSnap = await getDoc(doc(db, "contact_links", activeRoomId));
                    if(linkSnap.exists()) allUsers = linkSnap.data().users.filter(u => u !== me.email);
                }
                
                const targetUnread = allUsers.filter(u => !currentUsers.includes(u));
                await setDoc(statusRef, { unread: arrayUnion(...targetUnread) }, { merge: true });
            }
        }

        /* --- 画像添付 --- */
        document.getElementById('clipBtn').onclick = () => document.getElementById('imageFileInput').click();
        document.getElementById('imageFileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file || !activeRoomId) return;
            
            try {
                const storageRef = ref(storage, 'airtext_photos/' + activeRoomId + '/' + Date.now() + '_' + file.name);
                const snapshot = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(snapshot.ref);

                const msgData = {
                    url: downloadURL,
                    sender: me.email,
                    time: Date.now(),
                    msgType: "image",
                    readBy: partnerInRoom ? [me.email, targetEmail] : [me.email],
                    reactions: {}
                };
                await addDoc(collection(db, "rooms", activeRoomId, "messages"), msgData);
            } catch(err) {
                alert("画像の送信に失敗しました: " + err.message);
            }
        };

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('msgInput').onkeypress = (e) => { if (e.key === 'Enter') send(); };
        document.getElementById('backBtn').onclick = closeChat;
    </script>
</head>
<body>

<div class="view" id="loginView">
    <div class="login-box">
        <h1 id="authTitle" style="font-size: 36px; margin: 0 0 25px 0; font-weight: 800; letter-spacing: -1px;">AirText Pro</h1>
        <button class="google-btn" id="googleLoginBtn">
            <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.79 2.7l2.78 2.16c1.63-1.5 2.57-3.71 2.57-6.49z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.78-2.16c-.77.52-1.76.83-3.18.83-2.45 0-4.52-1.65-5.26-3.87H.84v2.23C2.32 15.78 5.43 18 9 18z" fill="#34A853"/><path d="M3.74 10.62c-.19-.57-.3-1.18-.3-1.81s.11-1.24.3-1.81V4.77H.84C.31 5.84 0 7.04 0 8.3s.31 2.46.84 3.53l2.9-2.21z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35L15 2.05C13.46.6 11.43 0 9 0 5.43 0 2.32 2.22.84 5.23l2.9 2.21c.74-2.22 2.81-3.86 5.26-3.86z" fill="#EA4335"/></svg>
            Googleログイン
        </button>
        <div style="margin: 15px 0; color: #8e8e93; font-size: 14px;">または</div>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="pw" placeholder="パスワード">
        <button id="mainAuthBtn">ログイン</button>
        <div id="switchAuthMode" class="switch-link">新しくアカウントを作る(Sign Up)</div>
    </div>
</div>

<div class="view" id="homeView">
    <div class="header">
        <button class="icon-btn" id="toSettingsBtn">⚙️</button>
        <h2>AirText</h2>
        <div style="display: flex; align-items: center; gap: 12px;">
            <button class="icon-btn" id="makeGroupBtn">👥+</button>
            <div id="myEmail" style="font-size:11px; color:var(--text-muted); max-width: 80px; overflow: hidden; text-overflow: ellipsis;"></div>
        </div>
    </div>
    <div class="contact-list" id="contactList"></div>
    <div class="add-btn" id="addBtn">+</div>
</div>

<div class="view" id="chatView">
    <div class="chat-header">
        <button class="icon-btn" id="backBtn">◀</button>
        <div id="chatTitle" style="font-weight:700; font-size:17px; cursor:pointer; text-decoration: underline;"></div>
        <div style="width: 32px;"></div>
    </div>
    <div class="message-area" id="msgArea"></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-bar">
        <button class="icon-btn" id="clipBtn">📎</button>
        <input type="file" id="imageFileInput" accept="image/*" style="display:none;">
        <input type="text" id="msgInput" placeholder="メッセージを入力...">
        <button id="sendBtn" style="background:var(--primary-color); color:white; border:none; width:36px; height:36px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:bold;">↑</button>
    </div>
</div>

<div class="view" id="settingsView">
    <div class="chat-header" style="width:100%; position:absolute; top:0; left:0;">
        <button class="icon-btn" id="backFromSettings">◀ 戻る</button>
        <div style="font-weight:700;">プロフィール設定</div>
        <div style="width:32px;"></div>
    </div>
    <div class="setting-box">
        <label for="avatarInput" style="cursor: pointer;">
            <img class="avatar" id="myAvatarPreview" style="width:110px; height:110px; margin:0 auto; background:#ccc; border: 2px solid #e5e5ea;" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100%' height='100%' fill='%23ccc'/></svg>">
            <p style="font-size:13px; color:var(--primary-color); margin-top: 10px; font-weight: 500;">画像をタップして変更</p>
        </label>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;">
        <input type="text" id="nicknameInput" placeholder="ニックネームを入力">
        <button id="saveSettingsBtn">保存する</button>
    </div>
</div>

<div id="msgMenu">
    <div class="emoji-row">
        <span class="emoji-opt">❤️</span><span class="emoji-opt">👍</span><span class="emoji-opt">😂</span><span class="emoji-opt">😮</span><span class="emoji-opt">🙏</span>
    </div>
    <div class="menu-opt" id="revokeBtn">メッセージ送信取消</div>
</div>

</body>
</html>
