<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirText</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AirText">

    <style>
        :root {
            --primary-color: #007aff;
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-muted: #8e8e93;
            --bubble-sent: #007aff;
            --bubble-received: #e5e5ea;
        }

        html, body { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); overflow: hidden; color: var(--text-main); }
        .view { display: none; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; box-sizing: border-box; flex-direction: column; }
        
        #loginView { background: #000; color: white; justify-content: center; align-items: center; }
        .login-box { width: 320px; text-align: center; padding: 20px; margin: auto; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: none; background: #1c1c1e; color: white; font-size: 16px; -webkit-appearance: none; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary-color); color: white; font-size: 16px; cursor: pointer; margin-bottom: 12px; font-weight: bold; }
        .google-btn { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; background: white; color: #333; font-size: 16px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        .switch-link { color: var(--primary-color); cursor: pointer; text-decoration: underline; font-size: 14px; }

        #homeView { background: var(--bg-color); }
        .header { padding: 15px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); height: 60px; box-sizing: border-box; }
        .contact-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 0; }
        
        .contact-item { padding: 12px 20px; border-bottom: 1px solid rgba(0,0,0,0.03); display: flex; align-items: center; cursor: pointer; position: relative; background: var(--card-bg); margin: 0 0 1px 0; }
        .avatar { width: 48px; height: 48px; background: #ccc; border-radius: 50%; margin-right: 15px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 18px; object-fit: cover; overflow: hidden; }
        .badge { position: absolute; right: 25px; background: #ff3b30; color: white; padding: 3px 8px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .add-btn { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; box-shadow: 0 4px 12px rgba(0,122,255,0.3); cursor: pointer; z-index: 99; font-weight: 300; }
        .icon-btn { font-size: 22px; cursor: pointer; background: none; border: none; padding: 5px; color: var(--text-main); display: flex; align-items: center; justify-content: center; }

        #chatView { background: var(--bg-color); }
        .chat-header { padding: 15px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); height: 60px; box-sizing: border-box; }
        .message-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        
        .msg-container { max-width: 75%; margin-bottom: 14px; display: flex; flex-direction: column; position: relative; }
        .msg-container.sent { align-self: flex-end; align-items: flex-end; }
        .msg-container.received { align-self: flex-start; align-items: flex-start; }
        
        .msg { padding: 10px 16px; border-radius: 18px; font-size: 16px; line-height: 1.4; word-wrap: break-word; white-space: pre-wrap; user-select: none; -webkit-user-select: none; cursor: pointer; position: relative; transition: opacity 0.2s; }
        .sent .msg { background: var(--bubble-sent); color: white; border-bottom-right-radius: 4px; }
        .received .msg { background: var(--bubble-received); color: var(--text-main); border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 12px; display: block; margin-top: 5px; }
        .msg a { color: inherit; text-decoration: underline; font-weight: 600; }
        
        .msg-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; gap: 5px; padding: 0 4px; }
        
        .heart-badge { position: absolute; bottom: -8px; background: var(--card-bg); border: 1px solid rgba(0,0,0,0.05); border-radius: 10px; padding: 1px 5px; font-size: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); pointer-events: none; display: flex; gap: 2px; z-index: 10; }
        .sent .heart-badge { right: 10px; }
        .received .heart-badge { left: 10px; }

        #msgMenu { display: none; position: fixed; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); padding: 8px; z-index: 9999; flex-direction: column; width: 240px; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.05); }
        .emoji-row { display: flex; justify-content: space-around; padding-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 5px; }
        .emoji-opt { font-size: 26px; cursor: pointer; transition: transform 0.1s; padding: 4px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
        .emoji-opt:active { transform: scale(1.3); }
        .menu-opt { padding: 12px; color: #ff3b30; font-weight: 600; text-align: center; cursor: pointer; font-size: 15px; }
        
        .input-bar { padding: 10px 15px; display: flex; background: var(--card-bg); border-top: 1px solid rgba(0,0,0,0.05); align-items: center; height: 60px; box-sizing: border-box; gap: 8px; }
        .input-bar input[type="text"] { flex: 1; padding: 10px 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 20px; outline: none; font-size: 16px; -webkit-appearance: none; background: var(--bg-color); color: var(--text-main); }

        #settingsView { background: var(--bg-color); padding: 30px; align-items: center; flex-direction: column; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .setting-box { width: 100%; max-width: 350px; text-align: center; margin-top: 50px; padding-bottom: 40px; }
        .setting-box input[type="text"] { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid rgba(0,0,0,0.1); border-radius: 10px; font-size: 16px; box-sizing: border-box; background: var(--card-bg); color: var(--text-main); }

        #toastNotification {
            position: fixed; top: -100px; left: 5%; width: 90%; max-width: 400px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: white; padding: 15px 20px; border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 10000; font-size: 15px; display: flex; flex-direction: column; gap: 4px;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); cursor: pointer;
        }
        #toastNotification.show { top: 20px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
</head>
<body>

<div id="toastNotification" onclick="clickToast()">
    <div id="toastSender" style="font-weight: bold; color: #30b0c7; font-size: 13px;"></div>
    <div id="toastText" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
</div>

<div class="view" id="loginView">
    <div class="login-box">
        <h1 id="authTitle" style="font-size: 36px; margin-bottom: 30px; font-weight: 700; letter-spacing: -1px;">AirText</h1>
        <button class="google-btn" id="googleLoginBtn">🌐 Googleログイン</button>
        <div style="margin: 15px 0; color: #666; font-size: 14px;">または</div>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="pw" placeholder="パスワード">
        <button id="mainAuthBtn">ログイン</button>
        <div id="switchAuthMode" class="switch-link">新しくアカウントを作る(Sign Up)</div>
    </div>
</div>

<div class="view" id="homeView">
    <div class="header">
        <button class="icon-btn" id="toSettingsBtn">⚙️</button>
        <h2 style="margin:0; font-size:20px; font-weight: 700;">AirText</h2>
        <div style="display: flex; align-items: center; gap: 10px;">
            <button class="icon-btn" id="makeGroupBtn" style="font-size: 20px;">👥</button>
            <div id="myEmail" style="font-size:12px; color:var(--text-muted); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></div>
        </div>
    </div>
    <div class="contact-list" id="contactList"></div>
    <div class="add-btn" id="addBtn">+</div>
</div>

<div class="view" id="chatView">
    <div class="chat-header">
        <button class="icon-btn" id="backBtn" style="width:32px;">◀</button>
        <div id="chatTitle" style="font-weight:700; font-size:17px; cursor:pointer; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></div>
        <div style="width:32px;"></div>
    </div>
    <div class="message-area" id="msgArea"></div>
    <div class="input-bar">
        <button class="icon-btn" id="clipBtn" style="font-size: 20px; padding: 0 5px;">📎</button>
        <input type="file" id="imageFileInput" accept="image/*" style="display:none;">
        <input type="text" id="msgInput" placeholder="メッセージ">
        <button id="sendBtn" style="background:var(--primary-color); color:white; border:none; width:36px; height:36px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:bold;">↑</button>
    </div>
</div>

<div class="view" id="settingsView">
    <div class="chat-header" style="width:100%; position:absolute; top:0; left:0;">
        <button class="icon-btn" id="backFromSettings">◀ 戻る</button>
        <div style="font-weight:700;">プロフィール設定</div>
        <div style="width:32px;"></div>
    </div>
    <div class="setting-box">
        <label for="avatarInput" style="cursor: pointer;">
            <img class="avatar" id="myAvatarPreview" style="width:110px; height:110px; margin:0 auto; background:#ccc; border: 2px solid #e5e5ea;" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100%' height='100%' fill='%23ccc'/></svg>">
            <p style="font-size:13px; color:var(--primary-color); margin-top: 10px; font-weight: 500;">画像をタップして変更</p>
        </label>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;">
        <input type="text" id="nicknameInput" placeholder="ニックネームを入力">
        <button id="saveSettingsBtn" style="width:100%; padding:12px; background:#007aff; color:white; border:none; border-radius:10px; font-size:16px; margin-bottom: 12px;">保存する</button>
        
        <button id="logoutBtn" style="width:100%; padding:12px; background:#ff3b30; color:white; border:none; border-radius:10px; font-size:16px; font-weight: bold; cursor: pointer; margin-bottom: 30px;">ログアウト</button>

        <div style="font-size: 13px; color: var(--text-muted); text-align: center; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 15px;">
            AirText バージョン 1.1.0
        </div>
    </div>
</div>

<div id="msgMenu">
    <div class="emoji-row">
        <span class="emoji-opt">❤️</span><span class="emoji-opt">👍</span><span class="emoji-opt">😂</span><span class="emoji-opt">😮</span><span class="emoji-opt">🙏</span>
    </div>
    <div class="menu-opt" id="revokeBtn">メッセージ送信取消</div>
</div>

<script>
window.onerror = function(msg, url, line) {
        alert("プログラムエラー発生:\n" + msg + "\n行番号: " + line);
        return false;
    };

    var firebaseConfig = {
        apiKey: "AIzaSyAFxMMoJ6q0pQqRimkJaY6eDyBWgLqaNWc",
        authDomain: "airtext-mirboy.firebaseapp.com",
        projectId: "airtext-mirboy",
        storageBucket: "airtext-mirboy.firebasestorage.app",
        messagingSenderId: "1091018853143",
        appId: "1:1091018853143:web:c1ed8f39e4886656800552"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();
    var auth = firebase.auth();
    // ※ Firebase Storageは有料プラン制限のため使用停止
    var me = null, targetEmail = null, chatUnsub = null, statusUnsub = null;
    var myName = "", myAvatar = "";
    var isSignUpMode = false;
    var audioCtx = null;
    var partnerInRoom = false;
    var activeRoomId = null;
    var isGroupMode = false;
    var focusedMsgId = null;
    var toastTargetRoomId = null; 
    
    // 【修正】エラーの原因だった変数定義をここにしっかりと追加しました！
    var activeListeners = {}; 

    var OFFICIAL_EMAIL = "official@airtext.com";

    function activateLinks(text) {
        var urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, function(url) {
            return '<a href="' + url + '" target="_blank">' + url + '</a>';
        });
    }

    function triggerPopupNotification(sender, messageText, roomId) {
        if (activeRoomId === roomId) return;
        var senderName = sender === OFFICIAL_EMAIL ? "AirText公式" : sender;
        toastTargetRoomId = roomId;

        document.getElementById('toastSender').innerText = "💬 " + senderName;
        document.getElementById('toastText').innerText = messageText;

        var toast = document.getElementById('toastNotification');
        toast.classList.add('show');

        if (navigator.vibrate) {
            navigator.vibrate([150, 100, 150]);
        }

        setTimeout(function() {
            toast.classList.remove('show');
        }, 4000);
    }

    window.clickToast = function() {
        if (!toastTargetRoomId) return;
        document.getElementById('toastNotification').classList.remove('show');
        
        db.collection("contact_links").doc(toastTargetRoomId).get().then(function(doc) {
            if (doc.exists) {
                var data = doc.data();
                var isGroup = (data.type === "group");
                var other = "";
                if (!isGroup) {
                    other = data.users[0] === me.email ? data.users[1] : data.users[0];
                }
                openChat(toastTargetRoomId, isGroup, other, data.groupName || "");
            }
        });
    };

    function playNotificationSound() {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();
            osc.connect(gain); 
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime);
            osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
            osc.start(); osc.stop(audioCtx.currentTime + 0.35);
        } catch(e) {}
    }

    function formatTime(timestamp) {
        if (!timestamp) return "";
        var d = new Date(timestamp);
        var hr = String(d.getHours()).padStart(2, '0');
        var min = String(d.getMinutes()).padStart(2, '0');
        return hr + ":" + min;
    }

    function show(id) {
        var views = ['loginView', 'homeView', 'chatView', 'settingsView'];
        for (var i = 0; i < views.length; i++) {
            var v = document.getElementById(views[i]);
            if (v) { v.style.display = 'none'; }
        }
        var target = document.getElementById(id);
        if (target) { target.style.display = 'flex'; }
    }

    document.getElementById('googleLoginBtn').onclick = function() {
        var provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithRedirect(provider);
    };

    document.getElementById('switchAuthMode').onclick = function() {
        isSignUpMode = !isSignUpMode;
        if (isSignUpMode) {
            document.getElementById('authTitle').innerText = "AirText (Sign Up)";
            document.getElementById('mainAuthBtn').innerText = "新規アカウント登録";
            document.getElementById('switchAuthMode').innerText = "登録済みの方はこちら (Login)";
        } else {
            document.getElementById('authTitle').innerText = "AirText";
            document.getElementById('mainAuthBtn').innerText = "ログイン";
            document.getElementById('switchAuthMode').innerText = "新しくアカウントを作る(Sign Up)";
        }
    };

    document.getElementById('mainAuthBtn').onclick = function() {
        var emailStr = document.getElementById('email').value.trim();
        var pwStr = document.getElementById('pw').value.trim();
        if(!emailStr || !pwStr) return alert("入力してください");

        if (isSignUpMode) {
            auth.createUserWithEmailAndPassword(emailStr, pwStr)
                .then(function(userCredential) {
                    var newUserEmail = userCredential.user.email;
                    var linkId = [newUserEmail, OFFICIAL_EMAIL].sort().join("_");
                
                    db.collection("profiles").doc(newUserEmail).set({
                        name: newUserEmail.split("@")[0],
                        avatar: ""
                    }, { merge: true });

                    db.collection("contact_links").doc(linkId).set({
                        users: [newUserEmail, OFFICIAL_EMAIL],
                        type: "direct",
                        time: Date.now()
                    });

                    // 初回歓迎メッセージ（既読リストは最初は空配列）
                    db.collection("rooms").doc(linkId).collection("messages").add({
                        text: "AirTextへようこそ！ここには公式からの大切なお知らせが届きます。まずは友達を追加してチャットを始めてみましょう！",
                        sender: OFFICIAL_EMAIL,
                        time: Date.now(),
                        msgType: "text",
                        readBy: [], 
                        reactions: {}
                    });

                    db.collection("room_status").doc(linkId).set({
                        unread: newUserEmail
                    }, { merge: true });
                    alert("アカウントを作成しました！ログインしてください。");
                })
                .catch(function(e) { alert("登録失敗: " + e.message); });
        } else {
            auth.signInWithEmailAndPassword(emailStr, pwStr).catch(function() { alert("ログイン失敗"); });
        }
    };

    auth.onAuthStateChanged(function(user) {
        if (user) {
            me = user;
            document.getElementById('myEmail').innerText = me.email;
            
            db.collection("profiles").doc(me.email).onSnapshot(function(docSnap) {
                var data = docSnap.data();
                if (data) {
                    myName = data.name || "";
                    myAvatar = data.avatar || "";
                    document.getElementById('nicknameInput').value = myName;
                    if (myAvatar) document.getElementById('myAvatarPreview').src = myAvatar;
                } else {
                    db.collection("profiles").doc(me.email).set({
                        name: me.email.split("@")[0],
                        avatar: ""
                    }, { merge: true });
                }
                show('homeView');
                listenContacts();
                setupGlobalMessageListener();
            });
        } else {
            show('loginView');
        }
    });

    document.getElementById('toSettingsBtn').onclick = function() { show('settingsView'); };
    document.getElementById('backFromSettings').onclick = function() { show('homeView'); };
    document.getElementById('avatarInput').onchange = function(e) {
        var reader = new FileReader();
        reader.onload = function() { document.getElementById('myAvatarPreview').src = reader.result; };
        if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
    };
    document.getElementById('saveSettingsBtn').onclick = function() {
        var name = document.getElementById('nicknameInput').value.trim();
        var avatar = document.getElementById('myAvatarPreview').src;
        db.collection("profiles").doc(me.email).set({ name: name, avatar: avatar.indexOf('data') === 0 ? avatar : myAvatar }, { merge: true }).then(function() {
            alert("プロフィールを保存しました");
            show('homeView');
        });
    };

    document.getElementById('addBtn').onclick = function() {
        var mail = prompt("追加する相手のメールアドレスを入力:");
        if (!mail || mail === me.email) return;
        var linkId = [me.email, mail].sort().join("_");
        db.collection("contact_links").doc(linkId).set({ users: [me.email, mail], type: "direct", time: Date.now() });
    };

    document.getElementById('makeGroupBtn').onclick = function() {
        var gName = prompt("作成するグループ名を入力してください:");
        if(!gName) return;
        var mails = prompt("参加させるメンバーのメールアドレスをカンマ(,)区切りで入力してください:\n(例: friend1@test.com, friend2@test.com)");
        var userList = [me.email];
        if(mails) {
            var splitMails = mails.split(",");
            for(var i=0; i<splitMails.length; i++) {
                var m = splitMails[i].trim();
                if(m && m !== me.email) userList.push(m);
            }
        }
        var gId = "group_" + Date.now();
        db.collection("contact_links").doc(gId).set({ users: userList, type: "group", groupName: gName, time: Date.now() });
    };

    var firstLoad = true;
    function listenContacts() {
        db.collection("contact_links").where("users", "array-contains", me.email).onSnapshot(function(snap) {
            var list = document.getElementById('contactList');
            list.innerHTML = "";

            snap.forEach(function(d) {
                var data = d.data();
                var isGroup = (data.type === "group");
                var roomId = d.id;
                var other = "";
                var displayTitle = "";

                if (isGroup) {
                    displayTitle = "[グループ] " + data.groupName;
                } else {
                    var users = data.users;
                    other = users[0] === me.email ? users[1] : users[0];
                    displayTitle = other;
                }
                
                var safeId = roomId.replace(/[^a-zA-Z0-9]/g, "");
                var item = document.createElement('div');
                item.className = "contact-item";
                item.innerHTML = '<div class="avatar" id="av-'+safeId+'">' + (isGroup ? "👥" : displayTitle[0].toUpperCase()) + '</div><div style="font-weight:bold;" id="name-'+safeId+'">' + displayTitle + '</div>';
                
                if (!isGroup) {
                    db.collection("profiles").doc(other).onSnapshot(function(pSnap) {
                        var pData = pSnap.data();
                        if (pData) {
                            var avEl = document.getElementById('av-'+safeId);
                            if (pData.avatar && avEl) { avEl.innerHTML = ""; var img = document.createElement('img'); img.src = pData.avatar; img.className="avatar"; img.style.margin="0"; avEl.appendChild(img); }
                        }
                    });
                    db.collection("my_nicknames").doc(me.email).collection("targets").doc(other).onSnapshot(function(nSnap) {
                        var nmEl = document.getElementById('name-'+safeId);
                        if(nmEl) {
                            if(nSnap.exists && nSnap.data().alias) {
                                nmEl.innerText = nSnap.data().alias;
                            } else {
                                nmEl.innerText = (other === OFFICIAL_EMAIL) ? "AirText公式" : other;
                            }
                        }
                    });
                }

                db.collection("room_status").doc(roomId).onSnapshot(function(docSnap) {
                    var status = docSnap.data();
                    var b = item.querySelector('.badge');
                    if (status && status.unread && (status.unread === me.email || (isGroup && status.unread === "group_update"))) {
                         if (!b) {
                            b = document.createElement('div'); b.className = "badge"; b.innerText = "新着"; item.appendChild(b);
                            if (!firstLoad) { playNotificationSound(); }
                         }
                    } else { if (b) b.remove(); }
                });
                item.onclick = function() { openChat(roomId, isGroup, other, data.groupName); };
                list.appendChild(item);
            });
            firstLoad = false;
        });
    }

    function setupGlobalMessageListener() {
        db.collection("contact_links").where("users", "array-contains", me.email).onSnapshot(function(snap) {
            snap.forEach(function(d) {
                var roomId = d.id;
                if (activeListeners[roomId]) return;

                activeListeners[roomId] = db.collection("rooms").doc(roomId).collection("messages")
                    .orderBy("time", "desc").limit(1).onSnapshot(function(mSnap) {
                        mSnap.docChanges().forEach(function(change) {
                            if (change.type === "added") {
                                var msgData = change.doc.data();
                                if (msgData.time < Date.now() - 5000 || msgData.sender === me.email) return;

                                var displayMsg = msgData.msgType === "image" ? "📷 画像を受信しました" : msgData.text;
                                triggerPopupNotification(msgData.sender, displayMsg, roomId);
                            }
                        });
                    });
            });
        });
    }

    function openChat(roomId, isGroup, otherEmail, groupName) {
        activeRoomId = roomId;
        isGroupMode = isGroup;
        targetEmail = isGroup ? null : otherEmail;
        
        var titleEl = document.getElementById('chatTitle');
        if(isGroup) {
            titleEl.innerText = "[グループ] " + groupName;
        } else {
            titleEl.innerText = (targetEmail === OFFICIAL_EMAIL) ? "AirText公式" : targetEmail;
            
            db.collection("my_nicknames").doc(me.email).collection("targets").doc(targetEmail).onSnapshot(function(nSnap) {
                if(nSnap.exists && nSnap.data().alias) {
                    titleEl.innerText = nSnap.data().alias;
                }
            });
        }
        
        show('chatView');
        titleEl.onclick = function() {
            if(isGroupMode) return;
            var currentAlias = titleEl.innerText;
            var newAlias = prompt("この相手のあなた専用の呼び名（お母さん、妹など）を入力してください:", currentAlias);
            if(newAlias !== null) {
                db.collection("my_nicknames").doc(me.email).collection("targets").doc(targetEmail).set({ alias: newAlias.trim() });
            }
        };

        db.collection("room_status").doc(activeRoomId).set({ unread: "", current_users: firebase.firestore.FieldValue.arrayUnion(me.email) }, { merge: true });
        if(!isGroupMode) {
            if(statusUnsub) statusUnsub();
            statusUnsub = db.collection("room_status").doc(activeRoomId).onSnapshot(function(docSnap) {
                var status = docSnap.data();
                if (status && status.current_users && status.current_users.includes(targetEmail)) {
                    partnerInRoom = true;
                } else {
                    partnerInRoom = false;
                }
            });
        } else {
            partnerInRoom = false;
        }

        if (chatUnsub) chatUnsub();
        chatUnsub = db.collection("rooms").doc(activeRoomId).collection("messages").orderBy("time", "asc").onSnapshot(function(snap) {
            var area = document.getElementById('msgArea');
            area.innerHTML = "";
            
            snap.forEach(function(d) {
                var data = d.data();
                var msgId = d.id;
                var isMe = (data.sender === me.email);
                
                // 【バグB修正】受信時：未読を自分が開いたら、自分のアドレスをreadByへ追加
                var readByArray = data.readBy || [];
                if (!isMe && !readByArray.includes(me.email)) {
                    db.collection("rooms").doc(activeRoomId).collection("messages").doc(msgId).update({
                        readBy: firebase.firestore.FieldValue.arrayUnion(me.email)
                    });
                }
                
                var container = document.createElement('div');
                container.className = "msg-container " + (isMe ? 'sent' : 'received');
                
                var m = document.createElement('div');
                m.className = "msg";
                
                var senderDisplayName = data.sender;
                if (data.sender === OFFICIAL_EMAIL) {
                    senderDisplayName = "AirText公式";
                }
                
                if(data.msgType === "image") {
                    m.innerHTML = (isGroupMode ? '<div style="font-size:10px;color:#888;margin-bottom:4px;">'+senderDisplayName+'</div>':'') + '<img src="'+data.url+'">';
                } else {
                    m.innerHTML = (isGroupMode ? '<div style="font-size:10px;color:#888;margin-bottom:4px;">'+senderDisplayName+'</div>':'') + activateLinks(data.text);
                }
                
                var pressTimer;
                m.addEventListener('touchstart', function(e) {
                    pressTimer = setTimeout(function() {
                        popupMenu(e.touches[0].clientX, e.touches[0].clientY, msgId, isMe);
                    }, 600);
                });
                m.addEventListener('touchend', function() { clearTimeout(pressTimer); });
                m.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    popupMenu(e.clientX, e.clientY, msgId, isMe);
                });

                var meta = document.createElement('div');
                meta.className = "msg-meta";
                var timeStr = formatTime(data.time);

                // 【バグB修正】表示時：配列（readBy）に相手のアドレスが1つでも入っていれば既読
                if (isMe) {
                    var isRead = readByArray.length > 0;
                    var readText = isRead ? "既読 " : "";
                    meta.innerText = (isGroupMode ? "" : readText) + timeStr;
                } else {
                    meta.innerText = timeStr;
                }

                var heartBadge = document.createElement('div');
                heartBadge.className = "heart-badge";
                
                var reactString = "";
                if(data.reactions) {
                    for(var key in data.reactions) {
                        if(data.reactions[key] && data.reactions[key].length > 0) {
                            reactString += key;
                        }
                    }
                }
                if (reactString !== "") {
                    heartBadge.innerText = reactString;
                    heartBadge.style.display = "flex";
                } else {
                    heartBadge.style.display = "none";
                }

                container.appendChild(m);
                container.appendChild(heartBadge);
                container.appendChild(meta);
                area.appendChild(container);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    function popupMenu(x, y, msgId, isMe) {
        focusedMsgId = msgId;
        var menu = document.getElementById('msgMenu');
        menu.style.display = 'flex';
        menu.style.left = Math.min(x, window.innerWidth - 250) + 'px';
        menu.style.top = Math.min(y, window.innerHeight - 150) + 'px';
        
        document.getElementById('revokeBtn').style.display = isMe ? 'block' : 'none';
    }

    document.addEventListener('click', function(e) {
        if(!e.target.closest('#msgMenu') && !e.target.closest('.msg')) {
            document.getElementById('msgMenu').style.display = 'none';
        }
    });

    var emojiOpts = document.querySelectorAll('.emoji-opt');
    for(var i=0; i<emojiOpts.length; i++) {
        emojiOpts[i].onclick = function(e) {
            var chosenEmoji = e.target.innerText;
            var msgRef = db.collection("rooms").doc(activeRoomId).collection("messages").doc(focusedMsgId);
            
            db.runTransaction(function(transaction) {
                return transaction.get(msgRef).then(function(resDoc) {
                    var currentData = resDoc.data();
                    var rMap = currentData.reactions || {};
                    if(!rMap[chosenEmoji]) rMap[chosenEmoji] = [];
                        
                    if(rMap[chosenEmoji].includes(me.email)) {
                        rMap[chosenEmoji] = rMap[chosenEmoji].filter(function(u) { return u !== me.email; });
                    } else {
                        rMap[chosenEmoji].push(me.email);
                    }
                    transaction.update(msgRef, { reactions: rMap });
                });
            }).then(function() {
                document.getElementById('msgMenu').style.display = 'none';
            });
        };
    }

    document.getElementById('revokeBtn').onclick = function() {
        if(confirm("このメッセージの送信を取り消しますか？\n（お互いの画面から完全に消去されます）")) {
            db.collection("rooms").doc(activeRoomId).collection("messages").doc(focusedMsgId).delete().then(function() {
                document.getElementById('msgMenu').style.display = 'none';
            });
        }
    };

    function closeChat() {
        if (!activeRoomId) return;
        db.collection("room_status").doc(activeRoomId).set({
            current_users: firebase.firestore.FieldValue.arrayRemove(me.email)
        }, { merge: true });
        targetEmail = null;
        activeRoomId = null;
        show('homeView');
    }

    function send() {
        var input = document.getElementById('msgInput');
        var text = input.value.trim();
        if (!text || !activeRoomId) return;

        // 【バグB修正】送信時：readByの初期化（自分は含めない）
        var initialReadBy = [];
        if (partnerInRoom && targetEmail) {
            initialReadBy.push(targetEmail);
        }

        var msgData = {
            text: text,
            sender: me.email,
            time: Date.now(),
            msgType: "text",
            readBy: initialReadBy, 
            reactions: {}
        };
        input.value = "";

        db.collection("rooms").doc(activeRoomId).collection("messages").add(msgData).then(function() {
            if (!partnerInRoom && !isGroupMode) {
                db.collection("room_status").doc(activeRoomId).set({ unread: targetEmail }, { merge: true });
            } else if (isGroupMode) {
                db.collection("room_status").doc(activeRoomId).set({ unread: "group_update" }, { merge: true });
            }
        });
    }

    document.getElementById('clipBtn').onclick = function() {
        document.getElementById('imageFileInput').click();
    };

    // 【バグA修正】完全無料でFirestoreに直接Base64保存
    document.getElementById('imageFileInput').onchange = function(e) {
        var file = e.target.files[0];
        if(!file) return;

        var reader = new FileReader();
        reader.onload = function(event) {
            var base64Data = event.target.result;

            var initialReadBy = [];
            if (partnerInRoom && targetEmail) {
                initialReadBy.push(targetEmail);
            }

            var msgData = {
                url: base64Data, 
                sender: me.email,
                time: Date.now(),
                msgType: "image",
                readBy: initialReadBy,
                reactions: {}
            };

            db.collection("rooms").doc(activeRoomId).collection("messages").add(msgData).then(function() {
                if (!partnerInRoom && !isGroupMode) {
                    db.collection("room_status").doc(activeRoomId).set({ unread: targetEmail }, { merge: true });
                } else if (isGroupMode) {
                    db.collection("room_status").doc(activeRoomId).set({ unread: "group_update" }, { merge: true });
                }
            }).catch(function(err) {
                alert("画像の送信に失敗しました: " + err.message);
            });
        };
        reader.readAsDataURL(file); 
    };

    document.getElementById('sendBtn').onclick = send;
    document.getElementById('msgInput').onkeypress = function(e) { if (e.key === 'Enter' || e.keyCode === 13) send(); };
    document.getElementById('backBtn').onclick = closeChat;

    document.getElementById('logoutBtn').onclick = function() {
        if (confirm("ログアウトしますか？")) {
            auth.signOut().then(function() {
                alert("ログアウトしました");
                if (chatUnsub) chatUnsub();
                if (statusUnsub) statusUnsub();
                activeRoomId = null;
                targetEmail = null;
                show('loginView');
            }).catch(function(error) {
                alert("ログアウトに失敗しました: " + error.message);
            });
        }
    };
</body>
</html>
