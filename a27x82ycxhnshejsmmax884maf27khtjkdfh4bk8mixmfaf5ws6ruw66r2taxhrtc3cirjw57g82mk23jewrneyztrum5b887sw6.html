<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirText v1.3.0</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AirText">

    <style>
        /* =========================================
           🎨 Apple Style: Liquid Glass Theme (AirText v1.3.0)
           ========================================= */
        :root {
            --primary-color: #007aff;
            --bg-main: #e2e8f0; 
            --panel-bg: rgba(255, 255, 255, 0.45); 
            --panel-bg-dark: rgba(255, 255, 255, 0.65); 
            --glass-stroke: rgba(255, 255, 255, 0.4); 
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08); 
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --msg-me: #007aff;
            --msg-other: rgba(255, 255, 255, 0.7);
            --msg-text-me: #ffffff;
            --msg-text-other: #1d1d1f;
        }

        /* 🌙 Dark Aero Frost */
        [data-theme="dark"] {
            --bg-main: #000000;
            --panel-bg: rgba(28, 28, 30, 0.45);
            --panel-bg-dark: rgba(28, 28, 30, 0.65);
            --glass-stroke: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-main: #f5f5f7;
            --text-sub: #86868b;
            --msg-me: #0a84ff;
            --msg-other: rgba(44, 44, 46, 0.7);
            --msg-text-me: #ffffff;
            --msg-text-other: #f5f5f7;
        }

        * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg-main); overflow: hidden; color: var(--text-main); background-size: cover; background-position: center; transition: background 0.5s ease; }

        /* ⏳ Launcher Screen */
        #launcher { position: fixed; top:0; left:0; width:100%; height:100%; background:#ffffff; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; transition: opacity 0.4s ease; }
        [data-theme="dark"] #launcher { background: #1c1c1e; }
        .logo-anime { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #007aff, #5856d6, #ff2d55); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(0.98); opacity: 0.8; } 50% { transform: scale(1.02); opacity: 1; } }
        .spinner { width: 24px; height: 24px; border: 3px solid rgba(0,122,255,0.1); border-top: 3px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite; margin-top: 24px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 🔐 Auth Panel */
        #authScreen { display: none; width:100%; height:100%; flex-direction:column; justify-content:center; align-items:center; box-sizing: border-box; padding: 20px; }
        .glass-card { background: var(--panel-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-stroke); border-radius: 28px; box-shadow: var(--glass-shadow); padding: 32px; width: 100%; max-width: 360px; box-sizing: border-box; text-align: center; }
        .auth-title { font-size: 28px; font-weight: 700; margin-bottom: 24px; letter-spacing: -0.5px; }
        .apple-input { width: 100%; height: 46px; background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(0,0,0,0.05); border-radius: 12px; padding: 0 16px; font-size: 16px; box-sizing: border-box; margin-bottom: 12px; outline: none; transition: all 0.2s; }
        [data-theme="dark"] .apple-input { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .apple-input:focus { border-color: var(--primary-color); background: #ffffff; }
        [data-theme="dark"] .apple-input:focus { background: #2c2c2e; }
        .apple-btn { width: 100%; height: 46px; background: var(--primary-color); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 8px; }
        .apple-btn:active { opacity: 0.8; }
        .mode-switch { font-size: 14px; color: var(--primary-color); margin-top: 16px; cursor: pointer; display: inline-block; }

        /* 📱 Main Workspace */
        #appScreen { display: none; width:100%; height:100%; flex-direction:row; }
        
        /* 👥 Sidebar */
        #sidebar { width: 340px; height: 100%; background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-right: 1px solid var(--glass-stroke); display: flex; flex-direction: column; box-sizing: border-box; z-index: 10; transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); }
        .nav-header { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--glass-stroke); }
        .app-title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
        .icon-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; border-radius: 50%; transition: background 0.2s; color: var(--text-main); }
        .icon-btn:hover { background: rgba(0,0,0,0.05); }
        [data-theme="dark"] .icon-btn:hover { background: rgba(255,255,255,0.05); }

        .search-wrapper { padding: 12px 16px; }
        .search-bar { width: 100%; height: 36px; background: rgba(0,0,0,0.04); border: none; border-radius: 10px; padding: 0 12px; box-sizing: border-box; font-size: 14px; outline: none; color: var(--text-main); }
        [data-theme="dark"] .search-bar { background: rgba(255,255,255,0.06); }

        .list-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 20px; }
        
        /* スワイプコンテナ */
        .swipe-container { position: relative; width: 100%; overflow: hidden; background: #ff3b30; }
        .swipe-bg-read { position: absolute; top:0; left:0; width:100%; height:100%; background: #34c759; color: white; display: flex; align-items: center; padding-left: 20px; font-size: 14px; font-weight: bold; pointer-events: none; }

        .contact-item { position: relative; background: var(--panel-bg-dark); backdrop-filter: blur(10px); display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid rgba(0,0,0,0.03); cursor: pointer; transition: transform 0.2s cubic-bezier(0.1, 0.8, 0.2, 1), background 0.2s; user-select: none; }
        [data-theme="dark"] .contact-item { border-bottom: 1px solid rgba(255,255,255,0.02); }
        .contact-item:active { background: rgba(0,0,0,0.05); }
        .avatar { width: 44px; height: 44px; border-radius: 50%; background: #007aff; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 18px; margin-right: 14px; overflow: hidden; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; right: 20px; background: #ff3b30; color: #fff; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; padding: 0 5px; box-sizing: border-box; }

        .fab-add { position: absolute; right: 20px; bottom: 20px; width: 52px; height: 52px; background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px; box-shadow: 0 4px 16px rgba(0,122,255,0.3); cursor: pointer; z-index: 15; transition: transform 0.1s; }
        .fab-add:active { transform: scale(0.95); }

        /* 💬 Chat Stage */
        #chatStage { flex: 1; height: 100%; display: flex; flex-direction: column; background: rgba(255,255,255,0.2); position: relative; }
        .stage-placeholder { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-sub); font-size: 15px; }
        .stage-placeholder span { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }

        #chatMain { display: none; flex-direction: column; width: 100%; height: 100%; }
        .chat-header { height: 64px; background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-stroke); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 5; }
        .header-left { display: flex; align-items: center; }
        .back-btn { display: none; font-size: 20px; margin-right: 12px; cursor: pointer; color: var(--primary-color); }
        .active-title { font-size: 17px; font-weight: 600; }
        .header-actions { display: flex; gap: 8px; }

        .message-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; display: flex; flex-direction: column; gap: 12px; box-sizing: border-box; }
        
        /* チャット吹き出し・コンテナ構造 */
        .msg-row { display: flex; width: 100%; margin-bottom: 2px; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; }
        
        .msg-wrapper { max-width: 70%; display: flex; flex-direction: column; position: relative; }
        .msg-sender-name { font-size: 11px; color: var(--text-sub); margin-bottom: 3px; padding-left: 6px; }
        
        .msg-bubble { padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.02); position: relative; }
        .msg-row.me .msg-bubble { background: var(--msg-me); color: var(--msg-text-me); border-bottom-right-radius: 4px; }
        .msg-row.other .msg-bubble { background: var(--msg-other); color: var(--msg-text-other); border-bottom-left-radius: 4px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        
        .msg-time { font-size: 10px; color: var(--text-sub); margin-top: 3px; align-self: flex-end; padding: 0 6px; }
        .msg-row.me .msg-time { align-self: flex-end; }
        .msg-row.other .msg-time { align-self: flex-start; }

        /* 引用返信UI */
        .reply-quote-in-msg { background: rgba(0,0,0,0.06); padding: 6px 10px; border-left: 3px solid var(--primary-color); border-radius: 6px; font-size: 12px; margin-bottom: 6px; opacity: 0.8; word-break: break-all; max-height: 50px; overflow: hidden; }
        [data-theme="dark"] .reply-quote-in-msg { background: rgba(255,255,255,0.08); }
        .msg-row.me .reply-quote-in-msg { background: rgba(255,255,255,0.15); color: #fff; border-left-color: #fff; }

        /* リアクション表示 */
        .reaction-container { display: flex; flex-wrap: wrap; gap: 3px; margin-top: -4px; margin-bottom: 6px; z-index: 2; }
        .msg-row.me .reaction-container { justify-content: flex-end; padding-right: 4px; }
        .msg-row.other .reaction-container { justify-content: flex-start; padding-left: 4px; }
        .reaction-badge { background: var(--panel-bg-dark); border: 1px solid var(--glass-stroke); backdrop-filter: blur(10px); padding: 2px 6px; border-radius: 10px; font-size: 11px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 2px; }

        /* 入力エリア・引用プレビュー */
        .input-bar-container { background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--glass-stroke); display: flex; flex-direction: column; box-sizing: border-box; z-index: 5; }
        .reply-preview-bar { display: none; align-items: center; justify-content: space-between; padding: 8px 16px; background: rgba(0,0,0,0.02); border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 13px; color: var(--text-sub); }
        [data-theme="dark"] .reply-preview-bar { background: rgba(255,255,255,0.02); border-bottom: 1px solid rgba(255,255,255,0.05); }

        .input-action-row { display: flex; align-items: center; padding: 10px 16px; gap: 12px; }
        .chat-input { flex: 1; min-height: 38px; max-height: 100px; background: rgba(255,255,255,0.6); border: 1px solid rgba(0,0,0,0.05); border-radius: 18px; padding: 9px 14px; font-size: 15px; box-sizing: border-box; outline: none; color: var(--text-main); resize: none; overflow-y: auto; }
        [data-theme="dark"] .chat-input { background: rgba(255,255,255,0.05); }
        .send-btn { width: 34px; height: 34px; background: var(--primary-color); color: #fff; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; flex-shrink: 0; }

        /* 📋 Context Menu & Modals */
        .apple-context-menu { position: fixed; background: rgba(255,255,255,0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.3); border-radius: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); display: none; flex-direction: column; width: 220px; z-index: 2000; overflow: hidden; animation: menuOpen 0.15s ease-out; }
        [data-theme="dark"] .apple-context-menu { background: rgba(30,30,30,0.85); border-color: rgba(255,255,255,0.08); }
        @keyframes menuOpen { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
        
        .menu-reactions { display: flex; justify-content: space-around; padding: 10px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 20px; }
        [data-theme="dark"] .menu-reactions { border-bottom-color: rgba(255,255,255,0.05); }
        .menu-react-btn { cursor: pointer; transition: transform 0.1s; }
        .menu-react-btn:active { transform: scale(1.3); }

        .menu-item { padding: 12px 16px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; color: var(--text-main); }
        .menu-item:active { background: rgba(0,0,0,0.05); }
        [data-theme="dark"] .menu-item:active { background: rgba(255,255,255,0.05); }
        .menu-item.danger { color: #ff3b30; }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 3000; padding: 20px; box-sizing: border-box; }
        .modal-box { background: var(--panel-bg-dark); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: 1px solid var(--glass-stroke); border-radius: 24px; box-shadow: var(--glass-shadow); padding: 24px; width: 100%; max-width: 350px; box-sizing: border-box; text-align: center; }
        
        /* ⚙️ Setting Box (横幅対応中央寄せ) */
        .setting-box { width: 100%; max-width: 350px; text-align: center; margin: 60px auto 20px auto; padding: 24px; background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-stroke); border-radius: 24px; box-shadow: var(--glass-shadow); box-sizing: border-box; }

        /* 📞 Call Overlay */
        #callOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(28,28,30,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display:none; flex-direction:column; justify-content:space-between; align-items:center; z-index: 5000; padding: 60px 20px; box-sizing: border-box; color: #fff; }
        .call-user-info { text-align: center; margin-top: 40px; }
        .call-avatar { width: 90px; height: 90px; border-radius: 50%; background: #007aff; font-size: 36px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .call-status { font-size: 14px; color: #86868b; margin-top: 8px; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .call-actions { display: flex; gap: 32px; margin-bottom: 40px; }
        .call-btn { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border: none; color: white; transition: transform 0.1s; }
        .call-btn:active { transform: scale(0.9); }
        .call-btn.accept { background: #34c759; box-shadow: 0 4px 14px rgba(52,199,89,0.4); }
        .call-btn.decline { background: #ff3b30; box-shadow: 0 4px 14px rgba(255,59,48,0.4); }

        /* 📱 Responsive Adaptive Grid */
        @media (max-width: 768px) {
            #sidebar { width: 100%; position: absolute; left: 0; top: 0; }
            #sidebar.hidden { transform: translateX(-100%); }
            .back-btn { display: block; }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

    <div id="launcher">
        <div class="logo-anime">AirText</div>
        <div class="spinner"></div>
    </div>

    <div id="authScreen">
        <div class="glass-card">
            <div class="auth-title" id="authTitle">サインイン</div>
            <input type="email" id="email" class="apple-input" placeholder="メールアドレス">
            <input type="password" id="pw" class="apple-input" placeholder="パスワード">
            <button class="apple-btn" id="mainAuthBtn">進む</button>
            <div class="mode-switch" id="modeSwitch">新しいアカウントを作成</div>
        </div>
    </div>

    <div id="appScreen">
        <div id="sidebar">
            <div class="nav-header">
                <div class="icon-btn" id="openSettingsBtn">⚙️</div>
                <div class="app-title">AirText</div>
                <div style="display: flex; gap: 8px;">
                    <div class="icon-btn" id="scanQrBtn">📷</div>
                    <div class="icon-btn" id="createGroupBtn">👥</div>
                </div>
            </div>
            <div class="search-wrapper">
                <input type="text" id="searchBar" class="search-bar" placeholder="検索">
            </div>
            <div class="list-scroll" id="contactList"></div>
            <div class="fab-add" id="fabAddContact">+</div>
        </div>

        <div id="chatStage">
            <div class="stage-placeholder" id="placeholderView">
                <span>💬</span>
                トピックを選択してチャットを開始
            </div>
            
            <div id="chatMain">
                <div class="chat-header">
                    <div class="header-left">
                        <div class="back-btn" id="chatBackBtn">◀ 戻る</div>
                        <div class="active-title" id="chatTitle">ルーム</div>
                    </div>
                    <div class="header-actions">
                        <div class="icon-btn" id="voiceCallBtn">📞</div>
                        <div class="icon-btn" id="roomMenuBtn">⋮</div>
                    </div>
                </div>
                <div class="message-area" id="msgArea"></div>
                
                <div class="input-bar-container">
                    <div class="reply-preview-bar" id="replyPreviewBar">
                        <div id="replyPreviewText" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:85%;"></div>
                        <div style="cursor:pointer; font-weight:bold; padding:0 4px;" id="cancelReplyBtn">✕</div>
                    </div>
                    <div class="input-action-row">
                        <div class="icon-btn" id="timerModeBtn">⏳</div>
                        <textarea id="chatInput" class="chat-input" rows="1" placeholder="iMessage"></textarea>
                        <button class="send-btn" id="sendMsgBtn">➔</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="apple-context-menu" id="msgContextMenu">
        <div class="menu-reactions">
            <div class="menu-react-btn" data-emoji="👍">👍</div>
            <div class="menu-react-btn" data-emoji="❤️">❤️</div>
            <div class="menu-react-btn" data-emoji="😂">😂</div>
            <div class="menu-react-btn" data-emoji="😮">😮</div>
            <div class="menu-react-btn" data-emoji="😭">😭</div>
        </div>
        <div class="menu-item" id="menuReply">返信 (引用) <span>⌲</span></div>
        <div class="menu-item danger" id="menuDeleteMsg">削除 <span>🗑️</span></div>
    </div>

    <div class="apple-context-menu" id="roomContextMenu">
        <div class="menu-item" id="menuRoomRename">名前変更 (ニックネーム)</div>
        <div class="menu-item danger" id="menuRoomLeave">グループを退会 / 削除</div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="setting-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="font-weight:bold; font-size:18px;">設定</div>
                <div style="cursor:pointer; font-size:18px;" id="closeSettingsBtn">✕</div>
            </div>
            <div class="avatar" id="myAvatarSetting" style="margin:0 auto 12px auto; width:64px; height:64px; cursor:pointer;">👤</div>
            <div style="font-size:12px; color:var(--primary-color); margin-bottom:16px; cursor:pointer;" id="changeAvatarText">画像をタップして変更</div>
            <input type="text" id="myIdentityName" class="apple-input" placeholder="表示名">
            
            <div style="display:flex; align-items:center; justify-content:space-between; margin:16px 0; font-size:14px;">
                <span>🌙 ダークモード (Aero Dark)</span>
                <input type="checkbox" id="themeToggleCheckbox">
            </div>
            <div style="text-align:left; font-size:13px; margin-bottom:6px; color:var(--text-sub);">🖼️ 背景のカスタマイズ (色または画像URL)</div>
            <input type="text" id="bgCustomInput" class="apple-input" placeholder="例: #f2f2f7 または画像のURL">
            
            <button class="apple-btn" id="saveProfileBtn">保存する</button>
            <button class="apple-btn" id="logoutBtn" style="background:#ff3b30; margin-top:12px;">ログアウト</button>
            <div style="font-size:10px; color:var(--text-sub); margin-top:20px;">AirText バージョン 1.3.0</div>
        </div>
    </div>

    <div class="modal-overlay" id="groupModal">
        <div class="modal-box">
            <div style="font-weight:bold; margin-bottom:16px;">グループチャット作成</div>
            <input type="text" id="groupNameInput" class="apple-input" placeholder="グループ名">
            <input type="text" id="groupIconInput" class="apple-input" placeholder="絵文字アイコン (例: 👥)">
            <textarea id="groupMembersInput" class="apple-input" style="height:80px; padding:10px; resize:none;" placeholder="招待するメールアドレス&#13;&#10;(1行に1アドレスずつ入力)"></textarea>
            <div style="display:flex; gap:12px; margin-top:12px;">
                <button class="apple-btn" id="cancelGroupBtn" style="background:#8e8e93;">キャンセル</button>
                <button class="apple-btn" id="submitGroupBtn">作成</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="qrModal">
        <div class="modal-box">
            <div style="font-weight:bold; margin-bottom:16px;" id="qrModalTitle">QRコード</div>
            <div id="qrCodeContainer" style="display:none; justify-content:center; padding:10px; background:#fff; border-radius:12px; margin-bottom:16px;"></div>
            <div id="qrScannerContainer" style="display:none; width:100%; aspect-ratio:1; background:#000; border-radius:12px; overflow:hidden; margin-bottom:16px;"></div>
            <button class="apple-btn" id="closeQrBtn" style="background:#8e8e93;">閉じる</button>
        </div>
    </div>

    <div id="callOverlay">
        <div class="call-user-info">
            <div class="call-avatar" id="callAvatarEl">👤</div>
            <div style="font-size: 24px; font-weight:600;" id="callNameEl">ユーザー</div>
            <div class="call-status" id="callStatusEl">発信中...</div>
        </div>
        <div class="call-actions">
            <button class="call-btn accept" id="callAcceptBtn">📞</button>
            <button class="call-btn decline" id="callDeclineBtn">🔴</button>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE INITIALIZATION ---
        // ベータ運用の環境に応じて、必要であればConfigをここで変更してください。
        var firebaseConfig = {
            apiKey: "AIzaSyA4...",
            authDomain: "airtext.firebaseapp.com",
            projectId: "airtext",
            storageBucket: "airtext.appspot.com",
            messagingSenderId: "12345678",
            appId: "1:12345:web:abcd"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        var auth = firebase.auth(), db = firebase.firestore();

        // --- 2. APP CENTRAL STATE STATE ---
        var me = null, OFFICIAL_EMAIL = "official@airtext.com";
        var roomListUnsub = null, chatUnsub = null, statusUnsub = null, profileUnsub = null, globalCallUnsub = null;
        var activeRoomId = null, activeRoomIsGroup = false, activeOtherUser = "", activeGroupTitle = "";
        var focusedMsgId = null, focusedRoomId = null, focusedOtherUser = null;
        var replyTargetData = null, timerMinutes = 0;
        var blockList = [], hiddenRooms = [];
        var html5QrScanner = null;

        // --- 📞 WebRTC P2P Call Engine ---
        var localStream = null, peerConnection = null, currentCallDocId = null;
        var rtcConfig = { iceServers: [{ urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"] }] };

        // --- 3. THEME SYSTEM ---
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('airtext_theme', theme);
            var chk = document.getElementById('themeToggleCheckbox');
            if(chk) chk.checked = (theme === 'dark');
        }
        var savedTheme = localStorage.getItem('airtext_theme') || 'light';
        applyTheme(savedTheme);

        // --- 4. LIFECYCLE LISTENERS (AUTHENTICATION) ---
        auth.onAuthStateChanged(function(user) {
            var launcher = document.getElementById('launcher');
            if (user) {
                me = user;
                db.collection("profiles").doc(me.email).get().then(function(doc) {
                    if (doc.exists) {
                        var d = doc.data();
                        blockList = d.blockList || [];
                        hiddenRooms = d.hiddenRooms || [];
                        if(d.theme) applyTheme(d.theme);
                        if(d.bgCustom) document.body.style.backgroundImage = "url('" + d.bgCustom + "')";
                    }
                    launcher.style.opacity = '0'; setTimeout(function(){ launcher.style.display='none'; }, 400);
                    document.getElementById('authScreen').style.display = 'none';
                    document.getElementById('appScreen').style.display = 'flex';
                    syncMyProfileMeta();
                    listenContacts();
                    listenIncomingCalls();
                });
            } else {
                me = null; stopAllListeners();
                launcher.style.opacity = '0'; setTimeout(function(){ launcher.style.display='none'; }, 400);
                document.getElementById('appScreen').style.display = 'none';
                document.getElementById('authScreen').style.display = 'flex';
            }
        });

        function stopAllListeners() {
            if (roomListUnsub) roomListUnsub(); if (chatUnsub) chatUnsub(); if (statusUnsub) statusUnsub();
            if (profileUnsub) profileUnsub(); if (globalCallUnsub) globalCallUnsub();
        }

        // --- 5. SECURE INPUT INTERACTION ---
        var txtArea = document.getElementById('chatInput');
        txtArea.addEventListener('input', function() {
            this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // --- 6. CORE LOGIC: TALK LIST SUBSCRIPTION (🛡️真っ白バグの安全弁付き修正) ---
        function listenContacts() {
            if (roomListUnsub) roomListUnsub();
            
            // ① メイン処理：最新順（orderBy）を試みる
            var query = db.collection("contact_links")
                          .where("users", "array-contains", me.email)
                          .orderBy("time", "desc");

            // 共通の描画レンダラー
            function renderRooms(snap) {
                var list = document.getElementById('contactList');
                list.innerHTML = "";
                if(snap.empty) { return; }
                
                snap.forEach(function(d) {
                    var roomId = d.id;
                    var data = d.data();
                    if (hiddenRooms.includes(roomId)) return;

                    var isGroup = (data.type === "group");
                    var other = "";
                    var displayTitle = isGroup ? "[グループ] " + (data.groupName || "無題") : "";

                    if (!isGroup) {
                        var users = data.users;
                        other = users[0] === me.email ? users[1] : users[0];
                        if (blockList.includes(other)) return;
                        displayTitle = other;
                    }

                    var safeId = roomId.replace(/[^a-zA-Z0-9]/g, "");
                    var container = document.createElement('div');
                    container.className = "swipe-container";
                    
                    var swipeBg = document.createElement('div');
                    swipeBg.className = "swipe-bg-read";
                    swipeBg.innerText = "既読化 ➔";
                    
                    var item = document.createElement('div');
                    item.className = "contact-item";
                    item.innerHTML = '<div class="avatar" id="av-'+safeId+'">' + (isGroup ? (data.groupIcon || "👥") : displayTitle[0].toUpperCase()) + '</div><div style="font-weight:bold;" id="name-'+safeId+'">' + displayTitle + '</div>';
                    
                    container.appendChild(swipeBg);
                    container.appendChild(item);

                    // リアルタイムプロフィール＆ニックネーム同期
                    if (!isGroup) {
                        db.collection("profiles").doc(other).onSnapshot(function(pSnap) {
                            var pData = pSnap.data();
                            var avEl = document.getElementById('av-'+safeId);
                            if (pData && pData.avatar && avEl) {
                                avEl.innerHTML = "";
                                var img = document.createElement('img');
                                img.src = pData.avatar;
                                img.className = "avatar";
                                img.crossOrigin = "anonymous"; // 🛡️ Script Errorを予防するCORS設定
                                img.style.margin = "0";
                                avEl.appendChild(img);
                            }
                        });
                        db.collection("my_nicknames").doc(me.email).collection("targets").doc(other).onSnapshot(function(nSnap) {
                            var nmEl = document.getElementById('name-'+safeId);
                            if(nmEl) nmEl.innerText = (nSnap.exists && nSnap.data().alias) ? nSnap.data().alias : ((other === OFFICIAL_EMAIL) ? "AirText公式" : other);
                        });
                    }

                    // バッジ同期
                    db.collection("room_status").doc(roomId).onSnapshot(function(docSnap) {
                        var status = docSnap.data();
                        var b = item.querySelector('.badge');
                        if (status && status.unread && (status.unread === me.email || (isGroup && status.unread === "group_update"))) {
                            var count = status.unreadCount || 1;
                            if (!b) { b = document.createElement('div'); b.className = "badge"; item.appendChild(b); }
                            b.innerText = count;
                        } else { if (b) b.remove(); }
                    });

                    // スワイプジェスチャー処理
                    var startX = 0, currentX = 0;
                    item.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, {passive: true});
                    item.addEventListener('touchmove', function(e) {
                        currentX = e.touches[0].clientX;
                        var diff = currentX - startX;
                        if (diff < 0) { var move = Math.max(diff, -100); item.style.transform = 'translateX(' + move + 'px)'; }
                    }, {passive: true});
                    item.addEventListener('touchend', function(e) {
                        var diff = currentX - startX;
                        if (diff < -60) {
                            item.style.transform = 'translateX(-100%)';
                            setTimeout(function() {
                                db.collection("room_status").doc(roomId).set({ unread: "", unreadCount: 0 }, { merge: true });
                                item.style.transform = 'translateX(0)';
                            }, 300);
                        } else { item.style.transform = 'translateX(0)'; }
                        startX = 0; currentX = 0;
                    });

                    // コンテキストメニュー長押し
                    var pressTimer;
                    function openRoomMenu(clientX, clientY) {
                        focusedRoomId = roomId; focusedOtherUser = other;
                        var menu = document.getElementById('roomContextMenu');
                        menu.style.display = 'flex';
                        menu.style.left = Math.min(clientX, window.innerWidth - 230) + 'px';
                        menu.style.top = Math.min(clientY, window.innerHeight - 150) + 'px';
                    }
                    item.addEventListener('touchstart', function(e) { pressTimer = setTimeout(function() { openRoomMenu(e.touches[0].clientX, e.touches[0].clientY); }, 700); }, {passive: true});
                    item.addEventListener('touchend', function() { clearTimeout(pressTimer); });
                    item.addEventListener('contextmenu', function(e) { e.preventDefault(); openRoomMenu(e.clientX, e.clientY); });

                    item.addEventListener('click', function(e) { if(currentX - startX === 0) { initAudio(); openChat(roomId, isGroup, other, data.groupName); } });
                    list.appendChild(container);
                });
            }

            // 🛡️ 修正箇所：インデックス未作成でエラーが返った場合のフォールバック安全弁
            roomListUnsub = query.onSnapshot(renderRooms, function(error) {
                console.warn("Firestoreの複合インデックスが未生成です。並び替えをバイパスしてリストを表示します:", error);
                
                // インデックスがない場合は、orderByを排除したクエリで再バインド（これで真っ白化が完全に防げます）
                db.collection("contact_links")
                  .where("users", "array-contains", me.email)
                  .onSnapshot(renderRooms, function(err2) {
                      console.error("予備クエリでも取得に失敗しました:", err2);
                  });
            });
        }

        // --- 7. CHAT STAGE LIFE OPERATION ---
        function openChat(roomId, isGroup, otherUser, groupName) {
            activeRoomId = roomId; activeRoomIsGroup = isGroup; activeOtherUser = otherUser; activeGroupTitle = groupName || "無題のグループ";
            
            document.getElementById('placeholderView').style.display = 'none';
            document.getElementById('chatMain').style.display = 'flex';
            if (window.innerWidth <= 768) { document.getElementById('sidebar').classList.add('hidden'); }

            var titleEl = document.getElementById('chatTitle');
            if (isGroup) { titleEl.innerText = activeGroupTitle; } else { titleEl.innerText = otherUser; }

            // 未読クリア
            db.collection("room_status").doc(roomId).set({ unread: "", unreadCount: 0 }, { merge: true });

            // メッセージ取得リアルタイムストリーム
            if (chatUnsub) chatUnsub();
            chatUnsub = db.collection("rooms").doc(roomId).collection("messages").orderBy("time", "asc").onSnapshot(function(snapshot) {
                var area = document.getElementById('msgArea');
                area.innerHTML = "";
                snapshot.forEach(function(doc) {
                    var mId = doc.id;
                    var data = doc.data();
                    area.appendChild(renderMessage(mId, data));
                });
                area.scrollTop = area.scrollHeight;
            });
        }

        // --- 8. MESSAGE RENDERING ARCHITECTURE (🛡️ Script errorを発生させない安全設計) ---
        function renderMessage(msgId, data) {
            var isMe = (data.sender === me.email);
            
            var row = document.createElement('div');
            row.className = "msg-row " + (isMe ? "me" : "other");
            
            var wrapper = document.createElement('div');
            wrapper.className = "msg-wrapper";
            
            if (activeRoomIsGroup && !isMe) {
                var sName = document.createElement('div');
                sName.className = "msg-sender-name";
                sName.innerText = data.sender.split("@")[0];
                wrapper.appendChild(sName);
            }
            
            var bubble = document.createElement('div');
            bubble.className = "msg-bubble";

            // 🛡️ 修正箇所：引用データ構造(replyTo)が存在するかを徹底チェックしクラッシュを完全回避
            if (data && data.replyTo && typeof data.replyTo === 'object' && data.replyTo.text) {
                var quoteDiv = document.createElement("div");
                quoteDiv.className = "reply-quote-in-msg";
                quoteDiv.innerText = "⌲ " + data.replyTo.text;
                bubble.appendChild(quoteDiv);
            }

            // メッセージ本文の注入
            var textNode = document.createElement('div');
            textNode.innerText = data.text || "";
            bubble.appendChild(textNode);
            wrapper.appendChild(bubble);

            // リアクションバッジの構築
            if (data.reactions && Object.keys(data.reactions).length > 0) {
                var rcContainer = document.createElement('div');
                rcContainer.className = "reaction-container";
                
                var counts = {};
                Object.values(data.reactions).forEach(function(emo) { counts[emo] = (counts[emo] || 0) + 1; });
                
                Object.keys(counts).forEach(function(emo) {
                    var rBadge = document.createElement('div');
                    rBadge.className = "reaction-badge";
                    rBadge.innerText = emo + " " + counts[emo];
                    rcContainer.appendChild(rBadge);
                });
                wrapper.appendChild(rcContainer);
            }

            // 送信時刻表示
            var timeEl = document.createElement('div');
            timeEl.className = "msg-time";
            if(data.time) {
                var date = new Date(data.time);
                timeEl.innerText = date.getHours() + ":" + (date.getMinutes() < 10 ? "0" : "") + date.getMinutes();
            }
            wrapper.appendChild(timeEl);
            row.appendChild(wrapper);

            // メッセージ長押しメニューバインド
            var msgTimer;
            bubble.addEventListener('touchstart', function(e) {
                msgTimer = setTimeout(function() {
                    focusedMsgId = msgId;
                    var menu = document.getElementById('msgContextMenu');
                    menu.style.display = 'flex';
                    menu.style.left = Math.min(e.touches[0].clientX, window.innerWidth - 230) + 'px';
                    menu.style.top = Math.min(e.touches[0].clientY, window.innerHeight - 250) + 'px';
                }, 700);
            }, {passive: true});
            bubble.addEventListener('touchend', function() { clearTimeout(msgTimer); });
            bubble.addEventListener('contextmenu', function(e) {
                e.preventDefault(); focusedMsgId = msgId;
                var menu = document.getElementById('msgContextMenu');
                menu.style.display = 'flex'; menu.style.left = Math.min(e.clientX, window.innerWidth - 230) + 'px'; menu.style.top = Math.min(e.clientY, window.innerHeight - 250) + 'px';
            });

            return row;
        }

        // --- 9. SEND MESSAGE SYSTEM ---
        document.getElementById('sendMsgBtn').onclick = sendMessageAction;
        function sendMessageAction() {
            var input = document.getElementById('chatInput');
            var text = input.value.trim();
            if (!text || !activeRoomId) return;

            var msgPayload = {
                text: text,
                sender: me.email,
                time: Date.now(),
                msgType: "text"
            };

            // 引用情報がある場合は結合
            if (replyTargetData) {
                msgPayload.replyTo = { text: replyTargetData.text, sender: replyTargetData.sender };
                cancelReplyAction();
            }

            function executeSend() {
                db.collection("rooms").doc(activeRoomId).collection("messages").add(msgPayload).then(function() {
                    // 相手への未読バッジトリガー
                    var targetUnread = activeRoomIsGroup ? "group_update" : activeOtherUser;
                    db.collection("room_status").doc(activeRoomId).set({
                        unread: targetUnread,
                        unreadCount: firebase.firestore.FieldValue.increment(1)
                    }, { merge: true });
                    
                    // 最終更新時間を更新
                    db.collection("contact_links").doc(activeRoomId).set({ time: Date.now() }, { merge: true });
                });
            }

            if (timerMinutes > 0) {
                alert(timerMinutes + "分後に自動的に送信予約されました。");
                setTimeout(executeSend, timerMinutes * 60 * 1000);
                setTimerMode(0);
            } else {
                executeSend();
            }

            input.value = ""; input.style.height = '38px';
        }

        // --- 10. REACTION & REPLY MECHANICS ---
        document.querySelectorAll('.menu-react-btn').forEach(function(btn) {
            btn.onclick = function() {
                var emo = this.getAttribute('data-emoji');
                if(activeRoomId && focusedMsgId) {
                    var ref = db.collection("rooms").doc(activeRoomId).collection("messages").doc(focusedMsgId);
                    var update = {}; update["reactions." + me.email.replace(/\./g, "_")] = emo;
                    ref.update(update);
                }
                document.getElementById('msgContextMenu').style.display = 'none';
            };
        });

        document.getElementById('menuReply').onclick = function() {
            if(activeRoomId && focusedMsgId) {
                db.collection("rooms").doc(activeRoomId).collection("messages").doc(focusedMsgId).get().then(function(d) {
                    if (d.exists) {
                        replyTargetData = d.data();
                        document.getElementById('replyPreviewText').innerText = replyTargetData.sender.split("@")[0] + ": " + replyTargetData.text;
                        document.getElementById('replyPreviewBar').style.display = 'flex';
                    }
                });
            }
            document.getElementById('msgContextMenu').style.display = 'none';
        };
        document.getElementById('cancelReplyBtn').onclick = cancelReplyAction;
        function cancelReplyAction() { replyTargetData = null; document.getElementById('replyPreviewBar').style.display = 'none'; }

        document.getElementById('menuDeleteMsg').onclick = function() {
            if(activeRoomId && focusedMsgId && confirm("このメッセージを削除しますか？")) {
                db.collection("rooms").doc(activeRoomId).collection("messages").doc(focusedMsgId).delete();
            }
            document.getElementById('msgContextMenu').style.display = 'none';
        };

        document.getElementById('timerModeBtn').onclick = function() {
            var res = prompt("何分後に予約送信しますか？ (0で通常送信)", timerMinutes);
            var mins = parseInt(res, 10);
            setTimerMode(isNaN(mins) ? 0 : mins);
        };
        function setTimerMode(mins) {
            timerMinutes = mins;
            var btn = document.getElementById('timerModeBtn');
            if (timerMinutes > 0) { btn.innerText = "⏳" + timerMinutes + "m"; btn.style.color = "var(--primary-color)"; }
            else { btn.innerText = "⏳"; btn.style.color = "var(--text-main)"; }
        }

        // --- 11. MODAL WINDOW TRIGGERS ---
        document.getElementById('openSettingsBtn').onclick = function() { document.getElementById('settingsModal').style.display = 'flex'; };
        document.getElementById('closeSettingsBtn').onclick = function() { document.getElementById('settingsModal').style.display = 'none'; };
        
        document.getElementById('createGroupBtn').onclick = function() { document.getElementById('groupModal').style.display = 'flex'; };
        document.getElementById('cancelGroupBtn').onclick = function() { document.getElementById('groupModal').style.display = 'none'; };

        document.getElementById('chatBackBtn').onclick = function() {
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('chatMain').style.display = 'none';
            document.getElementById('placeholderView').style.display = 'flex';
        };

        // --- 12. QR CODE ENGINE (SECURITY RELAXED FOR ADAPTIVE IOS/SAFARI ENVIRONMENT) ---
        document.getElementById('scanQrBtn').onclick = function() {
            document.getElementById('qrModalTitle').innerText = "QRスキャン（友達追加）";
            document.getElementById('qrCodeContainer').style.display = 'none';
            document.getElementById('qrScannerContainer').style.display = 'block';
            document.getElementById('qrModal').style.display = 'flex';

            html5QrScanner = new Html5Qrcode("qrScannerContainer");
            
            var startScanner = function(config) {
                return html5QrScanner.start(
                    config,
                    { fps: 10, qrbox: 200 },
                    function(qrCodeMessage) {
                        if (qrCodeMessage.indexOf("airtext_add:") === 0) {
                            var targetMail = qrCodeMessage.split(":")[1].trim();
                            html5QrScanner.stop().then(function() {
                                document.getElementById('qrModal').style.display = 'none';
                                if (targetMail === me.email) return;
                                var linkId = [me.email, targetMail].sort().join("_");
                                db.collection("contact_links").doc(linkId).set({ users: [me.email, targetMail], type: "direct", time: Date.now() }).then(function() {
                                    alert("QRコードから友達を追加しました！: " + targetMail);
                                });
                            });
                        }
                    },
                    function(errorMessage) {}
                );
            };

            // まず背面カメラでスキャンを試みる
            startScanner({ facingMode: "environment" }).catch(function(err) {
                console.warn("背面カメラ固定の起動に失敗しました。制約を緩めて再試行します:", err);
                // エラー時は何でも良いので認識できる標準カメラでフォールバック起動
                startScanner({}).catch(function(err2) {
                    alert("カメラの起動に完全に失敗しました。ブラウザの権限設定を確認してください: " + err2);
                });
            });
        };

        document.getElementById('fabAddContact').onclick = function() {
            var targetMail = prompt("追加したい相手のメールアドレスを入力してください:");
            if(!targetMail) return;
            targetMail = targetMail.trim();
            if(targetMail === me.email) return alert("自分自身を追加することはできません。");
            var linkId = [me.email, targetMail].sort().join("_");
            db.collection("contact_links").doc(linkId).set({ users: [me.email, targetMail], type: "direct", time: Date.now() }).then(function() {
                alert("友達を追加しました！");
            });
        };

        document.getElementById('myAvatarSetting').onclick = function() {
            var url = prompt("プロフィールの画像URLを入力してください (Square推奨):");
            if(url !== null) {
                db.collection("profiles").doc(me.email).set({ avatar: url.trim() }, { merge: true }).then(function() {
                    syncMyProfileMeta();
                });
            }
        };
        document.getElementById('changeAvatarText').onclick = function() { document.getElementById('myAvatarSetting').click(); };

        function syncMyProfileMeta() {
            db.collection("profiles").doc(me.email).get().then(function(doc) {
                if (doc.exists && doc.data().avatar) {
                    var el = document.getElementById('myAvatarSetting');
                    el.innerHTML = ""; var img = document.createElement('img');
                    img.src = doc.data().avatar; img.className="avatar"; img.style.margin="0"; img.style.width="100%"; img.style.height="100%";
                    el.appendChild(img);
                }
                if (doc.exists && doc.data().name) {
                    document.getElementById('myIdentityName').value = doc.data().name;
                }
            });
        }

        document.getElementById('saveProfileBtn').onclick = function() {
            var nameStr = document.getElementById('myIdentityName').value.trim();
            var bgStr = document.getElementById('bgCustomInput').value.trim();
            var pData = { name: nameStr, theme: savedTheme, bgCustom: bgStr };
            db.collection("profiles").doc(me.email).set(pData, { merge: true }).then(function() {
                if(bgStr) { document.body.style.backgroundImage = "url('" + bgStr + "')"; }
                else { document.body.style.backgroundImage = "none"; }
                alert("プロフィール情報を更新しました。");
                document.getElementById('settingsModal').style.display = 'none';
            });
        };

        document.getElementById('themeToggleCheckbox').onchange = function() {
            savedTheme = this.checked ? 'dark' : 'light';
            applyTheme(savedTheme);
        };

        // --- 13. GROUP MANAGEMENT SYSTEM ---
        document.getElementById('submitGroupBtn').onclick = function() {
            var gName = document.getElementById('groupNameInput').value.trim();
            var gIcon = document.getElementById('groupIconInput').value.trim() || "👥";
            var rawMems = document.getElementById('groupMembersInput').value.split("\n");
            
            if(!gName) return alert("グループ名を入力してください");
            
            var members = [me.email];
            rawMems.forEach(function(m) { var em = m.trim(); if(em && !members.includes(em)) members.push(em); });

            var newRoomId = "group_" + Date.now() + "_" + Math.floor(Math.random()*1000);
            db.collection("contact_links").doc(newRoomId).set({
                users: members,
                type: "group",
                groupName: gName,
                groupIcon: gIcon,
                time: Date.now()
            }).then(function() {
                db.collection("rooms").doc(newRoomId).collection("messages").add({
                    text: gName + " グループが作成されました。",
                    sender: OFFICIAL_EMAIL,
                    time: Date.now(),
                    msgType: "text"
                });
                document.getElementById('groupModal').style.display = 'none';
                document.getElementById('groupNameInput').value = "";
                document.getElementById('groupMembersInput').value = "";
            });
        };

        // ルームコンテキスト処理
        document.getElementById('menuRoomRename').onclick = function() {
            if(focusedRoomId && !activeRoomIsGroup) {
                var name = prompt("この相手へのニックネームを入力してください:");
                if(name !== null) {
                    db.collection("my_nicknames").doc(me.email).collection("targets").doc(focusedOtherUser).set({ alias: name.trim() });
                }
            } else if (focusedRoomId && activeRoomIsGroup) {
                var name = prompt("新しいグループ名を入力してください:", activeGroupTitle);
                if(name) { db.collection("contact_links").doc(focusedRoomId).set({ groupName: name.trim() }, { merge: true }); }
            }
            document.getElementById('roomContextMenu').style.display = 'none';
        };

        document.getElementById('menuRoomLeave').onclick = function() {
            if(!focusedRoomId) return;
            if (activeRoomIsGroup) {
                if(confirm("このグループから退会しますか？")) {
                    db.collection("contact_links").doc(focusedRoomId).get().then(function(doc) {
                        if(doc.exists) {
                            var users = doc.data().users || [];
                            var idx = users.indexOf(me.email);
                            if(idx > -1) {
                                users.splice(idx, 1);
                                db.collection("contact_links").doc(focusedRoomId).set({ users: users }, { merge: true }).then(function() {
                                    document.getElementById('chatBackBtn').click();
                                });
                            }
                        }
                    });
                }
            } else {
                if(confirm("このトークルームを非表示にしますか？")) {
                    hiddenRooms.push(focusedRoomId);
                    db.collection("profiles").doc(me.email).set({ hiddenRooms: hiddenRooms }, { merge: true }).then(function() {
                        document.getElementById('chatBackBtn').click();
                        listenContacts();
                    });
                }
            }
            document.getElementById('roomContextMenu').style.display = 'none';
        };

        // --- 14. AUTH ACCOUNT CREATION SWITCH ---
        var isSignUpMode = false;
        document.getElementById('modeSwitch').onclick = function() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('authTitle').innerText = isSignUpMode ? "アカウント作成" : "サインイン";
            this.innerText = isSignUpMode ? "すでにアカウントをお持ちですか？ サインイン" : "新しいアカウントを作成";
        };

        // 既読用オーディオ初期化
        var audioContextInited = false;
        function initAudio() { if (audioContextInited) return; audioContextInited = true; }

        document.getElementById('mainAuthBtn').onclick = function() {
            initAudio();
            var emailStr = document.getElementById('email').value.trim(), pwStr = document.getElementById('pw').value.trim();
            if(!emailStr || !pwStr) return alert("入力してください");
            if (isSignUpMode) {
                auth.createUserWithEmailAndPassword(emailStr, pwStr).then(function(userCard) {
                    var m = userCard.user.email;
                    var lId = [m, OFFICIAL_EMAIL].sort().join("_");
                    db.collection("profiles").doc(m).set({ name: m.split("@")[0], avatar: "", blockList:[], hiddenRooms:[] });
                    db.collection("contact_links").doc(lId).set({ users: [m, OFFICIAL_EMAIL], type: "direct", time: Date.now() });
                    db.collection("rooms").doc(lId).collection("messages").add({ text: "AirTextへようこそ！", sender: OFFICIAL_EMAIL, time: Date.now(), msgType: "text", isRead: false, reactions: {} });
                    alert("アカウントを作成しました。ログインしてください。");
                }).catch(function(e) { alert("登録失敗: " + e.message); });
            } else { auth.signInWithEmailAndPassword(emailStr, pwStr).catch(function() { alert("ログイン失敗"); }); }
        };

        document.getElementById('logoutBtn').onclick = function() {
            if (confirm(\"ログアウトしますか？\")) {
                auth.signOut().then(function() {
                    if (chatUnsub) chatUnsub(); if (statusUnsub) statusUnsub();
                    document.getElementById('settingsModal').style.display = 'none';
                });
            }
        };

        // クローズイベントバインド
        window.onclick = function(e) {
            if (!e.target.matches('.msg-bubble') && !e.target.matches('.reply-quote-in-msg')) { document.getElementById('msgContextMenu').style.display = 'none'; }
            if (!e.target.matches('.contact-item') && !e.target.closest('.contact-item')) { document.getElementById('roomContextMenu').style.display = 'none'; }
        };

        document.getElementById('closeQrBtn').onclick = function() {
            document.getElementById('qrModal').style.display = 'none';
            if (html5QrScanner) { html5QrScanner.stop().catch(function(){}); html5QrScanner = null; }
        };

        // --- 📞 15. VOIP AUDIO STREAM HANDSHAKE LOGIC ---
        document.getElementById('voiceCallBtn').onclick = function() {
            if (!activeRoomId || activeRoomIsGroup) return alert("通話は個人のみ対応しています");
            initCallHandshake();
        };

        function initCallHandshake() {
            document.getElementById('callNameEl').innerText = activeOtherUser;
            document.getElementById('callStatusEl').innerText = "発信中...";
            document.getElementById('callAcceptBtn').style.display = 'none';
            document.getElementById('callOverlay').style.display = 'flex';

            currentCallDocId = activeRoomId;
            navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
                localStream = stream;
                peerConnection = new RTCPeerConnection(rtcConfig);
                localStream.getTracks().forEach(function(track) { peerConnection.addTrack(track, localStream); });

                peerConnection.onicecandidate = function(e) {
                    if (e.candidate) {
                        db.collection("calls").doc(currentCallDocId).collection("callerCandidates").add(e.candidate.toJSON());
                    }
                };

                peerConnection.ontrack = function(e) {
                    var remoteAudio = document.createElement('audio');
                    remoteAudio.srcObject = e.streams[0]; remoteAudio.autoplay = true;
                    document.body.appendChild(remoteAudio);
                };

                peerConnection.createOffer().then(function(offer) {
                    return peerConnection.setLocalDescription(offer);
                }).then(function() {
                    db.collection("calls").doc(currentCallDocId).set({
                        offer: { type: peerConnection.localDescription.type, sdp: peerConnection.localDescription.sdp },
                        status: "dialing", caller: me.email, callee: activeOtherUser
                    });
                });

                // 相手が応答したか監視
                db.collection("calls").doc(currentCallDocId).onSnapshot(function(doc) {
                    if(doc.exists && doc.data().status === "connected" && doc.data().answer) {
                        document.getElementById('callStatusEl').innerText = "通話中";
                        if(!peerConnection.currentRemoteDescription) {
                            var rDesc = new RTCSessionDescription(doc.data().answer);
                            peerConnection.setRemoteDescription(rDesc);
                        }
                    }
                    if(doc.exists && doc.data().status === "ended") { terminateAudioSession(); }
                });

                db.collection("calls").doc(currentCallDocId).collection("calleeCandidates").onSnapshot(function(snap) {
                    snap.docChanges().forEach(function(change) {
                        if (change.type === "added") {
                            var candidate = new RTCIceCandidate(change.doc.data());
                            peerConnection.addIceCandidate(candidate);
                        }
                    });
                });

            }).catch(function(e) { alert("マイクの起動に失敗しました: " + e.message); terminateAudioSession(); });
        }

        function listenIncomingCalls() {
            if(globalCallUnsub) globalCallUnsub();
            globalCallUnsub = db.collection("calls").where("callee", "==", me.email).where("status", "==", "dialing").onSnapshot(function(snapshot) {
                snapshot.forEach(function(doc) {
                    currentCallDocId = doc.id;
                    var cData = doc.data();
                    
                    document.getElementById('callNameEl').innerText = cData.caller;
                    document.getElementById('callStatusEl').innerText = "着信中...";
                    document.getElementById('callAcceptBtn').style.display = 'flex';
                    document.getElementById('callOverlay').style.display = 'flex';

                    // 切断監視
                    db.collection("calls").doc(currentCallDocId).onSnapshot(function(d) {
                        if(d.exists && d.data().status === "ended") { terminateAudioSession(); }
                    });
                });
            });
        }

        document.getElementById('callAcceptBtn').onclick = function() {
            document.getElementById('callStatusEl').innerText = "接続中...";
            navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
                localStream = stream;
                peerConnection = new RTCPeerConnection(rtcConfig);
                localStream.getTracks().forEach(function(track) { peerConnection.addTrack(track, localStream); });

                peerConnection.onicecandidate = function(e) {
                    if (e.candidate) {
                        db.collection("calls").doc(currentCallDocId).collection("calleeCandidates").add(e.candidate.toJSON());
                    }
                };

                peerConnection.ontrack = function(e) {
                    var remoteAudio = document.createElement('audio');
                    remoteAudio.srcObject = e.streams[0]; remoteAudio.autoplay = true;
                    document.body.appendChild(remoteAudio);
                };

                db.collection("calls").doc(currentCallDocId).get().then(function(doc) {
                    var offer = doc.data().offer;
                    return peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                }).then(function() {
                    return peerConnection.createAnswer();
                }).then(function(answer) {
                    return peerConnection.setLocalDescription(answer);
                }).then(function() {
                    db.collection("calls").doc(currentCallDocId).update({
                        answer: { type: peerConnection.localDescription.type, sdp: peerConnection.localDescription.sdp },
                        status: "connected"
                    });
                    document.getElementById('callStatusEl').innerText = "通話中";
                });

                db.collection("calls").doc(currentCallDocId).collection("callerCandidates").onSnapshot(function(snap) {
                    snap.docChanges().forEach(function(change) {
                        if (change.type === "added") {
                            var candidate = new RTCIceCandidate(change.doc.data());
                            peerConnection.addIceCandidate(candidate);
                        }
                    });
                });

            }).catch(function(e) { alert("マイクの接続に失敗しました: " + e.message); terminateAudioSession(); });
        };

        document.getElementById('callDeclineBtn').onclick = function() {
            if(currentCallDocId) { db.collection("calls").doc(currentCallDocId).update({ status: "ended" }); }
            terminateAudioSession();
        };

        function terminateAudioSession() {
            document.getElementById('callOverlay').style.display = 'none';
            if (localStream) { localStream.getTracks().forEach(function(t) { t.stop(); }); localStream = null; }
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            currentCallDocId = null;
        }
    </script>
</body>
</html>
