<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AirText v1.3.0</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AirText">

    <style>
        /* =========================================
           🎨 Apple Style: Liquid Glass Theme (AirText v1.3.0)
           ========================================= */
        :root {
            --primary-color: #007aff;
            --bg-main: #e2e8f0; 
            --panel-bg: rgba(255, 255, 255, 0.45); 
            --panel-bg-dark: rgba(255, 255, 255, 0.65); 
            --glass-stroke: rgba(255, 255, 255, 0.4); 
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08); 
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --bubble-sent: #007aff;
            --bubble-received: rgba(255, 255, 255, 0.6); 
        }

        /* ダークモード (Dark Aero Frost) */
        body.dark-mode {
            --bg-main: #1c1c1e;
            --panel-bg: rgba(28, 28, 30, 0.55);
            --panel-bg-dark: rgba(44, 44, 46, 0.75);
            --glass-stroke: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --bubble-sent: #0a84ff;
            --bubble-received: rgba(44, 44, 46, 0.6);
        }

        html, body { 
            height: 100%; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-main); 
            overflow: hidden; 
            color: var(--text-main); 
            transition: background 0.3s;
        }

        /* 背景カスタム適用用 */
        .bg-custom-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            pointer-events: none;
        }

        .view { 
            display: none; 
            height: 100vh; 
            width: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            box-sizing: border-box; 
            flex-direction: column; 
        }
        
        #loginView { 
            background: linear-gradient(135deg, #1c1c1e 0%, #000000 100%); 
            color: white; 
            justify-content: center; 
            align-items: center; 
        }
        .login-box { 
            width: 320px; 
            text-align: center; 
            padding: 30px 24px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .login-box input { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 14px; 
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.4); 
            color: white; font-size: 16px; -webkit-appearance: none; box-sizing: border-box; outline: none;
        }
        .login-box button { 
            width: 100%; padding: 15px; border-radius: 14px; border: none; 
            background: var(--primary-color); color: white; font-size: 16px; 
            cursor: pointer; margin-bottom: 12px; font-weight: bold; box-shadow: 0 4px 14px rgba(0,122,255,0.4);
        }
        .google-btn { 
            width: 100%; padding: 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255, 255, 255, 0.9); color: #333; font-size: 16px; cursor: pointer; margin-bottom: 15px; font-weight: bold; 
        }
        .switch-link { color: #64d2ff; cursor: pointer; text-decoration: underline; font-size: 14px; }

        .header { 
            padding: 15px 20px; background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-stroke); box-shadow: var(--glass-shadow);
            display: flex; justify-content: space-between; align-items: center; height: 64px; box-sizing: border-box; z-index: 10;
        }
        .contact-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; position: relative; }
        
        /* スワイプ一括既読のためのラッパー */
        .swipe-container {
            position: relative; overflow: hidden; margin-bottom: 10px; border-radius: 18px; touch-action: pan-y;
        }
        .swipe-bg-read {
            position: absolute; top: 0; right: 0; width: 100%; height: 100%;
            background: #34c759; color: white; display: flex; align-items: center; justify-content: flex-end;
            padding-right: 24px; box-sizing: border-box; font-weight: bold; font-size: 14px; z-index: 1;
            border-radius: 18px; pointer-events: none;
        }
        .contact-item { 
            padding: 14px 18px; background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-stroke); border-radius: 18px; box-shadow: var(--glass-shadow);
            display: flex; align-items: center; cursor: pointer; position: relative; z-index: 2;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), background 0.2s;
            user-select: none; -webkit-user-select: none;
        }

        .avatar { 
            width: 46px; height: 46px; background: rgba(0, 0, 0, 0.1); border-radius: 50%; 
            margin-right: 14px; display: flex; align-items: center; justify-content: center; 
            color: #333; font-weight: 600; font-size: 18px; object-fit: cover; overflow: hidden; border: 1px solid var(--glass-stroke);
        }
        .badge { 
            position: absolute; right: 20px; background: #ff3b30; color: white; 
            padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; box-shadow: 0 4px 10px rgba(255,59,48,0.3);
        }
        
        .add-btn { 
            position: absolute; bottom: 30px; right: 30px; width: 56px; height: 56px; 
            background: var(--primary-color); border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; color: white; font-size: 28px; box-shadow: 0 8px 24px rgba(0,122,255,0.35); 
            cursor: pointer; z-index: 99; font-weight: 300;
        }
        .icon-btn { font-size: 22px; cursor: pointer; background: none; border: none; padding: 5px; color: var(--text-main); display: flex; align-items: center; justify-content: center; outline: none; }

        .message-area { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        
        .msg-container { max-width: 78%; margin-bottom: 14px; display: flex; flex-direction: column; position: relative; }
        .msg-container.sent { align-self: flex-end; align-items: flex-end; }
        .msg-container.received { align-self: flex-start; align-items: flex-start; }
        
        /* 引用返信（リプライ）のバブル内表示 */
        .reply-quote-in-msg {
            background: rgba(0, 0, 0, 0.1); padding: 6px 10px; border-radius: 10px; font-size: 12px;
            margin-bottom: 6px; border-left: 3px solid var(--primary-color); color: inherit; opacity: 0.8;
            max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .msg { 
            padding: 11px 16px; border-radius: 20px; font-size: 16px; line-height: 1.45; 
            word-wrap: break-word; white-space: pre-wrap; user-select: none; -webkit-user-select: none; 
            cursor: pointer; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .sent .msg { 
            background: var(--bubble-sent); color: white; border-bottom-right-radius: 4px; box-shadow: 0 4px 12px rgba(0,122,255,0.25);
        }
        .received .msg { 
            background: var(--bubble-received); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid var(--glass-stroke); box-shadow: var(--glass-shadow);
        }
        .msg img { max-width: 100%; border-radius: 14px; display: block; margin-top: 5px; }
        .msg a { color: inherit; text-decoration: underline; font-weight: 600; }
        
        .msg-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 5px; padding: 0 4px; }
        
        .heart-badge { 
            position: absolute; bottom: -8px; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-stroke); border-radius: 10px; padding: 2px 6px; font-size: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); pointer-events: none; display: flex; gap: 2px; z-index: 10; 
        }
        .sent .heart-badge { right: 10px; }
        .received .heart-badge { left: 10px; }

        /* コンテキストメニュー（画面内はみ出し自動追従付き） */
        #msgMenu, #roomContextMenu { 
            display: none; position: fixed; background: rgba(255,255,255,0.75); 
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-radius: 22px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); padding: 8px; z-index: 9999; flex-direction: column; 
            width: 220px; box-sizing: border-box; border: 1px solid var(--glass-stroke); 
        }
        body.dark-mode #msgMenu, body.dark-mode #roomContextMenu {
            background: rgba(30,30,32,0.8);
        }
        .emoji-row { display: flex; justify-content: space-around; padding-bottom: 8px; border-bottom: 1px solid rgba(0,0,0,0.05); margin-bottom: 5px; }
        .emoji-opt { font-size: 24px; cursor: pointer; transition: transform 0.1s; padding: 4px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
        .menu-opt { padding: 10px 12px; color: var(--text-main); font-weight: 500; text-align: left; cursor: pointer; font-size: 14px; border-radius: 12px; }
        .menu-opt:active { background: rgba(0,0,0,0.05); }
        .menu-opt.danger { color: #ff3b30; font-weight: 600; }
        
        /* 引用返信入力バープレビュー */
        .reply-preview-bar {
            display: none; padding: 8px 15px; background: rgba(0,0,0,0.03); border-top: 1px solid var(--glass-stroke);
            font-size: 12px; justify-content: space-between; align-items: center; color: var(--text-muted);
        }

        /* 予約送信トレイプレビュー */
        .scheduled-tray-bar {
            display: none; padding: 6px 15px; background: rgba(255,149,0,0.1); border-top: 1px solid var(--glass-stroke);
            font-size: 12px; justify-content: space-between; align-items: center; color: #ff9500; font-weight: bold;
        }

        .input-bar { 
            padding: 10px 15px; background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-stroke); box-shadow: 0 -4px 16px rgba(0,0,0,0.02);
            display: flex; align-items: center; height: 64px; box-sizing: border-box; gap: 6px; 
        }
        .input-bar input[type="text"] { 
            flex: 1; padding: 10px 14px; border: 1px solid rgba(0, 0, 0, 0.05); border-radius: 22px; 
            outline: none; font-size: 15px; -webkit-appearance: none; background: rgba(255, 255, 255, 0.5); color: var(--text-main); 
        }

        .setting-box { 
            width: 100%; max-width: 350px; text-align: center; margin-top: 60px; padding: 24px;
            background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-stroke); border-radius: 24px; box-shadow: var(--glass-shadow); box-sizing: border-box;
        }
        .setting-box input[type="text"] { 
            width: 100%; padding: 12px 16px; margin: 12px 0; border: 1px solid rgba(0,0,0,0.05); 
            border-radius: 12px; font-size: 16px; box-sizing: border-box; background: rgba(255, 255, 255, 0.5); color: var(--text-main); outline: none;
        }

        /* 通話オーバーレイ表示 */
        #callOverlay {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: linear-gradient(to bottom, #2c3e50, #000000); color: white;
            z-index: 100000; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 60px 20px; box-sizing: border-box; text-align: center;
        }
        .call-btn {
            width: 68px; height: 68px; border-radius: 50%; border: none; display: flex; align-items: center;
            justify-content: center; font-size: 28px; cursor: pointer; color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .call-btn.answer { background: #34c759; }
        .call-btn.decline { background: #ff3b30; }

        /* QRコード表示・読取モーダル */
        .modal {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6); z-index: 50000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: var(--bg-main); padding: 24px; border-radius: 24px; width: 100%; max-width: 320px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative;
        }

        #toastNotification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px;
            background: rgba(255, 255, 255, 0.75); color: #1d1d1f; padding: 15px 20px; border-radius: 20px;
            box-shadow: 0 12px 38px rgba(0,0,0,0.1); z-index: 10000; font-size: 15px; display: flex; flex-direction: column; gap: 4px;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); cursor: pointer;
            border: 1px solid var(--glass-stroke);
        }
        body.dark-mode #toastNotification { background: rgba(30,30,32,0.85); color: #fff; }
        #toastNotification.show { top: 20px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>

<div class="bg-custom-layer" id="globalBgLayer"></div>

<div id="toastNotification" onclick="clickToast()">
    <div id="toastSender" style="font-weight: bold; color: var(--primary-color); font-size: 13px;"></div>
    <div id="toastText" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
</div>

<div id="callOverlay">
    <div>
        <div id="callStatus" style="font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; margin-bottom: 10px;">CALLING...</div>
        <div id="callPartnerName" style="font-size: 28px; font-weight: bold;">User</div>
    </div>
    <div style="font-size: 70px; margin-bottom: 40px;">📞</div>
    <div id="callActionRow" style="display: flex; gap: 40px;">
        <button class="call-btn decline" id="declineCallBtn">✕</button>
        <button class="call-btn answer" id="answerCallBtn">✓</button>
    </div>
</div>

<div class="modal" id="qrModal">
    <div class="modal-content">
        <h3 style="margin-top:0;" id="qrModalTitle">マイQRコード</h3>
        <div id="qrCodeContainer" style="display:flex; justify-content:center; margin: 20px 0;"></div>
        <div id="qrScannerContainer" style="display:none; width: 100%; min-height: 200px; background:#000;"></div>
        <button id="closeQrModalBtn" style="width:100%; padding:12px; background:rgba(0,0,0,0.05); border:none; border-radius:12px; font-weight:bold; color:var(--text-main);">閉じる</button>
    </div>
</div>

<div class="modal" id="groupEditModal">
    <div class="modal-content">
        <h3 style="margin-top:0;">グループ設定</h3>
        <input type="text" id="editGroupNameInput" placeholder="グループ名">
        <input type="text" id="editGroupIconInput" placeholder="アイコン（絵文字1文字など）">
        <div style="text-align:left; font-size:12px; margin-bottom:6px; font-weight:bold;">メンバー追加 (メールアドレス)</div>
        <input type="text" id="editGroupAddMemberInput" placeholder="example@test.com">
        <button id="editGroupAddMemberBtn" style="width:100%; padding:8px; background:var(--primary-color); color:white; border:none; border-radius:8px; font-size:13px; margin-bottom:15px;">メンバーを追加する</button>
        
        <button id="saveGroupSettingsBtn" style="width:100%; padding:12px; background:#34c759; color:white; border:none; border-radius:12px; font-weight:bold; margin-bottom:8px;">設定を保存</button>
        <button id="leaveGroupBtn" style="width:100%; padding:12px; background:rgba(255,59,48,0.1); color:#ff3b30; border:none; border-radius:12px; font-weight:bold;" class="danger">グループを退会する</button>
        <button id="closeGroupModalBtn" style="width:100%; padding:12px; background:none; border:none; color:var(--text-muted); margin-top:5px;">キャンセル</button>
    </div>
</div>

<div class="modal" id="scheduledModal">
    <div class="modal-content" style="max-width: 360px;">
        <h3 style="margin-top:0;">⏳ 予約送信管理トレイ</h3>
        <div id="scheduledListContainer" style="text-align:left; max-height:240px; overflow-y:auto; margin:15px 0; font-size:13px;"></div>
        <button id="closeScheduledModalBtn" style="width:100%; padding:12px; background:rgba(0,0,0,0.05); border:none; border-radius:12px; font-weight:bold;">閉じる</button>
    </div>
</div>

<div class="view" id="loginView">
    <div class="login-box">
        <h1 id="authTitle" style="font-size: 36px; margin-bottom: 30px; font-weight: 700; letter-spacing: -1px;">AirText</h1>
        <button class="google-btn" id="googleLoginBtn">🌐 Googleログイン</button>
        <div style="margin: 15px 0; color: rgba(255,255,255,0.4); font-size: 14px;">または</div>
        <input type="email" id="email" placeholder="メールアドレス">
        <input type="password" id="pw" placeholder="パスワード">
        <button id="mainAuthBtn">ログイン</button>
        <div id="switchAuthMode" class="switch-link">新しくアカウントを作る(Sign Up)</div>
    </div>
</div>

<div class="view" id="homeView">
    <div class="header">
        <button class="icon-btn" id="toSettingsBtn">⚙️</button>
        <h2 style="margin:0; font-size:20px; font-weight: 700; letter-spacing: -0.5px;">AirText</h2>
        <div style="display: flex; align-items: center; gap: 8px;">
            <button class="icon-btn" id="showQrBtn" style="font-size:18px;">🔲</button>
            <button class="icon-btn" id="scanQrBtn" style="font-size:18px;">📷</button>
            <button class="icon-btn" id="makeGroupBtn" style="font-size: 18px;">👥</button>
        </div>
    </div>
    <div class="contact-list" id="contactList"></div>
    <div class="add-btn" id="addBtn">+</div>
</div>

<div class="view" id="chatView">
    <div class="chat-header">
        <button class="icon-btn" id="backBtn" style="width:32px;">◀</button>
        <div id="chatTitle" style="font-weight:700; font-size:17px; cursor:pointer; max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></div>
        <div style="display:flex; gap:10px; align-items:center;">
            <button class="icon-btn" id="voiceCallBtn" style="font-size:18px;">📞</button>
            <button class="icon-btn" id="groupSettingsBtn" style="font-size:18px; display:none;">⚙️</button>
        </div>
    </div>
    
    <div class="message-area" id="msgArea"></div>
    
    <div class="scheduled-tray-bar" id="scheduledTrayBar">
        <span id="scheduledTrayText">予約中のメッセージがあります</span>
        <span style="cursor:pointer; text-decoration:underline;" id="openScheduledModalBtn">一覧表示</span>
    </div>

    <div class="reply-preview-bar" id="replyPreviewBar">
        <div style="display:flex; flex-direction:column; max-width:85%;">
            <span style="font-weight:bold; color:var(--primary-color);" id="replyUserLabel">返信先</span>
            <span id="replyTextLabel" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">内容</span>
        </div>
        <span style="cursor:pointer; font-size:16px; font-weight:bold; padding:4px;" id="cancelReplyBtn">✕</span>
    </div>

    <div class="input-bar">
        <button class="icon-btn" id="clipBtn" style="font-size: 20px; padding: 0 4px;">📎</button>
        <button class="icon-btn" id="timerBtn" style="font-size: 18px; padding: 0 4px;">⏳</button>
        <input type="file" id="imageFileInput" accept="image/*" style="display:none;">
        <input type="text" id="msgInput" placeholder="メッセージ">
        <button id="sendBtn" style="background:var(--primary-color); color:white; border:none; width:36px; height:36px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:bold;">↑</button>
    </div>
</div>

<div class="view" id="settingsView">
    <div class="chat-header" style="width:100%; position:absolute; top:0; left:0;">
        <button class="icon-btn" id="backFromSettings">◀ 戻る</button>
        <div style="font-weight:700;">設定</div>
        <div style="width:32px;"></div>
    </div>
    <div class="setting-box">
        <label for="avatarInput" style="cursor: pointer;">
            <img class="avatar" id="myAvatarPreview" style="width:100px; height:100px; margin:0 auto; background:rgba(0,0,0,0.05); border: 1px solid var(--glass-stroke);" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100%' height='100%' fill='%23ccc'/></svg>">
            <p style="font-size:12px; color:var(--primary-color); margin-top: 6px; font-weight: 500;">画像をタップして変更</p>
        </label>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;">
        <input type="text" id="nicknameInput" placeholder="ニックネームを入力">
        
        <div style="text-align:left; font-size:13px; padding:10px 0; display:flex; flex-direction:column; gap:12px; border-top:1px solid rgba(0,0,0,0.05); margin-top:10px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span>🌙 ダークモード (Aero Dark)</span>
                <input type="checkbox" id="darkModeToggle" style="width:20px; height:20px;">
            </div>
            <div style="display:flex; flex-direction:column; gap:4px;">
                <span>🖼️ 背景のカスタマイズ (色または画像URL)</span>
                <input type="text" id="bgCustomInput" placeholder="例: #f2f2f7 または画像のURL" style="width:100%; padding:10px; border-radius:10px; border:1px solid rgba(0,0,0,0.1); box-sizing:border-box;">
            </div>
        </div>

        <button id="saveSettingsBtn" style="width:100%; padding:12px; background:#007aff; color:white; border:none; border-radius:12px; font-size:16px; margin-bottom: 12px; font-weight:600; margin-top:10px;">保存する</button>
        <button id="logoutBtn" style="width:100%; padding:12px; background:rgba(255,59,48,0.15); color:#ff3b30; border:none; border-radius:12px; font-size:16px; font-weight: bold; cursor: pointer; margin-bottom: 20px;">ログアウト</button>

        <div style="font-size: 11px; color: var(--text-muted); text-align: center;">AirText バージョン 1.3.0</div>

<div id="msgMenu">
    <div class="emoji-row">
        <span class="emoji-opt">❤️</span><span class="emoji-opt">👍</span><span class="emoji-opt">😂</span><span class="emoji-opt">😮</span><span class="emoji-opt">🙏</span>
    </div>
    <div class="menu-opt" id="replyMenuBtn">💬 このメッセージに返信</div>
    <div class="menu-opt danger" id="revokeBtn">メッセージ送信取消</div>
</div>

<div id="roomContextMenu">
    <div class="menu-opt" id="roomHideBtn">🙈 このトークを非表示にする</div>
    <div class="menu-opt danger" id="roomBlockBtn">🚫 このユーザーをブロックする</div>
</div>

<script>
    // Firebase初期設定
    var firebaseConfig = {
        apiKey: "AIzaSyAFxMMoJ6q0pQqRimkJaY6eDyBWgLqaNWc",
        authDomain: "airtext-mirboy.firebaseapp.com",
        projectId: "airtext-mirboy",
        storageBucket: "airtext-mirboy.firebasestorage.app",
        messagingSenderId: "1091018853143",
        appId: "1:1091018853143:web:c1ed8f39e4886656800552"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();
    var auth = firebase.auth();
    var storage = firebase.storage();
    
    var me = null, targetEmail = null, chatUnsub = null, statusUnsub = null, roomListUnsub = null;
    var myName = "", myAvatar = "", isSignUpMode = false, audioCtx = null;
    var partnerInRoom = false, activeRoomId = null, isGroupMode = false;
    var focusedMsgId = null, focusedRoomId = null, focusedOtherUser = null, toastTargetRoomId = null;
    var activeListeners = {}, blockList = [], hiddenRooms = [], globalGroupData = null;
    
    // 引用返信・予約管理用の状態保持変数
    var currentReplyData = null; 
    var scheduleTimeSetting = null; 
    var html5QrScanner = null;

    // WebRTC音声通話用オブジェクト群
    var localStream = null, peerConnection = null, callUnsub = null, activeCallId = null;
    var rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    var OFFICIAL_EMAIL = "official@airtext.com";

    // 1分ごとにローカルで自分が設定した予約投稿がないかをチェックし自動処理する仕組み
    setInterval(function() {
        if (!me) return;
        var now = Date.now();
        db.collection("scheduled_messages")
          .where("sender", "==", me.email)
          .where("status", "==", "pending")
          .where("targetTime", "<=", now)
          .get()
          .then(function(snap) {
              snap.forEach(function(doc) {
                  var data = doc.data();
                  var docId = doc.id;
                  db.collection("scheduled_messages").doc(docId).update({ status: "sent" }).then(function() {
                      db.collection("rooms").doc(data.roomId).collection("messages").add({
                          text: data.text,
                          sender: me.email,
                          time: Date.now(),
                          msgType: "text",
                          isRead: false,
                          reactions: {},
                          replyTo: data.replyTo || null
                      }).then(function() {
                          // トークの最新送受信時刻を上書き（並び替え用）
                          db.collection("contact_links").doc(data.roomId).update({ time: Date.now() });
                          db.collection("room_status").doc(data.roomId).set({ unread: data.isGroup ? "group_update" : data.targetUser }, { merge: true });
                      });
                  });
              });
          });
    }, 30000);

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }
    window.addEventListener('click', initAudio);
    window.addEventListener('touchstart', initAudio);

    function playNotificationSound() {
        try {
            initAudio();
            if (!audioCtx) return;
            var now = audioCtx.currentTime;
            var osc1 = audioCtx.createOscillator(), gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(880.00, now);
            osc1.frequency.setValueAtTime(1318.51, now + 0.08);
            
            var osc2 = audioCtx.createOscillator(), gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(1046.50, now + 0.04);

            gain1.gain.setValueAtTime(0.12, now);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            gain2.gain.setValueAtTime(0.08, now + 0.04);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.35);

            osc1.connect(gain1); gain1.connect(audioCtx.destination);
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc1.start(now); osc1.stop(now + 0.3);
            osc2.start(now + 0.04); osc2.stop(now + 0.35);
        } catch(e) {}
    }

    function activateLinks(text) {
        var urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, function(url) {
            return '<a href="' + url + '" target="_blank">' + url + '</a>';
        });
    }

    function triggerPopupNotification(sender, messageText, roomId) {
        if (activeRoomId === roomId || blockList.includes(sender)) return;
        var senderName = sender === OFFICIAL_EMAIL ? "AirText公式" : sender;
        toastTargetRoomId = roomId;
        document.getElementById('toastSender').innerText = "💬 " + senderName;
        document.getElementById('toastText').innerText = messageText;
        var toast = document.getElementById('toastNotification');
        toast.classList.add('show');
        playNotificationSound();
        if (navigator.vibrate) navigator.vibrate([150, 100, 150]);
        setTimeout(function() { toast.classList.remove('show'); }, 4000);
    }

    window.clickToast = function() {
        if (!toastTargetRoomId) return;
        document.getElementById('toastNotification').classList.remove('show');
        db.collection("contact_links").doc(toastTargetRoomId).get().then(function(doc) {
            if (doc.exists) {
                var data = doc.data();
                var isGroup = (data.type === "group");
                var other = isGroup ? "" : (data.users[0] === me.email ? data.users[1] : data.users[0]);
                openChat(toastTargetRoomId, isGroup, other, data.groupName || "");
            }
        });
    };

    function formatTime(timestamp) {
        if (!timestamp) return "";
        var d = new Date(timestamp);
        return String(d.getHours()).padStart(2, '0') + ":" + String(d.getMinutes()).padStart(2, '0');
    }

    function show(id) {
        var views = ['loginView', 'homeView', 'chatView', 'settingsView'];
        for (var i = 0; i < views.length; i++) {
            var v = document.getElementById(views[i]);
            if (v) v.style.display = 'none';
        }
        var target = document.getElementById(id);
        if (target) target.style.display = 'flex';
        // コンテキストメニューを確実に隠す
        document.getElementById('msgMenu').style.display = 'none';
        document.getElementById('roomContextMenu').style.display = 'none';
    }

    // 認証状態の監視 & ブロック、非表示リストの統合取得
    auth.onAuthStateChanged(function(user) {
        if (user) {
            me = user;
            // ブロック・非表示リストを同期
            db.collection("profiles").doc(me.email).onSnapshot(function(docSnap) {
                var data = docSnap.data() || {};
                myName = data.name || me.email.split("@")[0];
                myAvatar = data.avatar || "";
                blockList = data.blockList || [];
                hiddenRooms = data.hiddenRooms || [];
                
                // 設定画面への反映
                document.getElementById('nicknameInput').value = myName;
                if (myAvatar) document.getElementById('myAvatarPreview').src = myAvatar;
                if (data.darkMode) {
                    document.body.classList.add('dark-mode');
                    document.getElementById('darkModeToggle').checked = true;
                } else {
                    document.body.classList.remove('dark-mode');
                    document.getElementById('darkModeToggle').checked = false;
                }
                if (data.customBg) {
                    applyCustomBg(data.customBg);
                    document.getElementById('bgCustomInput').value = data.customBg;
                }

                show('homeView');
                listenContacts();
                setupGlobalMessageListener();
                listenIncomingCalls(); // 通話着信の待機開始
            });
        } else {
            show('loginView');
        }
    });

    function applyCustomBg(val) {
        var bgLayer = document.getElementById('globalBgLayer');
        if (val.indexOf('#') === 0 || val.indexOf('rgb') === 0) {
            bgLayer.style.backgroundImage = 'none';
            bgLayer.style.backgroundColor = val;
        } else if (val) {
            bgLayer.style.backgroundColor = 'transparent';
            bgLayer.style.backgroundImage = "url('" + val + "')";
        } else {
            bgLayer.style.backgroundImage = 'none';
            bgLayer.style.backgroundColor = '';
        }
    }

    // トークリストの「最近話した人順」ソート＆スワイプ既読処理
    function listenContacts() {
        if (roomListUnsub) roomListUnsub();
        // 送受信時間の降順 (time desc) でリアルタイム取得
        roomListUnsub = db.collection("contact_links")
            .where("users", "array-contains", me.email)
            .orderBy("time", "desc")
            .onSnapshot(function(snap) {
                var list = document.getElementById('contactList');
                list.innerHTML = "";

                snap.forEach(function(d) {
                    var roomId = d.id;
                    var data = d.data();
                    
                    // 非表示設定されているルームは除外
                    if (hiddenRooms.includes(roomId)) return;

                    var isGroup = (data.type === "group");
                    var other = "";
                    var displayTitle = isGroup ? "[グループ] " + (data.groupName || "無題") : "";

                    if (!isGroup) {
                        var users = data.users;
                        other = users[0] === me.email ? users[1] : users[0];
                        if (blockList.includes(other)) return; // ブロック相手は非表示
                        displayTitle = other;
                    }

                    var safeId = roomId.replace(/[^a-zA-Z0-9]/g, "");
                    
                    // スワイプ構造の生成
                    var container = document.createElement('div');
                    container.className = "swipe-container";
                    
                    var swipeBg = document.createElement('div');
                    swipeBg.className = "swipe-bg-read";
                    swipeBg.innerText = "既読化 ➔";
                    
                    var item = document.createElement('div');
                    item.className = "contact-item";
                    item.innerHTML = '<div class="avatar" id="av-'+safeId+'">' + (isGroup ? (data.groupIcon || "👥") : displayTitle[0].toUpperCase()) + '</div><div style="font-weight:bold;" id="name-'+safeId+'">' + displayTitle + '</div>';
                    
                    container.appendChild(swipeBg);
                    container.appendChild(item);

                    // ニックネーム・アバター同期
                    if (!isGroup) {
                        db.collection("profiles").doc(other).onSnapshot(function(pSnap) {
                            var pData = pSnap.data();
                            var avEl = document.getElementById('av-'+safeId);
                            if (pData && pData.avatar && avEl) {
                                avEl.innerHTML = "";
                                var img = document.createElement('img'); img.src = pData.avatar; img.className="avatar"; img.style.margin="0"; avEl.appendChild(img);
                            }
                        });
                        db.collection("my_nicknames").doc(me.email).collection("targets").doc(other).onSnapshot(function(nSnap) {
                            var nmEl = document.getElementById('name-'+safeId);
                            if(nmEl) nmEl.innerText = (nSnap.exists && nSnap.data().alias) ? nSnap.data().alias : ((other === OFFICIAL_EMAIL) ? "AirText公式" : other);
                        });
                    }

                    // 未読カウントのバッジ表示 (数字バッジ化)
                    db.collection("room_status").doc(roomId).onSnapshot(function(docSnap) {
                        var status = docSnap.data();
                        var b = item.querySelector('.badge');
                        if (status && status.unread && (status.unread === me.email || (isGroup && status.unread === "group_update"))) {
                            var count = status.unreadCount || 1;
                            if (!b) {
                                b = document.createElement('div'); b.className = "badge"; item.appendChild(b);
                            }
                            b.innerText = count;
                        } else { if (b) b.remove(); }
                    });

                    // スマホ対応：右から左へのスワイプジェスチャーの実装
                    var startX = 0, currentX = 0;
                    item.addEventListener('touchstart', function(e) { startX = e.touches[0].clientX; }, {passive: true});
                    item.addEventListener('touchmove', function(e) {
                        currentX = e.touches[0].clientX;
                        var diff = currentX - startX;
                        if (diff < 0) { // 左へのスワイプ
                            var move = Math.max(diff, -100);
                            item.style.transform = 'translateX(' + move + 'px)';
                        }
                    }, {passive: true});
                    item.addEventListener('touchend', function(e) {
                        var diff = currentX - startX;
                        if (diff < -60) { // 60px以上スワイプしたら一括既読実行
                            item.style.transform = 'translateX(-100%)';
                            setTimeout(function() {
                                db.collection("room_status").doc(roomId).set({ unread: "", unreadCount: 0 }, { merge: true });
                                item.style.transform = 'translateX(0)';
                            }, 300);
                        } else {
                            item.style.transform = 'translateX(0)';
                        }
                        startX = 0; currentX = 0;
                    });

                    // 長押しでメニュー展開（PC/スマホ両対応・はみ出し自動調整付き）
                    var pressTimer;
                    function openRoomMenu(clientX, clientY) {
                        focusedRoomId = roomId;
                        focusedOtherUser = other;
                        var menu = document.getElementById('roomContextMenu');
                        menu.style.display = 'flex';
                        menu.style.left = Math.min(clientX, window.innerWidth - 230) + 'px';
                        menu.style.top = Math.min(clientY, window.innerHeight - 150) + 'px';
                    }
                    item.addEventListener('touchstart', function(e) {
                        pressTimer = setTimeout(function() { openRoomMenu(e.touches[0].clientX, e.touches[0].clientY); }, 700);
                    }, {passive: true});
                    item.addEventListener('touchend', function() { clearTimeout(pressTimer); });
                    item.addEventListener('contextmenu', function(e) { e.preventDefault(); openRoomMenu(e.clientX, e.clientY); });

                    item.addEventListener('click', function(e) {
                        if(currentX - startX === 0) { initAudio(); openChat(roomId, isGroup, other, data.groupName); }
                    });

                    list.appendChild(container);
                });
            });
    }

    // グローバル新着メッセージ監視
    function setupGlobalMessageListener() {
        db.collection("contact_links").where("users", "array-contains", me.email).onSnapshot(function(snap) {
            snap.forEach(function(d) {
                var roomId = d.id;
                if (activeListeners[roomId]) return;
                activeListeners[roomId] = db.collection("rooms").doc(roomId).collection("messages")
                    .orderBy("time", "desc").limit(1).onSnapshot(function(mSnap) {
                        mSnap.docChanges().forEach(function(change) {
                            if (change.type === "added") {
                                var msgData = change.doc.data();
                                if (msgData.time < Date.now() - 5000 || msgData.sender === me.email) return;
                                triggerPopupNotification(msgData.sender, msgData.msgType === "image" ? "📷 画像" : msgData.text, roomId);
                            }
                        });
                    });
            });
        });
    }

    // チャット画面を開く（引用返信UI・リアルタイム同期の強化）
    function openChat(roomId, isGroup, otherEmail, groupName) {
        activeRoomId = roomId;
        isGroupMode = isGroup;
        targetEmail = isGroup ? null : otherEmail;
        currentReplyData = null;
        document.getElementById('replyPreviewBar').style.display = 'none';

        var titleEl = document.getElementById('chatTitle');
        var groupBtn = document.getElementById('groupSettingsBtn');
        
        if (isGroup) {
            titleEl.innerText = groupName || "グループチャット";
            groupBtn.style.display = 'block';
            // 最新のグループ情報を取得
            db.collection("contact_links").doc(activeRoomId).get().then(function(doc) {
                globalGroupData = doc.data();
                titleEl.innerText = globalGroupData.groupName || "グループチャット";
            });
        } else {
            titleEl.innerText = (targetEmail === OFFICIAL_EMAIL) ? "AirText公式" : targetEmail;
            groupBtn.style.display = 'none';
            db.collection("my_nicknames").doc(me.email).collection("targets").doc(targetEmail).onSnapshot(function(nSnap) {
                if(nSnap.exists && nSnap.data().alias) titleEl.innerText = nSnap.data().alias;
            });
        }
        
        show('chatView');
        checkScheduledTray();

        // ルームに入室した瞬間に既読化
        db.collection("room_status").doc(activeRoomId).set({ unread: "", unreadCount: 0, current_users: firebase.firestore.FieldValue.arrayUnion(me.email) }, { merge: true });
        
        if(!isGroupMode) {
            if(statusUnsub) statusUnsub();
            statusUnsub = db.collection("room_status").doc(activeRoomId).onSnapshot(function(docSnap) {
                var status = docSnap.data();
                partnerInRoom = (status && status.current_users && status.current_users.includes(targetEmail));
            });
        } else { partnerInRoom = false; }

        if (chatUnsub) chatUnsub();
        chatUnsub = db.collection("rooms").doc(activeRoomId).collection("messages").orderBy("time", "asc").onSnapshot(function(snap) {
            var area = document.getElementById('msgArea');
            area.innerHTML = "";
            
            snap.forEach(function(d) {
                var data = d.data();
                var msgId = d.id;
                var isMe = (data.sender === me.email);
                
                var container = document.createElement('div');
                container.className = "msg-container " + (isMe ? 'sent' : 'received');
                
                var m = document.createElement('div');
                m.className = "msg";
                
                // 引用返信がデータにあれば描画
                if (data.replyTo) {
                    var replyBox = document.createElement('div');
                    replyBox.className = "reply-quote-in-msg";
                    replyBox.innerText = "⮪ " + data.replyTo.sender.split("@")[0] + ": " + data.replyTo.text;
                    m.appendChild(replyBox);
                }

                var textNode = document.createElement('div');
                var senderTitle = isGroupMode ? '<div style="font-size:10px;color:var(--text-muted);margin-bottom:4px;">'+data.sender.split("@")[0]+'</div>' : '';
                
                if(data.msgType === "image") {
                    textNode.innerHTML = senderTitle + '<img src="'+data.url+'">';
                } else {
                    textNode.innerHTML = senderTitle + activateLinks(data.text);
                }
                m.appendChild(textNode);
                
                // メッセージ長押し（返信機能の追加、位置自動調整バグ修正）
                var pressTimer;
                function showMsgMenu(cx, cy) {
                    focusedMsgId = msgId;
                    var menu = document.getElementById('msgMenu');
                    menu.style.display = 'flex';
                    menu.style.left = Math.min(cx, window.innerWidth - 230) + 'px';
                    menu.style.top = Math.min(cy, window.innerHeight - 180) + 'px';
                    document.getElementById('revokeBtn').style.display = isMe ? 'block' : 'none';
                    // 引用データ用一時保存
                    currentReplyData = { id: msgId, sender: data.sender, text: data.msgType === "image" ? "[画像]" : data.text };
                }

                m.addEventListener('touchstart', function(e) {
                    pressTimer = setTimeout(function() { showMsgMenu(e.touches[0].clientX, e.touches[0].clientY); }, 700);
                }, {passive: true});
                m.addEventListener('touchend', function() { clearTimeout(pressTimer); });
                m.addEventListener('contextmenu', function(e) { e.preventDefault(); showMsgMenu(e.clientX, e.clientY); });

                var meta = document.createElement('div');
                meta.className = "msg-meta";
                var timeStr = formatTime(data.time);
                if (isMe) {
                    var readText = (partnerInRoom || data.isRead) ? "既読 " : "";
                    meta.innerText = (isGroupMode ? "" : readText) + timeStr;
                    if (partnerInRoom && !data.isRead) {
                        db.collection("rooms").doc(activeRoomId).collection("messages").doc(msgId).update({ isRead: true });
                    }
                } else {
                    meta.innerText = timeStr;
                    if (!data.isRead) db.collection("rooms").doc(activeRoomId).collection("messages").doc(msgId).update({ isRead: true });
                }

                var heartBadge = document.createElement('div');
                heartBadge.className = "heart-badge";
                var reactString = "";
                if(data.reactions) {
                    for(var key in data.reactions) {
                        if(data.reactions[key] && data.reactions[key].length > 0) reactString += key;
                    }
                }
                if (reactString !== "") { heartBadge.innerText = reactString; heartBadge.style.display = "flex"; } else { heartBadge.style.display = "none"; }

                container.appendChild(m);
                container.appendChild(heartBadge);
                container.appendChild(meta);
                area.appendChild(container);
            });
            area.scrollTop = area.scrollHeight;
        });
    }

    // 引用返信ボタン押下
    document.getElementById('replyMenuBtn').onclick = function() {
        if (!currentReplyData) return;
        document.getElementById('replyUserLabel').innerText = currentReplyData.sender.split("@")[0] + " への返信";
        document.getElementById('replyTextLabel').innerText = currentReplyData.text;
        document.getElementById('replyPreviewBar').style.display = 'flex';
        document.getElementById('msgMenu').style.display = 'none';
    };
    document.getElementById('cancelReplyBtn').onclick = function() {
        currentReplyData = null;
        document.getElementById('replyPreviewBar').style.display = 'none';
    };

    // 時間指定投稿（タイマーボタン）
    document.getElementById('timerBtn').onclick = function() {
        var minutesStr = prompt("今から何分後にこのメッセージを送信しますか？\n（数字の分数を入力。例: 5）");
        if (!minutesStr) {
            scheduleTimeSetting = null;
            alert("時間指定を解除しました（通常送信）。");
            return;
        }
        var mins = parseInt(minutesStr, 10);
        if (isNaN(mins) || mins <= 0) return alert("正しい数値を入力してください。");
        scheduleTimeSetting = Date.now() + (mins * 60 * 1000);
        alert(mins + "分後に送信するよう予約セットしました！メッセージを入力して送信ボタンを押してください。");
    };

    function checkScheduledTray() {
        db.collection("scheduled_messages")
          .where("roomId", "==", activeRoomId)
          .where("sender", "==", me.email)
          .where("status", "==", "pending")
          .onSnapshot(function(snap) {
              document.getElementById('scheduledTrayBar').style.display = snap.empty ? 'none' : 'flex';
          });
    }

    document.getElementById('openScheduledModalBtn').onclick = function() {
        db.collection("scheduled_messages")
          .where("roomId", "==", activeRoomId)
          .where("sender", "==", me.email)
          .where("status", "==", "pending")
          .get()
          .then(function(snap) {
              var container = document.getElementById('scheduledListContainer');
              container.innerHTML = "";
              snap.forEach(function(doc) {
                  var data = doc.data();
                  var div = document.createElement('div');
                  div.style.cssText = "padding:8px; border-bottom:1px solid rgba(0,0,0,0.05); display:flex; justify-content:between; align-items:center;";
                  var dateStr = new Date(data.targetTime).toLocaleTimeString();

    // メッセージ送信ロジック（通常・予約・引用返信の統合）
    function send() {
        var input = document.getElementById('msgInput');
        var text = input.value.trim();
        if (!text || !activeRoomId) return;

        // 予約送信の場合
        if (scheduleTimeSetting) {
            db.collection("scheduled_messages").add({
                roomId: activeRoomId,
                sender: me.email,
                targetUser: targetEmail || "",
                isGroup: isGroupMode,
                text: text,
                targetTime: scheduleTimeSetting,
                status: "pending",
                replyTo: currentReplyData
            }).then(function() {
                alert("指定時間での送信を予約トレイに登録しました！");
                scheduleTimeSetting = null;
                currentReplyData = null;
                document.getElementById('replyPreviewBar').style.display = 'none';
                input.value = "";
                checkScheduledTray();
            });
            return;
        }

        // 通常送信
        var msgData = {
            text: text,
            sender: me.email,
            time: Date.now(),
            msgType: "text",
            isRead: partnerInRoom,
            reactions: {},
            replyTo: currentReplyData
        };
        input.value = "";
        currentReplyData = null;
        document.getElementById('replyPreviewBar').style.display = 'none';

        db.collection("rooms").doc(activeRoomId).collection("messages").add(msgData).then(function() {
            db.collection("contact_links").doc(activeRoomId).update({ time: Date.now() });
            
            // 未読件数インクリメント
            var unreadTarget = isGroupMode ? "group_update" : targetEmail;
            db.collection("room_status").doc(activeRoomId).get().then(function(sDoc) {
                var curCount = 0;
                if(sDoc.exists && sDoc.data().unread === unreadTarget) curCount = sDoc.data().unreadCount || 0;
                db.collection("room_status").doc(activeRoomId).set({
                    unread: unreadTarget,
                    unreadCount: curCount + 1
                }, { merge: true });
            });
        });
    }

    // =========================================
    // 📞 1対1 WebRTC音声通話 自前ロジック (Firestoreシグナリング)
    // =========================================
    document.getElementById('voiceCallBtn').onclick = function() {
        if (isGroupMode) return alert("通話は現在1対1専用です。");
        initAudio();
        startCall();
    };

    function listenIncomingCalls() {
        // 自分宛てのpending状態の通話セッションを常時監視
        db.collection("calls")
          .where("target", "==", me.email)
          .where("status", "==", "pending")
          .onSnapshot(function(snap) {
              snap.forEach(function(doc) {
                  var data = doc.data();
                  activeCallId = doc.id;
                  
                  document.getElementById('callStatus').innerText = "INCOMING VOICE CALL...";
                  document.getElementById('callPartnerName').innerText = data.sender.split("@")[0];
                  document.getElementById('answerCallBtn').style.display = 'block';
                  document.getElementById('callOverlay').style.display = 'flex';
                  playNotificationSound();

                  // 通話拒否や切断の遠隔監視
                  if(callUnsub) callUnsub();
                  callUnsub = db.collection("calls").doc(activeCallId).onSnapshot(function(callDoc) {
                      if (!callDoc.exists || callDoc.data().status === 'ended') {
                          endCallLocal();
                      }
                  });
              });
          });
    }

    function startCall() {
        activeCallId = "call_" + Date.now();
        document.getElementById('callStatus').innerText = "CALLING...";
        document.getElementById('callPartnerName').innerText = targetEmail.split("@")[0];
        document.getElementById('answerCallBtn').style.display = 'none'; // かける側は応答ボタン不要
        document.getElementById('callOverlay').style.display = 'flex';

        // マイクストリーム取得
        navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
            localStream = stream;
            
            // Firestoreに通話セッションデータを作成
            return db.collection("calls").doc(activeCallId).set({
                sender: me.email,
                target: targetEmail,
                status: "pending",
                time: Date.now()
            });
        }).then(function() {
            setupPeerConnection();
            
            // 相手が応答(answered)したか、切断したかの状態変化を追跡
            if (callUnsub) callUnsub();
            callUnsub = db.collection("calls").doc(activeCallId).onSnapshot(function(docSnap) {
                var data = docSnap.data();
                if (!data) return;
                
                if (data.status === "answered" && !peerConnection.remoteDescription) {
                    document.getElementById('callStatus').innerText = "CONNECTED";
                    // 相手からのSDP Offerを元に接続
                    if (data.offer) {
                        peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer)).then(function() {
                            return peerConnection.createAnswer();
                        }).then(function(answer) {
                            return peerConnection.setLocalDescription(answer).then(function() {
                                return db.collection("calls").doc(activeCallId).update({ answer: { type: answer.type, sdp: answer.sdp } });
                            });
                        });
                    }
                }
                
                // 相手からのリモートAnswerの適用
                if (data.answer && !peerConnection.remoteDescription) {
                    peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    document.getElementById('callStatus').innerText = "CONNECTED";
                }

                if (data.status === "ended") endCallLocal();
            });

            // SDP Offerを生成して登録
            peerConnection.createOffer().then(function(offer) {
                return peerConnection.setLocalDescription(offer).then(function() {
                    return db.collection("calls").doc(activeCallId).update({ offer: { type: offer.type, sdp: offer.sdp } });
                });
            });

            // ICE Candidateの交換
            peerConnection.onicecandidate = function(e) {
                if (e.candidate) {
                    db.collection("calls").doc(activeCallId).collection("candidates").add({
                        candidate: e.candidate.toJSON(),
                        sender: me.email
                    });
                }
            };

            // 相手側のICE候補を拾って適用
            db.collection("calls").doc(activeCallId).collection("candidates")
              .where("sender", "==", targetEmail)
              .onSnapshot(function(cSnap) {
                  cSnap.forEach(function(cDoc) {
                      peerConnection.addIceCandidate(new RTCIceCandidate(cDoc.data().candidate));
                  });
              });

        }).catch(function(err) { alert("通話の開始に失敗しました: " + err); endCallLocal(); });
    }

    // 応答ボタン（電話に出る）を押した際の処理
    document.getElementById('answerCallBtn').onclick = function() {
        initAudio();
        document.getElementById('callStatus').innerText = "CONNECTING...";
        
        navigator.mediaDevices.getUserMedia({ audio: true, video: false }).then(function(stream) {
            localStream = stream;
            setupPeerConnection();
            
            return db.collection("calls").doc(activeCallId).update({ status: "answered" });
        }).then(function() {
            // かける側と同様にICE candidateを交換
            peerConnection.onicecandidate = function(e) {
                if (e.candidate) {
                    db.collection("calls").doc(activeCallId).collection("candidates").add({
                        candidate: e.candidate.toJSON(),
                        sender: me.email
                    });
                }
            };

            db.collection("calls").doc(activeCallId).collection("candidates")
              .where("sender", "!=", me.email)
              .onSnapshot(function(cSnap) {
                  cSnap.forEach(function(cDoc) {
                      peerConnection.addIceCandidate(new RTCIceCandidate(cDoc.data().candidate));
                  });
              });
        }).catch(function(err) { alert("通話応答エラー: " + err); declineCall(); });
    };

    function setupPeerConnection() {
        peerConnection = new RTCPeerConnection(rtcConfig);
        // ローカル音声を乗せる
        localStream.getTracks().forEach(function(track) { peerConnection.addTrack(track, localStream); });
        
        // 相手の音声を受信した時
        peerConnection.ontrack = function(e) {
            var remoteAudio = document.createElement('audio');
            remoteAudio.srcObject = e.streams[0];
            remoteAudio.autoplay = true;
            document.body.appendChild(remoteAudio);
        };
    }

    document.getElementById('declineCallBtn').onclick = declineCall;
    function declineCall() {
        if (activeCallId) {
            db.collection("calls").doc(activeCallId).update({ status: "ended" }).then(function() { endCallLocal(); });
        } else { endCallLocal(); }
    }

    function endCallLocal() {
        document.getElementById('callOverlay').style.display = 'none';
        if (localStream) { localStream.getTracks().forEach(function(track) { track.stop(); }); localStream = null; }
        if (peerConnection) { peerConnection.close(); peerConnection = null; }
        if (callUnsub) { callUnsub(); callUnsub = null; }
        activeCallId = null;
    }

    // リアクション、取消、設定、各種ボタン類のバインディング
    var emojiOpts = document.querySelectorAll('.emoji-opt');
    for(var i=0; i<emojiOpts.length; i++) {
        emojiOpts[i].onclick = function(e) {
            var chosenEmoji = e.target.innerText;
            var msgRef = db.collection("rooms").doc(activeRoomId).collection("messages").doc(focusedMsgId);
            db.runTransaction(function(transaction) {
                return transaction.get(msgRef).then(function(resDoc) {
                    var rMap = resDoc.data().reactions || {};
                    if(!rMap[chosenEmoji]) rMap[chosenEmoji] = [];
                    if(rMap[chosenEmoji].includes(me.email)) {
                        rMap[chosenEmoji] = rMap[chosenEmoji].filter(function(u) { return u !== me.email; });
                    } else { rMap[chosenEmoji].push(me.email); }
                    transaction.update(msgRef, { reactions: rMap });
                });
            }).then(function() { document.getElementById('msgMenu').style.display = 'none'; });
        };
    }

    document.getElementById('revokeBtn').onclick = function() {

            db.collection("rooms").doc(activeRoomId).collection("messages").doc(focusedMsgId).delete().then(function() {
                document.getElementById('msgMenu').style.display = 'none';
            });

        targetEmail = null; activeRoomId = null; show('homeView');

    document.getElementById('saveSettingsBtn').onclick = function() {

        db.collection("profiles").doc(me.email).set({

        }, { merge: true }).then(function() {

    document.getElementById('googleLoginBtn').onclick = function() { initAudio(); auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); };
    document.getElementById('switchAuthMode').onclick = function() {

        document.getElementById('authTitle').innerText = isSignUpMode ? "AirText (Sign Up)" : "AirText";
        document.getElementById('mainAuthBtn').innerText = isSignUpMode ? "新規アカウント登録" : "ログイン";

    };
    document.getElementById('mainAuthBtn').onclick = function() {
        initAudio();
        var emailStr = document.getElementById('email').value.trim(), pwStr = document.getElementById('pw').value.trim();

                db.collection("contact_links").doc(lId).set({ users: [m, OFFICIAL_EMAIL], type: "direct", time: Date.now() });
                db.collection("rooms").doc(lId).collection("messages").add({ text: "AirTextへようこそ！", sender: OFFICIAL_EMAIL, time: Date.now(), msgType: "text", isRead: false, reactions: {} });
                alert("アカウントを作成しました。ログインしてください。");
            }).catch(function(e) { alert("登録失敗: " + e.message); });
        } else { auth.signInWithEmailAndPassword(emailStr, pwStr).catch(function() { alert("ログイン失敗"); }); }
    };

    document.getElementById('logoutBtn').onclick = function() {
        if (confirm("ログアウトしますか？")) {
            auth.signOut().then(function() {
                if (chatUnsub) chatUnsub(); if (statusUnsub) statusUnsub(); if (roomListUnsub) roomListUnsub();
                show('loginView');
            });
        }
    };
